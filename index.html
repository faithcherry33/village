<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오손도손 마을 — 교류로 키우는 우리 마을</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#4A3B2A; --ink-soft:#8A765C; --paper:#FFFDF7; --edge:#E6D7BC;
    --sky1:#CDEBFA; --sky2:#E6F5FD; --grass1:#8FCF6E; --grass2:#79C158;
    --gold:#F2A900; --good:#2EA66A; --bad:#E0653C;
    --food:#7BB661; --wood:#A9743B; --stone:#8C95A0; --brick:#C9603F; --fish:#3E9AC7; --coin:#F2B705;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'Gowun Dodum',sans-serif; color:var(--ink); font-size:16px; -webkit-font-smoothing:antialiased;
    background:radial-gradient(1200px 700px at 50% -15%, #EAF7FF 0%, #FBF6EA 60%); min-height:100vh}
  h1,h2,h3,.jua{font-family:'Jua',sans-serif; font-weight:400}
  .wrap{max-width:1080px; margin:0 auto; padding:16px 14px 60px}

  /* header */
  .head{display:flex; align-items:center; gap:14px; background:var(--paper); border:2px solid var(--edge);
    border-radius:20px; padding:12px 18px; box-shadow:0 6px 0 #EFE6D2, 0 10px 24px rgba(74,59,42,.08)}
  .head .badge{font-size:34px}
  .head .htxt{margin-right:auto}
  .head h1{font-size:22px; margin:0}
  .head .lvl{font-size:13px; color:var(--ink-soft)}
  .progress{flex:1 1 220px; max-width:340px}
  .progress .pb{height:14px; background:#EFE6D2; border-radius:99px; overflow:hidden; border:1px solid var(--edge)}
  .progress .pb > i{display:block; height:100%; width:0%; background:linear-gradient(90deg,#FFD15C,var(--gold)); transition:width .5s}
  .progress .pl{display:flex; justify-content:space-between; font-size:11.5px; color:var(--ink-soft); margin-top:3px}

  /* resource bar */
  .resbar{display:flex; flex-wrap:wrap; gap:8px; margin-top:12px}
  .res{display:flex; align-items:center; gap:6px; background:var(--paper); border:2px solid var(--edge);
    border-radius:14px; padding:7px 12px; font-family:'Jua'; font-size:17px; min-width:88px}
  .res .ri{font-size:19px} .res .rv{margin-left:auto}
  .res.bump{animation:bump .35s}
  @keyframes bump{40%{transform:scale(1.12)}}

  .layout{display:grid; grid-template-columns:1.15fr 1fr; gap:16px; margin-top:14px}
  @media (max-width:760px){.layout{grid-template-columns:1fr}}

  /* village scene */
  .scene{background:linear-gradient(180deg,var(--grass1),var(--grass2)); border:2px solid var(--edge);
    border-radius:20px; overflow:hidden; position:relative; box-shadow:0 6px 0 #EFE6D2}
  .ground{position:absolute; inset:0;
    background:linear-gradient(180deg,var(--grass1),var(--grass2))}
  .ground:before{content:""; position:absolute; inset:0; opacity:.25;
    background-image:radial-gradient(#5FA544 1.5px, transparent 2px); background-size:26px 26px}
  .village{position:absolute; inset:0; z-index:2; overflow:hidden}
  .bld{position:absolute; font-size:36px; line-height:1; transform-origin:center bottom;
    filter:drop-shadow(0 4px 2px rgba(0,0,0,.22)); will-change:transform}
  .bld.new{animation:plop .5s}
  @keyframes plop{0%{transform:translate(-50%,-90%) scale(.3); opacity:0}60%{transform:translate(-50%,-46%) scale(1.12)}100%{}}
  .road{position:absolute; left:-3%; right:-3%; height:15%; top:46%; z-index:1;
    background:linear-gradient(180deg,#b9b3a8,#8f897e); border-top:2px solid #cfcabf; border-bottom:3px solid #6f6a60;
    box-shadow:0 -2px 6px rgba(0,0,0,.12)}
  .road::after{content:""; position:absolute; left:0; right:0; top:50%; height:0;
    border-top:3px dashed #f4d35e; transform:translateY(-50%)}
  .road.spur{left:45%; right:auto; width:10%; height:56%; top:52%; border:none;
    border-left:2px solid #cfcabf; border-right:3px solid #6f6a60; background:linear-gradient(90deg,#b9b3a8,#8f897e)}
  .road.spur::after{left:50%; right:auto; top:0; bottom:0; height:auto; width:0; border-top:none; border-left:3px dashed #f4d35e; transform:translateX(-50%)}
  .pond{position:absolute; z-index:1; border-radius:50%;
    background:radial-gradient(circle at 40% 35%,#bfe9ff,#6fc3f0 70%,#4aa6db);
    box-shadow:inset 0 -3px 6px #2f86bf66, 0 2px 4px rgba(0,0,0,.15); border:2px solid #8fd0ef}
  .deco{position:absolute; line-height:1; transform-origin:center bottom; filter:drop-shadow(0 3px 2px rgba(0,0,0,.18))}
  .vempty{position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); font-size:15px; color:#3c6e2e; opacity:.7; font-family:'Jua'}
  .scene-foot{position:absolute; left:12px; bottom:8px; z-index:120; display:flex; gap:8px; align-items:center}
  body.ov-open .scene-foot{display:none}
  .pill{background:rgba(255,253,247,.92); border:1.5px solid var(--edge); border-radius:99px;
    padding:5px 11px; font-family:'Jua'; font-size:14px; box-shadow:0 2px 6px rgba(0,0,0,.08)}

  /* field tap */
  .field{position:relative; margin-top:14px; text-align:center;
    background:linear-gradient(180deg,#FBE9A6,#F4D06A); border:2px solid #E3B94B; border-radius:18px;
    padding:16px; cursor:pointer; user-select:none; box-shadow:0 6px 0 #DDB347; transition:transform .06s}
  .field:active{transform:translateY(4px); box-shadow:0 2px 0 #DDB347}
  .field .ft{font-family:'Jua'; font-size:19px; color:#7A5A12}
  .field .fs{font-size:13px; color:#8A6A1E}
  .field .fe{font-size:30px}

  /* right column */
  .quest{background:var(--paper); border:2px solid var(--edge); border-radius:18px; padding:14px 16px;
    box-shadow:0 6px 0 #EFE6D2}
  .quest .qlab{display:inline-block; font-family:'Jua'; font-size:12px; color:#fff; background:var(--gold);
    padding:3px 10px; border-radius:99px}
  .quest h3{margin:8px 0 4px; font-size:19px}
  .quest p{margin:0; font-size:14.5px; color:var(--ink-soft); line-height:1.55}
  .quest .qbar{height:10px; background:#EFE6D2; border-radius:99px; overflow:hidden; margin-top:9px; border:1px solid var(--edge)}
  .quest .qbar > i{display:block; height:100%; width:0%; background:var(--good); transition:width .4s}

  /* 축제 홍보 배너 */
  .festbanner{margin-top:12px}
  .festbanner:empty{display:none}
  .festbar{display:flex; align-items:center; gap:10px; border-radius:16px; padding:10px 13px;
    background:linear-gradient(180deg,#FFF1F6,#FFE0EC); border:2px solid #F39BBE; box-shadow:0 4px 0 #F0C4D6}
  .festbar.closed{background:linear-gradient(180deg,#F4EFE6,#EDE5D6); border-color:#D9CDB6; box-shadow:0 4px 0 #E5DAC4}
  .festbar .femoji{font-size:30px; animation:fbob 1.3s ease-in-out infinite}
  @keyframes fbob{50%{transform:translateY(-3px) rotate(-4deg)}}
  .festbar .ftxt{flex:1; min-width:0}
  .festbar .ft1{font-family:'Jua'; font-size:14px; color:#C0407A}
  .festbar.closed .ft1{color:#8a765c}
  .festbar .ft2{font-family:'Gowun Dodum'; font-size:12px; color:var(--ink-soft)}
  .festbar .fgo{flex:0 0 auto; font-family:'Jua'; font-size:14px; color:#fff; border:none; border-radius:12px;
    padding:9px 13px; cursor:pointer; background:linear-gradient(180deg,#F86FA6,#E0457F); box-shadow:0 4px 0 #B92E63}
  .festbar .fgo:active{transform:translateY(3px); box-shadow:0 1px 0 #B92E63}
  .festcard{margin-bottom:12px; border-radius:16px; padding:11px 13px;
    background:linear-gradient(180deg,#FFF6DF,#FFEAC4); border:2px solid #F2C14E; box-shadow:0 4px 0 #EAD08A}
  .festcard .fc-t{font-family:'Jua'; font-size:15px; color:#B5700F}
  .festcard .fc-d{font-family:'Gowun Dodum'; font-size:12.5px; color:var(--ink-soft); margin:3px 0 8px}
  .festcard .fc-buy{display:flex; align-items:center; gap:10px; padding-top:8px; border-top:1px dashed #E0B84E}
  .festcard .fbtn{font-family:'Jua'; font-size:14px; color:#fff; border:none; border-radius:11px; padding:9px 12px;
    cursor:pointer; background:linear-gradient(180deg,#54B07A,#2EA66A); box-shadow:0 4px 0 #1F8252}
  .festcard .fbtn.enter{background:linear-gradient(180deg,#F86FA6,#E0457F); box-shadow:0 4px 0 #B92E63}
  .festcard .fbtn:disabled{background:#cfc4ad; box-shadow:0 4px 0 #b0a488; cursor:not-allowed}

  .tabs{display:flex; gap:8px; margin-top:14px}
  .tab{flex:1; font-family:'Jua'; font-size:16px; padding:11px; border-radius:14px 14px 0 0; cursor:pointer;
    background:#F0E6D2; color:var(--ink-soft); border:2px solid var(--edge); border-bottom:none; text-align:center}
  .tab.on{background:var(--paper); color:var(--ink)}
  .pane{background:var(--paper); border:2px solid var(--edge); border-radius:0 14px 14px 14px; padding:14px;
    box-shadow:0 6px 0 #EFE6D2}

  /* trade */
  .regrow{display:flex; gap:7px; flex-wrap:wrap; margin-bottom:12px}
  .regbtn{font-family:'Jua'; font-size:14px; padding:8px 11px; border-radius:12px; cursor:pointer;
    background:#F4ECDA; border:2px solid var(--edge)}
  .regbtn.on{background:var(--gold); color:#fff; border-color:#D9960A}
  .regbtn .lk{font-size:11px}
  .tradecard .rdesc{font-size:14px; color:var(--ink-soft); line-height:1.55; margin:0 0 12px;
    background:#FBF4E4; border:1px dashed var(--edge); border-radius:12px; padding:10px 12px}
  .deal{display:flex; align-items:center; gap:10px; padding:10px 0; border-top:1px solid #F0E6D2}
  .deal .di{font-size:24px} .deal .dn{font-family:'Jua'; font-size:15px}
  .deal .dp{font-size:12.5px; color:var(--ink-soft)}
  .deal .dgrow{margin-left:auto; display:flex; gap:6px}
  .b{font-family:'Jua'; font-size:14px; padding:9px 12px; border-radius:11px; cursor:pointer; border:none; color:#fff}
  .b.buy{background:linear-gradient(180deg,#54B07A,#2EA66A); box-shadow:0 4px 0 #1F8252}
  .b.sell{background:linear-gradient(180deg,#5BA8D6,#3E9AC7); box-shadow:0 4px 0 #2C7AA0}
  .b:active{transform:translateY(3px); box-shadow:0 1px 0 #1f8252}
  .b:disabled{filter:grayscale(.7) opacity(.55); box-shadow:none; cursor:not-allowed}
  .friend{margin-top:12px; font-size:13px; color:var(--ink-soft)}
  .friend .fb{height:9px; background:#EFE6D2; border-radius:99px; overflow:hidden; margin-top:4px; border:1px solid var(--edge)}
  .friend .fb > i{display:block;height:100%;width:0%;background:linear-gradient(90deg,#F6A6C1,#E0653C);transition:width .4s}

  /* 시세 + 우호도 보상 */
  .trend{font-size:12px;font-family:'Jua';padding:1px 6px;border-radius:8px;margin-left:5px}
  .trend.up{color:#2EA66A;background:#E7F6EE}
  .trend.down{color:#E0653C;background:#FBEDE7}
  .trend.flat{color:#8A765C;background:#F0E6D2}
  .hot{color:#2EA66A;font-family:'Jua';font-size:12px;margin-left:4px}
  .cheap{color:#3E9AC7;font-family:'Jua';font-size:12px;margin-left:4px}
  .perks{margin-top:8px;background:#FBF4E4;border:1px dashed var(--edge);border-radius:12px;padding:9px 11px;font-size:12.5px;color:var(--ink-soft);line-height:1.7}
  .perks b{color:var(--ink)}
  .perks .on{color:#2EA66A}
  .perks .next{color:#B5700F}
  .special{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid #F0E6D2}
  .special .di{font-size:22px}
  .special .tag{font-size:11px;font-family:'Jua';color:#fff;background:#C9603F;border-radius:7px;padding:1px 7px;margin-left:6px}

  /* build */
  .bcard{display:flex; align-items:center; gap:12px; padding:11px 0; border-top:1px solid #F0E6D2}
  .bcard:first-child{border-top:none}
  .bcard .be{font-size:30px; width:40px; text-align:center}
  .bcard .bn{font-family:'Jua'; font-size:16px}
  .bcard .bd{font-size:12.5px; color:var(--ink-soft); line-height:1.4}
  .cost{display:inline-flex; flex-wrap:wrap; gap:5px; margin-top:3px}
  .cost span{font-size:12px; background:#F4ECDA; border:1px solid var(--edge); border-radius:7px; padding:2px 6px}
  .cost span.no{color:var(--bad); border-color:#F2C3B2; background:#FCEDE7}
  .bcard .bgo{margin-left:auto}
  .b.build{background:linear-gradient(180deg,#E9A23D,#D98818); box-shadow:0 4px 0 #B5700F}
  .b.build:active{transform:translateY(3px); box-shadow:0 1px 0 #B5700F}
  .locked{opacity:.55}
  .lockmsg{font-size:11.5px; color:var(--bad); margin-left:auto}

  /* floats & toast */
  .float{position:fixed; transform:translate(-50%,-50%); font-family:'Jua'; pointer-events:none; z-index:60;
    transition:top .8s ease, opacity .8s ease; text-shadow:0 1px 2px #fff}
  .toast{position:fixed; left:50%; top:18%; transform:translateX(-50%) translateY(-20px);
    background:var(--ink); color:#fff; font-family:'Jua'; font-size:18px; padding:14px 26px; border-radius:16px;
    box-shadow:0 12px 30px rgba(0,0,0,.3); opacity:0; transition:.4s; z-index:70; text-align:center}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  /* actions */
  .actions{display:flex; gap:10px; align-items:center; margin-top:14px; justify-content:flex-end}
  .ghost{font-family:'Gowun Dodum'; background:var(--paper); color:var(--ink-soft); border:2px solid var(--edge);
    border-radius:12px; padding:10px 14px; cursor:pointer; font-size:14px}

  /* overlay */
  .ov{position:fixed; inset:0; background:rgba(74,59,42,.55); backdrop-filter:blur(3px); z-index:80;
    display:flex; align-items:center; justify-content:center; padding:18px}
  .ov.hide{display:none}
  .card{background:var(--paper); border:2px solid var(--edge); border-radius:22px; max-width:880px; width:100%;
    padding:24px 26px; text-align:center; box-shadow:0 24px 60px rgba(0,0,0,.3); max-height:92vh; overflow:auto}
  .card h2{font-size:26px; margin:.1em 0 .3em}
  .card p{font-size:15px; line-height:1.7; color:var(--ink-soft); margin:.5em 0}
  .card .how{text-align:left; background:#FBF4E4; border:1px solid var(--edge); border-radius:14px;
    padding:12px 16px; margin:10px 0; font-size:14px; line-height:1.55}
  .card .how .how-h{display:block; margin-bottom:6px; font-size:15px}
  .card .hcols{column-count:2; column-gap:24px}
  .card .hstep{break-inside:avoid; -webkit-column-break-inside:avoid; margin:0 0 6px}
  @media (max-width:640px){ .card .hcols{column-count:1} }
  .card .how b{color:var(--ink)}
  .bigbtn{font-family:'Jua'; font-size:20px; color:#fff; border:none; cursor:pointer; margin-top:8px;
    background:linear-gradient(180deg,#54B07A,#2EA66A); padding:15px 34px; border-radius:14px; box-shadow:0 6px 0 #1F8252}
  .bigbtn:active{transform:translateY(4px); box-shadow:0 2px 0 #1F8252}

  @media (max-width:760px){
    body{font-size:15px}
    .head h1{font-size:19px} .progress{flex-basis:100%; max-width:none}
    .res{min-width:0; flex:1 1 28%; font-size:15px}
  }
  /* ===== 들판 12칸 ===== */
  .farmfield{margin-top:14px;background:var(--paper);border:2px solid var(--edge);border-radius:18px;padding:12px 14px;box-shadow:0 6px 0 #EFE6D2}
  .ff-head{font-family:'Jua';font-size:18px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .ff-sub{font-family:'Gowun Dodum';font-size:12px;color:var(--ink-soft)}
  .plots{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:10px 0}
  .plot{position:relative;aspect-ratio:1/.82;border-radius:12px;cursor:pointer;overflow:hidden;
    border:2px solid #9c7240;box-shadow:inset 0 3px 9px #00000026;transition:transform .08s}
  .plot:active{transform:scale(.97)}
  .plot .plot-in{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:3px;font-size:22px}
  .plot .plot-lab{position:absolute;left:0;right:0;bottom:0;text-align:center;font-family:'Jua';font-size:11px;padding:2px 0;background:#0000003d;color:#fff;letter-spacing:.3px}
  .plot.empty{background:
     radial-gradient(circle at 28% 30%,#a07c4d 0 7%,transparent 8%),
     radial-gradient(circle at 68% 62%,#8a6a40 0 6%,transparent 7%),
     radial-gradient(circle at 50% 80%,#9c7a4e 0 5%,transparent 6%),
     linear-gradient(160deg,#7c5b34,#674a2a)}
  .plot.empty .rk{font-size:19px;filter:drop-shadow(0 1px 1px #0007)}
  .plot.empty .rk2{font-size:13px;opacity:.85;align-self:flex-end;margin-top:14px}
  .plot.tilled,.plot.planted,.plot.grown,.plot.cleared,.plot.withered{background:repeating-linear-gradient(165deg,#6f4d24 0 6px,#84602f 6px 13px)}
  .plot.tilled::after,.plot.planted::after,.plot.grown::after,.plot.cleared::after,.plot.withered::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(165deg,#0000001f 0 6px,transparent 6px 13px)}
  .plot.cleared{background:repeating-linear-gradient(165deg,#7a5630 0 6px,#8d6736 6px 13px)}
  .plot.tilled .plot-in::before{content:"⛏️";opacity:.0}
  .plot.planted .sprout{font-size:20px;animation:sway 1.6s ease-in-out infinite}
  .plot.grown{background:repeating-linear-gradient(165deg,#6a4a24 0 6px,#7d5a2c 6px 13px)}
  .plot.grown .crop{font-size:24px;animation:pop2 .6s}
  .plot.ready{outline:3px solid #f2c14e;outline-offset:-3px}
  .plot.ripe{outline-color:#ff8a3d;animation:ripepulse .9s ease-in-out infinite}
  @keyframes ripepulse{50%{box-shadow:0 0 0 3px #ff8a3d88, 0 0 14px #ff8a3d99}}
  .plot .witherbar{position:absolute;left:3px;right:3px;bottom:3px;height:5px;border-radius:99px;background:linear-gradient(90deg,#43e08a,#ffd23f,#ff3b6b);z-index:4}
  @keyframes wither{from{width:calc(100% - 6px)}to{width:0}}
  .plot.withered{filter:saturate(.55) brightness(.92)}
  @keyframes sway{50%{transform:rotate(7deg)}}
  @keyframes pop2{0%{transform:scale(.4)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
  .ff-legend{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--ink-soft)}
  .plot.locked{cursor:not-allowed;background:linear-gradient(160deg,#cfc4ad,#b6a98c);border-color:#9a8c6e;box-shadow:inset 0 3px 9px #00000026;filter:saturate(.5)}
  .plot.locked .lockicon{font-size:20px;opacity:.85}
  .plot.locked .plot-lab{background:#5e503399;}
  /* 마을 건강 바 */
  .healthbar{margin-top:10px;background:var(--paper);border:2px solid var(--edge);border-radius:14px;padding:9px 14px;box-shadow:0 4px 0 #EFE6D2}
  .healthbar .hb-top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;font-family:'Jua';font-size:15px}
  .healthbar .hb-hint{font-family:'Gowun Dodum';font-size:12.5px;color:var(--ink-soft)}
  .healthbar .hb-track{height:12px;background:#EFE6D2;border-radius:99px;overflow:hidden;border:1px solid var(--edge);margin-top:6px}
  .healthbar .hb-track > i{display:block;height:100%;width:100%;border-radius:99px;transition:width .5s,background .5s}

  /* ===== 농사 패널 + 미니게임 모달 + 선택지 ===== */
  .farmPanel,.landmodal{position:fixed;inset:0;background:rgba(33,54,75,.6);backdrop-filter:blur(3px);z-index:90;display:flex;align-items:center;justify-content:center;padding:14px}
  .farmPanel.hide,.landmodal.hide{display:none}
  .farmPanel .pcard{background:var(--paper);border:3px solid #cfe6a8;border-radius:22px;max-width:520px;width:100%;padding:22px;text-align:center;box-shadow:0 20px 50px #0005;max-height:92vh;overflow:auto}
  .fstep{font-family:'Jua';font-size:13px;color:#fff;background:#7bbf6a;padding:4px 12px;border-radius:999px;display:inline-block}
  .fstep.div{background:#5aa9e6}
  .pcard h2{font-family:'Jua';color:#3a8f4e;font-size:23px;margin:10px 0 4px}
  .pcard .qtext{font-size:15.5px;line-height:1.6;color:var(--ink)}
  .pcard .qtext b{color:#e6502e}
  .eqn{font-family:'Jua';font-size:26px;margin:10px 0;color:var(--ink)}
  .eqn .box{display:inline-block;min-width:46px;padding:2px 10px;border-bottom:4px solid #e6952a;color:#e6952a}
  .choices{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0 4px}
  .choice{font-family:'Jua';font-size:20px;cursor:pointer;border:3px solid var(--edge);background:#fff;border-radius:14px;padding:12px 20px;min-width:62px;box-shadow:0 4px 0 var(--edge)}
  .choice:active{transform:translateY(3px);box-shadow:0 1px 0 var(--edge)}
  .choice.wrong{animation:shakec .35s;border-color:#ff8a6a;color:#e6361f}
  .choice.right{background:#eafbe7;border-color:#7bbf6a;box-shadow:0 4px 0 #7bbf6a;color:#3a8f4e}
  @keyframes shakec{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .fhint{min-height:20px;font-size:13.5px;color:var(--ink-soft);margin-top:6px}
  .fhint.ok{color:#3a8f4e}.fhint.no{color:#e6502e}
  .pbtn{font-family:'Jua';cursor:pointer;border:none;border-radius:14px;padding:12px 22px;font-size:17px;color:#fff;background:#7bbf6a;box-shadow:0 5px 0 #5a9e4a;margin-top:8px}
  .pbtn:active{transform:translateY(3px);box-shadow:0 2px 0 #5a9e4a}
  .landwrap{background:#fffdf7;border:2px solid var(--edge);border-radius:18px;width:100%;max-width:760px;height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.35)}
  .landbar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#F4ECDA;border-bottom:2px solid var(--edge);font-family:'Jua';font-size:15px}
  .landx{font-family:'Jua';font-size:14px;border:none;cursor:pointer;color:#fff;background:#C9603F;border-radius:10px;padding:8px 12px;box-shadow:0 3px 0 #9c4528}
  #landFrame{border:none;width:100%;flex:1;background:#eef6ff}

  /* ===== 사과나무 심기(흙바닥) ===== */
  .grove{display:inline-grid;gap:7px;margin:12px auto;padding:12px;border-radius:14px;
    background:linear-gradient(160deg,#8a6a45,#6e5436);box-shadow:inset 0 3px 10px #00000055}
  .hole{width:32px;height:32px;border-radius:50%;cursor:pointer;position:relative;
    background:radial-gradient(circle at 50% 38%,#7a5c3a,#523c25);box-shadow:inset 0 2px 5px #00000066;transition:transform .1s}
  .hole:active{transform:scale(.9)}
  .hole.on{background:radial-gradient(circle at 50% 35%,#9a7a4e,#6b4f30)}
  .hole.on::after{content:"🌳";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:20px;
    animation:popgrow .35s cubic-bezier(.34,1.56,.64,1)}
  @keyframes popgrow{0%{transform:scale(0) translateY(6px)}100%{transform:scale(1) translateY(0)}}

  /* ===== 사과 따기(나무) ===== */
  .apgame{margin-top:6px}
  .aprow{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px;flex-wrap:wrap}
  .aptarget{font-family:'Jua';font-size:17px;background:#fff3d6;border:2px solid #f0c668;border-radius:10px;padding:6px 14px}
  .aptarget b{color:#e6502e;font-size:23px;margin-left:4px}
  .aptarget.miss{animation:shakec .32s;border-color:#ff8a6a;background:#fde3da}
  .apinfo{font-family:'Jua';font-size:15px;color:var(--ink)}
  .apinfo b{color:#e6502e}
  .aptimebar{height:11px;background:#EFE6D2;border:1px solid var(--edge);border-radius:99px;overflow:hidden;margin-bottom:10px}
  .aptimebar>i{display:block;height:100%;width:100%;background:linear-gradient(90deg,#7bbf6a,#2EA66A);transition:width 1s linear}
  .aptree{border-radius:18px;overflow:hidden;box-shadow:0 3px 10px #00000022;border:3px solid #8D6E63;max-width:380px;margin:0 auto}
  .aptree .apple{transition:transform .12s}
  .aptree .apple:active{transform:scale(.9)}
  .aptree .apple.sel{transform:scale(1.12)}

  /* ===== 홈 칸 성장 연출 ===== */
  .sprout.g0{display:inline-block;animation:sprout0 .9s ease forwards}
  .sprout.g1{display:inline-block;animation:grow1 1s cubic-bezier(.34,1.4,.64,1) forwards}
  @keyframes sprout0{0%{transform:scale(.4)}100%{transform:scale(1)}}
  @keyframes grow1{0%{transform:scale(.6) translateY(4px)}100%{transform:scale(1.05) translateY(0)}}
  .aptreecrop{position:relative;display:inline-block}
  .aptreecrop i{position:absolute;right:-2px;top:-2px;font-size:.55em;font-style:normal}

  .pclose{position:fixed;top:14px;right:16px;z-index:95;font-family:'Jua';font-size:14px;border:none;cursor:pointer;
    color:#fff;background:#C9603F;border-radius:10px;padding:8px 12px;box-shadow:0 3px 0 #9c4528}
  .farmPanel.hide .pclose{display:none}

</style>
</head>
<body>

<script>
const R={
  food:{e:'🌾',n:'식량',c:'var(--food)'}, fish:{e:'🐟',n:'생선',c:'var(--fish)'},
  wood:{e:'🪵',n:'목재',c:'var(--wood)'}, stone:{e:'🪨',n:'돌',c:'var(--stone)'},
  brick:{e:'🧱',n:'벽돌',c:'var(--brick)'}, coin:{e:'🪙',n:'코인',c:'var(--coin)'},
  doctor:{e:'👨‍⚕️',n:'의사',c:'#E0653C'}, teacher:{e:'🧑‍🏫',n:'교사',c:'#3E9AC7'},
};

// 각 지역: 자기 특산품(sells)을 코인으로 팔고, 우리 식량(buysFood 가격)을 사 줌
const REGIONS=[
  {id:'sea', name:'바다 마을', emoji:'🌊',
   desc:'생선이 넘쳐나지만 식량이 부족해요. 식량을 가져가면 가장 반겨요!',

  {id:'mtn', name:'산골 마을', emoji:'⛰️',
   desc:'숲이 깊어 목재가 풍부해요. 집과 농가를 지으려면 꼭 들러야 해요.',
   sells:{wood:4}, foodPrice:2},
  {id:'mine',name:'광산 마을', emoji:'⛏️',
   desc:'단단한 돌을 캐는 마을. 공원·다리·큰 건물에 돌이 필요하죠.',
   sells:{stone:4}, foodPrice:2},
  {id:'city',name:'한빛 도시', emoji:'🏙️',
   desc:'돌과 흙을 구워 벽돌을 만들고, 의사·교사 같은 서비스 인력이 있는 도시예요. 식량을 가장 비싸게 사 줘요.',
   sells:{brick:7}, services:{doctor:12, teacher:10}, foodPrice:5},
];
const REG=Object.fromEntries(REGIONS.map(r=>[r.id,r]));

/* ===== 마을 축제 ===== 한정 시간만 열려요. 입장 게임을 통과하면 특산물을 싸게(수량 제한) 살 수 있어요 */
const FEST={
  sea:  {name:'풍어제',       emoji:'🎏', good:'fish',  price:1, limit:10, game:'fish',
         catchE:'🐟', catchN:'물고기', need:6, decoys:['🐠','🐡','🦑','🦀','🐙'],
         gameTitle:'물고기 잡기', gameDesc:'여럿이 마구 헤엄쳐요. 움직여서 목표 물고기만 잡아요!'},
  mtn:  {name:'나무 축제',     emoji:'🪓', good:'wood',  price:1, limit:10, game:'match',
         gameTitle:'통나무 옮기기', gameDesc:'통나무 1개만 옮겨 바른 식을 만들면 입장! (문제 3개)'},
  mine: {name:'줄다리기 대회', emoji:'🤼', good:'stone', price:1, limit:10, game:'tug',
         gameTitle:'연산 줄다리기', gameDesc:'계산 문제를 풀어 줄을 끌어와 이기면 입장!'},
  city: {name:'빛 축제',       emoji:'🎆', good:'brick', price:3, limit:8,  game:'tetris',
         gameTitle:'벽돌 쌓기', gameDesc:'블록으로 한 줄을 채워 벽돌 3줄을 없애면 입장! (1인 플레이)'},
};
const FEST_OPEN=70, FEST_GAP=35;   // 열림 70초 / 쉼 35초

const BUILDINGS=[
  {id:'farm', e:'🏡', n:'농가', once:false, max:4, lv:1, pop:3,
   desc:'농부가 사는 집(최대 4채). 인구가 늘고(+3명) 식량 창고도 커져요. 산골 목재와 광산 돌이 함께 필요해요 — 두 마을과 교류해야 지어요!',
   cost:s=>({wood:2+(s.count.farm||0), stone:1+(s.count.farm||0)}), apply:s=>{s.pop+=3;}},
  {id:'house',e:'🏠', n:'집', once:false, lv:1, pop:5,
   desc:'사람이 살 집. 지을수록 인구가 늘어요(+5명).',
   cost:s=>({wood:3+(s.count.house||0)}), apply:s=>{s.pop+=5;}},
  {id:'road', e:'🛣️', n:'도로', once:true, lv:1, pop:0,
   desc:'도시와 마을을 잇는 길. 도로를 놓아야 유통센터·병원을 짓고 도시 서비스(의사·교사)를 받을 수 있어요.',
   cost:s=>({stone:2, wood:2}), apply:s=>{}},
  {id:'market', e:'🚚', n:'유통센터', once:false, lv:1, pop:0, req:'road',
   desc:'사과(식량) 유통을 도와줘요. 지을수록 식량을 팔 때 한 개에 +1🪙 더 받아요! (도로가 먼저 필요)',
   cost:s=>({wood:2+(s.count.market||0), brick:1+(s.count.market||0), coin:5+(s.count.market||0)*4}), apply:s=>{}},
  {id:'school',e:'🏫', n:'학교', once:true, lv:1, pop:15,
   desc:'목재·돌·벽돌과 도시의 🧑‍🏫교사가 필요해요 — 여러 지역과 교류해야 지어요! (+15명)',
   cost:s=>({wood:4, stone:2, brick:2, teacher:1}), apply:s=>{s.pop+=15;}},
  {id:'hospital', e:'🏥', n:'병원', once:false, max:3, lv:2, pop:0, req:'road',
   desc:'늘어난 인구를 돌봐요. 도시의 👨‍⚕️의사가 필요하고, 인구 40명마다 한 곳씩 있어야 마을이 건강해요.',
   cost:s=>({brick:2, stone:2, doctor:1}), apply:s=>{}},
  {id:'park', e:'🌳', n:'공원', once:true, lv:2, pop:5,
   desc:'돌과 목재로 만든 쉼터. 마을이 예뻐지고 😊행복이 조금 올라요. 인구도 늘어요(+5명).',
   cost:s=>({stone:3, wood:2}), apply:s=>{s.pop+=5;}},
  {id:'culture', e:'🏛️', n:'문화센터', once:false, max:3, lv:2, pop:3,
   desc:'공연·전시로 마을의 마음을 채우는 곳(최대 3채). 😊행복이 크게 올라요. 산골 목재·광산 돌·도시 벽돌에 도시 🧑‍🏫교사까지 필요해요 — 문화도 여러 지역과 교류해야 채워요! (+3명)',
   cost:s=>({wood:3, stone:2, brick:2+(s.count.culture||0), teacher:1}), apply:s=>{s.pop+=3;}},
  {id:'bridge',e:'🌉', n:'다리', once:true, lv:3, pop:10,
   desc:'돌과 벽돌로 잇는 큰 다리. 마을이 넓어져요(+10명).',
   cost:s=>({stone:3, brick:2}), apply:s=>{s.pop+=10;}},
  {id:'plaza',e:'🎪', n:'축제 광장', once:true, lv:4, pop:20, win:true,
   desc:'모든 지역의 재료가 다 모여야 짓는 마을의 자랑! 완성하면 마을 잔치 🎉',
   cost:s=>({wood:6, stone:5, brick:4, food:12}), apply:s=>{s.pop+=20;}},

const BLD=Object.fromEntries(BUILDINGS.map(b=>[b.id,b]));

const LEVELS=[0,15,35,60,90]; // index = level-1 -> pop needed to BE this level
let state, ui={tab:'trade', region:'sea'}, qi=0;

const QUESTS=[
  {t:'밭 한 칸 일궈 거두기', d:'빈 칸을 눌러 ① 돌을 빼내고 ② 두더지를 피해 땅을 일군 뒤, ③ 씨를 뿌리고 익으면 시들기 전에 따서 식량을 거두세요.',
   prog:s=>[Math.min(s.gotFood,10),10], reward:s=>{s.res.coin+=8;}, rmsg:'첫 수확 성공! 코인 +8'},
  {t:'식량을 팔아 코인 벌기', d:'마을은 식량만 만들어요. 다른 지역에 식량을 팔아 🪙코인 30을 모으세요.',

  {t:'산골 목재·광산 돌 사 오기', d:'산골 마을에서 🪵목재 3개, 광산 마을에서 🪨돌 2개를 교류로 사 오세요. (농가를 지으려면 둘 다 필요해요!)',
   prog:s=>[Math.min(s.gotWood,3)+Math.min(s.gotStone,2),5], reward:s=>{}, rmsg:'두 마을과 교류했어요! 이제 농가를 지어요'},

  {t:'도로를 놓아 도시와 잇기', d:'🛣️도로를 지어 도시와 이어 보세요. 그래야 유통센터·병원을 짓고 도시의 의사·교사를 모셔올 수 있어요.',

  {t:'교사를 모셔와 학교 짓기', d:'산골 목재 + 광산 돌 + 도시 벽돌에, 도시의 🧑‍🏫교사까지 모셔와 학교 🏫를 지으세요.',
   prog:s=>[s.count.school?1:0,1], reward:s=>{s.res.coin+=15;}, rmsg:'한 지역·재료만으론 못 지었죠? 그게 교류예요!'},
  {t:'유통센터 지어 사과값 올리기', d:'🚚유통센터를 지어 식량(사과)을 더 비싸게 파세요.',
   prog:s=>[s.count.market?1:0,1], reward:s=>{s.res.coin+=15;}, rmsg:'이제 사과를 더 비싸게 팔아요!'},
  {t:'비쌀 때 팔아 코인 80 모으기', d:'📈사과 시세는 지역마다 오르내려요. 값이 오른(▲) 지역에 팔아 🪙코인을 한 번에 80개 모아 보세요.',
   prog:s=>[Math.min(s.res.coin,80),80], reward:s=>{s.res.coin+=10;}, rmsg:'시세를 읽었어요! 코인 +10'},
  {t:'병원 지어 늘어난 마을 돌보기', d:'🏥인구가 30명을 넘으면 마을이 아파요. 도시 의사를 모셔와 병원을 지으세요(인구 40명당 한 곳).',
   prog:s=>[s.count.hospital?1:0,1], reward:s=>{s.res.coin+=15;}, rmsg:'마을이 건강해졌어요! 코인 +15'},
  {t:'문화센터 지어 마을 행복 올리기', d:'🏛️인구가 늘면 마을이 따분해져 장사가 안 되고 더 빨리 아파요. 산골 목재·광산 돌·도시 벽돌과 🧑‍🏫교사를 모아 문화센터를 지어 😊행복을 올리세요.',

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* ---------- 마을 축제 진행 ---------- */
function festTick(){
  const f=state.fest; if(!f) return;
  if(state.festPlay) return;   // 입장 게임을 푸는 동안에는 축제 시간이 멈춰요
  f.timeLeft--;
  if(f.timeLeft>0) return;
  if(f.phase==='open'){
    const fc=FEST[f.region];
    toast(`🎪 ${REG[f.region].name}의 ${fc.name}가 끝났어요`);
    f.region=null; f.phase='closed'; f.timeLeft=FEST_GAP; state.festPass=null;
  } else {
    f.idx=(f.idx+1)%f.order.length; f.region=f.order[f.idx]; f.phase='open'; f.timeLeft=FEST_OPEN; state.festPass=null;
    const fc=FEST[f.region];
    toast(`📣 ${REG[f.region].emoji} ${REG[f.region].name}에서 ${fc.emoji} ${fc.name}가 열렸어요! 입장에 도전해요`);
  }
  renderFest(); if(ui.tab==='trade') renderTrade();
}
function festOpenFor(regId){ const f=state.fest; return f && f.phase==='open' && f.region===regId; }
function renderFest(){
  const el=document.getElementById('festbanner'); if(!el) return;
  const f=state.fest;
  if(f && f.phase==='open' && f.region){
    const fc=FEST[f.region], r=REG[f.region];
    el.innerHTML=`<div class="festbar">

        <div class="ft2">남은 시간 ${f.timeLeft}초 · 입장 게임을 통과하면 ${R[fc.good].e}${R[fc.good].n}을(를) 싸게 사요</div></div>
      <button class="fgo" onclick="gotoFest()">가기 ▶</button></div>`;
  } else if(f){
    el.innerHTML=`<div class="festbar closed">
      <span class="femoji" style="animation:none">🗓️</span>

function gotoFest(){ const f=state.fest; if(!f||f.phase!=='open') return;

/* ---------- 시세(시장 가격) ---------- */
// 각 지역: 사과(food) 파는 시세, 특산품(mat) 사는 시세가 천천히 오르내려요
function initMarket(){
  REGIONS.forEach(r=>{
    const good=Object.keys(r.sells)[0];
    state.market[r.id]={
      food:r.foodPrice, foodPrev:r.foodPrice,
      mat:r.sells[good], matPrev:r.sells[good], good
    };
  });
}
function driftMarket(){
  REGIONS.forEach(r=>{
    const m=state.market[r.id];
    // 사과 시세: 기준값 중심으로 랜덤 워크 (기준의 0.5~1.7배)
    m.foodPrev=m.food;
    const fLo=Math.max(1,Math.round(r.foodPrice*0.5)), fHi=Math.ceil(r.foodPrice*1.7);
    m.food=Math.min(fHi,Math.max(fLo, m.food+(Math.floor(Math.random()*3)-1)));
    // 특산품 매입가도 오르내림 (0.6~1.5배)
    m.matPrev=m.mat;
    const mLo=Math.max(1,Math.round(m.good==='brick'?r.sells.brick*0.6:r.sells[m.good]*0.6));
    const mHi=Math.ceil(r.sells[m.good]*1.5);
    m.mat=Math.min(mHi,Math.max(mLo, m.mat+(Math.floor(Math.random()*3)-1)));
  });
}
function trendTag(cur,prev,base){
  if(cur>prev) return '<span class="trend up">▲ 오름</span>';
  if(cur<prev) return '<span class="trend down">▼ 내림</span>';
  return '<span class="trend flat">― 그대로</span>';
}

/* ---------- helpers ---------- */
function level(){ let L=1; for(let i=0;i<LEVELS.length;i++){ if(state.pop>=LEVELS[i]) L=i+1; } return L; }
/* 노동력(인구)에 따라 일굴 수 있는 밭 칸 수: 처음 3칸 + 인구 8명마다 1칸 */
function usablePlots(){ return Math.min(state.plots.length, 3 + Math.floor(state.pop/8)); }
function plotNeed(i){ return Math.max(0,(i-2)*8); }  // i번째 칸을 열기 위해 필요한 인구
/* 유통센터: 식량(사과)을 팔 때 한 채당 +1코인 보너스 */
function foodBonus(){ return state.count.market||0; }
/* 식량 저장 한도: 농가가 곡식을 보관해요 (기본 30 + 농가당 20 + 집당 4) */
function foodCap(){ return 30 + (state.count.farm||0)*20 + (state.count.house||0)*4; }
/* 끼니마다 먹는 생선: 인구÷12(올림). 인구가 늘어도 1인당 소비는 완만해요 */
function fishNeed(){ return Math.ceil(state.pop/12); }
/* 우호도 단계(0~3): 이웃→친구→단짝→평생친구 */
function tier(regId){ return Math.min(3, Math.floor(state.friend[regId]/8)); }
function buyBonus(regId){ return tier(regId)>=3 ? 1 : 0; }  // 평생친구: 살 때마다 덤 +1
/* 마을 건강에 따른 수확 효율 */
function healthMult(){ const h=state.health; if(h>=85) return 1.2; if(h>=60) return 1; if(h>=30) return 0.7; return 0.5; }
/* 😊 마을 행복(마음): 공원·문화센터·축제로 올라가요. 인구가 많을수록 즐길 거리가 더 필요해요 */
function happyTarget(){
  const park=state.count.park||0, culture=state.count.culture||0;
  const base=76 + park*8 + culture*22 + (state.festBoost||0);
  const popPress=Math.floor(state.pop*0.8);   // 큰 마을일수록 행복 기준선이 낮아져요
  return Math.max(0, Math.min(100, base - popPress));
}
function happyLabel(){ const h=state.happy??70;
  if(h>=70) return {t:'아주 즐거워요',e:'😊',c:'var(--good)'};
  if(h>=40) return {t:'그럭저럭이에요',e:'😐',c:'var(--gold)'};
  return {t:'따분하고 시무룩해요',e:'😞',c:'var(--bad)'}; }
/* 행복 → 장사 능률(식량 판매 코인) */
function happyCoinMult(){ const h=state.happy??70; if(h>=75) return 1.15; if(h>=45) return 1; if(h>=20) return 0.85; return 0.7; }
/* 행복 → 건강한 인구 한도 배수(불행하면 더 빨리 아파 병원이 더 필요) */
function happyCapMult(){ const h=state.happy??70; if(h>=60) return 1; if(h>=30) return 0.85; return 0.7; }
/* 병원이 감당하는 건강한 인구: (기본 30 + 병원당 40) × 행복배수 */
function healthyCap(){ return Math.round((30 + (state.count.hospital||0)*40) * happyCapMult()); }
function overcrowded(){ return state.pop > healthyCap(); }
function healthLabel(){ const h=state.health;
  if(h>=85) return {t:'아주 건강해요',c:'var(--good)'};
  if(h>=60) return {t:'건강해요',c:'var(--good)'};
  if(h>=30) return {t:'주의가 필요해요',c:'var(--gold)'};
  return {t:'마을이 아파요',c:'var(--bad)'}; }
function canAfford(cost){ return Object.entries(cost).every(([k,v])=>state.res[k]>=v); }
function pay(cost){ Object.entries(cost).forEach(([k,v])=>state.res[k]-=v); }
function buyPrice(reg,good){ const m=state.market[reg.id]; const base=m?m.mat:reg.sells[good]; return Math.max(1, base-tier(reg.id)); }

      ${hasRoad?rows:`<div class="perks" style="margin-top:6px">🛣️ <b>도로</b>를 먼저 놓아야 도시의 의사·교사를 모셔올 수 있어요.</div>`}`;
  }
  // 축제 카드 (이 지역의 축제가 열려 있을 때)

  if(festOpenFor(reg.id)){
    const fc=FEST[reg.id]; const passed = state.festPass && state.festPass.region===reg.id;
    const joins=state.festJoins[reg.id]||0;
    const joinNote = joins>=1 ? `<span style="color:#2EA66A">참가 ${joins}회 ✓ (둘러봄)</span>`
                              : `참가 ${joins}회 <span style="color:#C0407A">(한 번은 둘러봐요)</span>`;
    let body=`<div class="fc-d">${fc.gameDesc}<br>🎫 ${joinNote}</div>
        <div class="fc-buy"><span class="di" style="font-size:22px">${R[fc.good].e}</span>
          <div style="flex:1"><div class="dn">입장 게임 — ${fc.gameTitle}</div>
            <div class="dp">통과할 때마다 참가 1회 · 특가로 ${R[fc.good].e}${R[fc.good].n} 구매 (한 번만 둘러봐도 OK)</div></div>
          <button class="fbtn enter" data-festenter="1">${passed?'다시 입장 도전 ↻':'입장 도전 ▶'}</button></div>`;
    if(passed){
      const left=state.festPass.qty;
      body+=`<div class="fc-buy" style="margin-top:8px"><span class="di" style="font-size:22px">${R[fc.good].e}</span>
          <div style="flex:1"><div class="dn">${R[fc.good].n} 축제 특가 (남은 ${left}개)</div>
            <div class="dp">1개에 🪙${fc.price}코인 <span style="color:#8a765c">(평소 ${state.market[reg.id].mat}🪙)</span></div></div>
          <button class="fbtn" data-festbuy="1" ${(left>0&&state.res.coin>=fc.price)?'':'disabled'}>${left>0?'사기':'다 샀어요'}</button></div>`;
    }
    festHtml=`<div class="festcard"><div class="fc-t">${fc.emoji} ${reg.name} · ${fc.name} 열림! (${state.fest.timeLeft}초)</div>${body}</div>`;
  }
  pane.innerHTML=`
    <div class="regrow">${tabs}</div>
    ${festHtml}
    <div class="tradecard">
      <p class="rdesc">${reg.emoji} <b>${reg.name}</b> — ${reg.desc}</p>

  const fe=pane.querySelector('[data-festenter]'); if(fe) fe.onclick=()=>openFestGame(reg.id);

/* ===== 축제 입장 게임 + 특가 구매 ===== */
function openFestGame(regId){
  if(!festOpenFor(regId)){ toast('지금은 이 마을 축제가 열려 있지 않아요'); return; }
  state.festPlay=regId;
  const fc=FEST[regId];
  setLandTitle(`${fc.emoji} ${REG[regId].name} ${fc.name} — 입장 게임`);
  let html;
  if(fc.game==='fish'){
    const cfg=JSON.stringify({region:regId, name:fc.name, emoji:fc.emoji, catchE:fc.catchE, catchN:fc.catchN, need:fc.need, decoys:fc.decoys, regName:REG[regId].name});
    html=document.getElementById('festGame').innerHTML.replace('__FEST_CONFIG__', cfg.replace(/</g,'\\u003c'));
  } else {
    const tplId = fc.game==='match'?'festMtn' : fc.game==='tug'?'festMine' : 'festCity';
    html='<!DOCTYPE html><meta charset="utf-8">'+document.getElementById(tplId).innerHTML;
  }
  document.getElementById('landFrame').srcdoc=html;
  document.getElementById('landModal').classList.remove('hide');
}
function buyFest(regId){
  if(!festOpenFor(regId)){ toast('축제가 끝났어요'); return; }
  if(!(state.festPass && state.festPass.region===regId && state.festPass.qty>0)){ toast('먼저 입장 게임을 통과해야 해요'); return; }
  const fc=FEST[regId];
  if(state.res.coin<fc.price){ toast('🪙 코인이 부족해요'); return; }
  state.res.coin-=fc.price; state.res[fc.good]+=1; state.festPass.qty--; state.friend[regId]+=1;
  if(fc.good==='wood') state.gotWood+=1;
  if(fc.good==='stone') state.gotStone+=1;
  flashRes(fc.good); flashRes('coin');
  const r=document.getElementById('pane').getBoundingClientRect();
  floatText(r.left+r.width/2, r.top+40, `+1${R[fc.good].e}`, R[fc.good].c.includes('var')?'#A9743B':'#2EA66A');
  toast(`🎪 축제 특가로 ${R[fc.good].e}${R[fc.good].n}을(를) 샀어요! (남은 ${state.festPass.qty}개)`);
  afterAction();
}

function renderBuild(){
  const pane=document.getElementById('pane'); const L=level();
  const staff=`<div class="perks" style="margin:0 0 12px"><b>👥 보유 인력</b> · 도시에서 모셔와요<br>
    👨‍⚕️ 의사 <b>${state.res.doctor}</b>명 · 🧑‍🏫 교사 <b>${state.res.teacher}</b>명
    ${state.count.road?'':' <span class="next">— 도시 서비스는 🛣️도로를 놓아야 받을 수 있어요</span>'}</div>`;
  pane.innerHTML=staff+BUILDINGS.map(b=>{
    const c=b.cost(state); const built=state.count[b.id]||0;
    const locked=L<b.lv;
    const reqLock=b.req && !(state.count[b.req]>0);
    const maxed=b.max&&(built>=b.max);
    const tradeLock=b.win && REGIONS.some(r=>tier(r.id)<2);
    const festLock=b.win && REGIONS.some(r=>(state.festJoins[r.id]||0)<1);
    const costHtml=Object.entries(c).map(([k,v])=>
      `<span class="${state.res[k]>=v?'':'no'}">${R[k].e}${v}</span>`).join('');
    const affordable=canAfford(c)&&!locked&&!reqLock&&!tradeLock&&!festLock&&!maxed&&!(b.once&&built>0);
    let right;
    if(locked) right=`<span class="lockmsg">레벨 ${b.lv} 필요</span>`;
    else if(reqLock) right=`<span class="lockmsg">${BLD[b.req].e} ${BLD[b.req].n} 먼저</span>`;
    else if(maxed) right=`<span class="lockmsg" style="color:var(--good)">최대 ${b.max}채 ✓</span>`;
    else if(tradeLock) right=`<span class="lockmsg">🤝 모든 지역과 단짝 필요</span>`;
    else if(festLock){ const m=REGIONS.filter(r=>(state.festJoins[r.id]||0)>=1).length; right=`<span class="lockmsg">🎪 모든 축제 둘러보기 (${m}/4)</span>`; }
    else if(b.once&&built>0) right=`<span class="lockmsg" style="color:var(--good)">완성 ✓</span>`;
    else right=`<button class="b build bgo" data-build="${b.id}" ${affordable?'':'disabled'}>짓기</button>`;
    return `<div class="bcard ${locked||reqLock?'locked':''}">
      <div class="be">${b.e}</div>
      <div><div class="bn">${b.n}${built>0&&!b.once?` ×${built}`:''}</div>
        <div class="bd">${b.desc}</div><div class="cost">${costHtml}</div></div>
      ${right}</div>`;
  }).join('');
  pane.querySelectorAll('[data-build]').forEach(b=>b.onclick=()=>build(b.dataset.build));
}

/* ---------- actions ---------- */
function floatText(x,y,txt,color){
  const d=document.createElement('div'); d.className='float'; d.textContent=txt;
  d.style.left=x+'px'; d.style.top=y+'px'; d.style.color=color||'#2EA66A'; d.style.fontSize='20px';
  document.body.appendChild(d);
  requestAnimationFrame(()=>requestAnimationFrame(()=>{d.style.top=(y-46)+'px'; d.style.opacity='0';}));
  setTimeout(()=>d.remove(),820);
}
function toast(msg){ const t=document.getElementById('toast'); t.innerHTML=msg; t.classList.add('show');
  clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove('show'),1700); }

/* 들판 탭 제거됨 — 농사는 칸 기반(아래 inject) */

function hireService(reg,svc){
  if(!(state.count.road>0)){ toast('🛣️ 먼저 도로를 지어야 도시 서비스를 받을 수 있어요'); return; }
  const p=reg.services[svc];
  if(state.res.coin<p){ toast('🪙 코인이 부족해요'); return; }
  state.res.coin-=p; state.res[svc]+=1; state.friend[reg.id]+=2;
  flashRes('coin');
  const r=document.getElementById('pane').getBoundingClientRect();
  floatText(r.left+r.width/2, r.top+40, `+1${R[svc].e}`, R[svc].c);
  toast(`${reg.emoji} ${reg.name}에서 ${R[svc].e}${R[svc].n}을(를) 모셔왔어요!`);
  afterAction();
}
function buyGood(reg,good,q){
  const p=buyPrice(reg,good); const total=p*q;
  if(state.res.coin<total){ toast('🪙 코인이 부족해요'); return; }
  const bonus=buyBonus(reg.id)*q;                 // 평생친구 덤
  state.res.coin-=total; state.res[good]+=q+bonus; state.friend[reg.id]+=q;
  if(good==='wood') state.gotWood+=q+bonus;
  if(good==='stone') state.gotStone+=q+bonus;
  flashRes(good); flashRes('coin');
  const r=document.getElementById('pane').getBoundingClientRect();
  floatText(r.left+r.width/2, r.top+40, `+${q+bonus}${R[good].e}`, R[good].c.includes('var')? '#A9743B':'#2EA66A');
  toast(`${reg.emoji} ${reg.name}에서 ${R[good].e}${R[good].n} ${q}개를 사 왔어요!${bonus?` (평생친구 덤 +${bonus})`:''}`);
  afterAction();
}
function sellFood2(reg,q){
  if(state.res.food<q){ toast('🌾 식량이 부족해요'); return; }
  const unit=state.market[reg.id].food+foodBonus()+tier(reg.id);   // 시세 + 유통센터 + 우호도
  const hm=happyCoinMult();
  const gain=Math.max(1,Math.round(unit*q*hm));   // 마을 행복에 따라 장사 능률이 달라져요
  state.res.food-=q; state.res.coin+=gain; state.totalCoin+=gain; state.friend[reg.id]+=Math.ceil(q/2);
  flashRes('food'); flashRes('coin');
  const r=document.getElementById('pane').getBoundingClientRect();
  floatText(r.left+r.width/2, r.top+40, `+${gain}🪙`, '#E0A500');
  const moodNote = hm>1 ? ' (행복해서 장사 잘돼요!)' : (hm<1 ? ' (시무룩해서 장사가 덜 돼요)' : '');
  toast(`${reg.emoji} ${reg.name}에 식량을 팔아 🪙${gain}코인을 벌었어요!${moodNote}`);
  afterAction();
}

function build(id){
  const b=BLD[id]; const c=b.cost(state); const L=level();
  if(L<b.lv){ toast(`레벨 ${b.lv}부터 지을 수 있어요`); return; }
  if(b.req && !(state.count[b.req]>0)){ toast(`먼저 ${BLD[b.req].e} ${BLD[b.req].n}을(를) 지어야 해요`); return; }
  if(b.win){ const notYet=REGIONS.filter(r=>tier(r.id)<2);
    if(notYet.length){ toast(`🤝 먼저 모든 지역과 단짝이 되어야 해요 (${notYet.map(r=>r.emoji).join(' ')} 아직)`); return; }
    const noFest=REGIONS.filter(r=>(state.festJoins[r.id]||0)<1);
    if(noFest.length){ toast(`🎪 먼저 모든 마을 축제를 한 번씩 둘러봐야 해요 (${noFest.map(r=>r.emoji).join(' ')} 아직)`); return; } }
  if(b.once&&state.count[id]>0) return;
  if(b.max&&(state.count[id]||0)>=b.max){ toast(`${b.n}은(는) 최대 ${b.max}채까지만 지을 수 있어요`); return; }
  if(!canAfford(c)){ toast('재료가 부족해요. 교류로 모아 보세요!'); return; }
  pay(c); state.count[id]=(state.count[id]||0)+1;
  const popBefore=state.pop; b.apply(state);
  let damped=false; const gain=state.pop-popBefore;
  if(gain>0 && state.health<40){ state.pop=popBefore+Math.max(1,Math.round(gain*0.5)); damped=true; }
  RES_ORDER.forEach(flashRes);
  renderVillage(id);
  toast(damped ? '🩺 마을이 아파서 사람이 덜 모였어요. 생선을 먹여 건강을 올려요!' : `${b.e} ${b.n}을(를) 지었어요!`);
  if(b.win){ return win(); }
  afterAction(true);
}

let lastLevel=1;
function afterAction(checkLvl){
  renderRes(); renderHealth(); renderHappy(); renderField(); renderLevel(); renderQuest(); renderPane();
  // 레벨업 알림
  const L=level();
  if(L>lastLevel){ lastLevel=L; toast(`🎉 마을 레벨 ${L} 달성!`); }
  // 퀘스트 완료 체크
  const q=QUESTS[qi];
  if(q){ const [cur,max]=q.prog(state);
    if(cur>=max){ q.reward(state); if(q.rmsg) toast('📜 목표 달성! '+q.rmsg);
      qi=Math.min(qi+1,QUESTS.length-1); renderRes(); renderQuest(); renderPane(); renderLevel(); }
  }
  saveGame();
}

/* ---------- auto tick (idle) ---------- */
setInterval(()=>{
  if(!state||state.over) return;
  // 들판 시계: 축제·미니게임 모달이 열려 있는 동안에는 멈춰요 (돌아와도 작물이 그대로!)
  if(state.farmMs==null) state.farmMs=0;
  const landEl=document.getElementById('landModal');
  const fieldPaused = landEl && !landEl.classList.contains('hide');
  if(!fieldPaused){
    state.farmMs += 1000;
    let fieldChanged=false;
    for(let i=0;i<state.plots.length;i++){
      const p=state.plots[i]; if(!p) continue;
      if(p.st==='planted'){
        const el=state.farmMs-(p.plantAt||0);
        if(p.grow===0 && el>=GROW_MS*0.45){ p.grow=1; fieldChanged=true; }
        if(el>=GROW_MS){ p.st='grown'; p.ripeAt=state.farmMs; fieldChanged=true; toast('다 익었어요! 시들기 전에 어서 따세요 🍎'); }
      } else if(p.st==='grown'){
        if(state.farmMs-(p.ripeAt||0) >= WITHER_MS){ p.st='withered'; fieldChanged=true; toast('아… 작물이 시들었어요 🥀 다시 씨를 뿌려요'); }
      }
    }
    if(fieldChanged) renderField();
  }
  let changed=false;
  if(state.prod.food>0){ state.res.food=Math.min(foodCap(),state.res.food+state.prod.food); changed=true; }
  if(state.prod.coin>0){ state.res.coin+=state.prod.coin; state.totalCoin+=state.prod.coin; changed=true; }
  if(state.prod.fish>0){ state.res.fish+=state.prod.fish; changed=true; }
  // 마을 식탁: 끼니(MEAL_EVERY초)마다 생선을 함께 먹어요. 인구가 늘어도 1인당 소비는 완만해요
  const before=state.health;
  state.mealTick=(state.mealTick||0)+1;
  if(state.mealTick>=MEAL_EVERY){
    state.mealTick=0;
    const fishWant=fishNeed();
    if(fishWant<=0){ state.health=Math.min(100,state.health+3); }
    else if(state.res.fish>=fishWant){ state.res.fish-=fishWant; state.health=Math.min(100,state.health+3); changed=true; }
    else { state.res.fish=0; state.health=Math.max(0,state.health-5); changed=true; }
    // 인구 과밀: 병원이 모자라면 끼니마다 마을이 아파요
    if(overcrowded()){ state.health=Math.max(0,state.health-4); }
    // 😊 행복도 끼니마다 목표치로 천천히 움직여요 (축제 효과는 서서히 식어요)
    if(state.festBoost>0) state.festBoost=Math.max(0,state.festBoost-3);
    const ht=happyTarget(), hb=state.happy??70;
    if(hb<ht) state.happy=Math.min(ht,hb+3);
    else if(hb>ht) state.happy=Math.max(ht,hb-3);
    changed=true;
  }
  if(state.health!==before) changed=true;
  // 시세 변동: 몇 초마다 지역 가격이 오르내려요
  state.marketTick=(state.marketTick||0)+1;
  if(state.marketTick>=5){ state.marketTick=0; driftMarket(); if(ui.tab==='trade') renderTrade(); }
  festTick(); renderFest();
  if(changed){ renderRes(); renderHealth(); renderHappy(); renderQuest(); if(ui.tab==='build')renderBuild(); }
  state._tickSave=(state._tickSave||0)+1;
  if(state._tickSave>=5){ state._tickSave=0; saveGame(true); }   // 5초마다 자동 저장(유휴 진행 포함)
},1000);

    <p>우리 마을은 <b>식량밖에</b> 못 만들어요. 나머지는 모두 <b>이웃 지역과 교류</b>해서 구해 큰 마을로 키워요!</p>
    <div class="how"><b class="how-h">이렇게 키워요</b>
      <div class="hcols">
      <div class="hstep">① 🌾 <b>농사</b> — 빈 칸을 눌러 밭을 만들고, 익으면 시들기 전에 따요. (땅은 여러 번 쓰면 다시 일구고, 창고가 차기 전에 팔아요.)</div>
      <div class="hstep">② 🤝 <b>교류</b> — 식량을 팔아 🪙코인을 벌고, 목재·돌·벽돌·생선을 사 와요.</div>
      <div class="hstep">③ 🏗️ <b>건설</b> — 재료로 건물을 지으면 인구·레벨이 올라요. 큰 건물일수록 여러 지역 재료가 필요해요.</div>
      <div class="hstep">④ 🛣️ <b>도로·도시</b> — 도로를 놓으면 도시의 👨‍⚕️의사·🧑‍🏫교사를 모셔와 학교·병원·문화센터를 지어요.</div>
      <div class="hstep">⑤ 🩺 <b>건강</b> — 인구가 늘면 🐟생선을 먹이고 🏥병원을 지어야 해요. 아프면 수확이 줄어요.</div>
      <div class="hstep">⑥ 😊 <b>행복</b> — 🌳공원·🏛️문화센터·🎪축제로 즐겁게 해요. 행복하면 장사가 잘되고, 따분하면 더 빨리 아파요.</div>
      <div class="hstep">⑦ 📈 <b>시세·우호도</b> — 값이 오른(▲) 곳에 팔고, 친해질수록 더 싸게 사고 비싸게 팔아요.</div>
      <div class="hstep">⑧ 🎉 <b>완성</b> — 네 지역과 모두 단짝이 되고 모든 축제를 둘러본 뒤, 축제 광장을 지으면 끝!</div>
      </div></div>
    <p style="font-size:13.5px;color:#B5700F">💡 혼자선 못 커요 — 여러 지역과 <b>교류</b>해야 마을이 완성돼요!</p>
    <button class="bigbtn" onclick="hideOverlay()">마을 시작하기 ▶</button>`);
}

/* ========== 들판 12칸 + 농사(곱셈/나눗셈) ========== */
function genCfg(i){
  const rows=2+(i%2), cols=3+(i%3), seed=2+(i%3), yld=2+(i%2);
  const baskets=[4,5,6,7,8][i%5];
  return {rows,cols,seed,yield:yld,baskets};
}
function renderField(){
  const wrap=document.getElementById('plots'); if(!wrap||!state.plots) return;
  const usable=usablePlots();
  wrap.innerHTML=state.plots.map((p,i)=>{
    if(i>=usable){
      return `<div class="plot locked" data-i="${i}"><div class="plot-in"><span class="lockicon">🔒</span></div><div class="plot-lab">인구 ${plotNeed(i)}명</div></div>`;
    }
    let inner='', label='', cls='';
    if(p.st==='empty'){ inner='<span class="rk">🪨</span><span class="rk2">🪨</span>'; label='돌밭'; }
    else if(p.st==='cleared'){ inner='<span style="font-size:18px">🟫</span>'; label='땅 일구기'; }
    else if(p.st==='tilled'){ inner='<span style="font-size:18px">🟫✨</span>'; label='씨 뿌리기'; }
    else if(p.st==='planted'){ inner=`<span class="sprout ${p.grow>=1?'g1':'g0'}">${p.grow>=1?'🌳':'🌱'}</span>`; label='자라는 중'; }
    else if(p.st==='grown'){
      const elapsed=Math.max(0,(state.farmMs||0)-(p.ripeAt||0));
      inner=`<span class="crop aptreecrop">🌳<i>🍎</i></span><i class="witherbar" style="animation:wither ${WITHER_MS}ms linear forwards;animation-delay:-${elapsed}ms"></i>`;
      label='지금 따요!'; cls=' ripe';
    }
    else if(p.st==='withered'){ inner='<span style="font-size:22px;filter:grayscale(.6)">🥀</span>'; label='시들었어요'; }
    const ready=(p.st==='cleared'||p.st==='tilled'||p.st==='grown')?' ready':'';
    return `<div class="plot ${p.st}${ready}${cls}" data-i="${i}"><div class="plot-in">${inner}</div><div class="plot-lab">${label}</div></div>`;
  }).join('');
}

/* 선택지 */
function makeChoices(correct,n,spread){
  const set=new Set([correct]); let g=0;
  while(set.size<n && g++<60){ let off=(Math.floor(Math.random()*spread)+1)*(Math.random()<0.5?-1:1); let v=correct+off; if(v>=0) set.add(v); }
  return [...set].sort(()=>Math.random()-0.5);
}
function renderChoices(correct, choices, hintEl, onRight){
  const wrap=document.createElement('div'); wrap.className='choices';
  choices.forEach(v=>{
    const b=document.createElement('button'); b.className='choice'; b.textContent=v;
    b.onclick=()=>{
      if(v===correct){ b.classList.add('right'); [...wrap.children].forEach(x=>x.onclick=null);
        if(hintEl){hintEl.textContent='정답이에요! 🌟'; hintEl.className='fhint ok';} setTimeout(onRight,500);
      } else { b.classList.add('wrong'); if(hintEl){hintEl.textContent='다시 세어 볼까요?'; hintEl.className='fhint no';}
        setTimeout(()=>b.classList.remove('wrong'),350); }
    };
    wrap.appendChild(b);
  });
  return wrap;
}
function showPanel(html){ document.getElementById('farmPanelCard').innerHTML=html; document.getElementById('farmPanel').classList.remove('hide'); }
function hidePanel(){ document.getElementById('farmPanel').classList.add('hide'); }

/* ② 씨 뿌리기 → 자람 → 익음 → (시간 내 안 따면 시듦) — 들판 시계(state.farmMs) 기준, 축제 중에는 멈춤 */
const GROW_MS=9000, WITHER_MS=12000, SOIL_MAX=3, MEAL_EVERY=3;
function farmNow(){ return state.farmMs||0; }
function sow(i){
  const p=state.plots[i]; if(!p||p.st!=='tilled') return;
  p.st='planted'; p.grow=0; p.cycle=(p.cycle||0)+1;
  p.plantAt=farmNow(); p.ripeAt=null;
  renderField(); toast('씨를 뿌렸어요 🌱 자라는 걸 기다려요…');
  afterAction();
}
function harvest(i){
  const p=state.plots[i]; if(!p||p.st!=='grown') return;
  const hm=healthMult();
  const raw=Math.max(1,Math.round((p.claimed||6)*(p.rockQ||1)*hm));
  const cap=foodCap(), room=Math.max(0,cap-state.res.food);
  const food=Math.min(raw,room);
  state.res.food+=food; state.gotFood+=raw; p.cycle=(p.cycle||0)+1;
  // 지력 소모: SOIL_MAX번 수확하면 땅 기운이 다해 다시 일궈야 해요
  p.harvests=(p.harvests||0)+1;
  let depleted=false;
  if(p.harvests>=SOIL_MAX){ p.st='cleared'; p.harvests=0; p.claimed=0; depleted=true; }
  else { p.st='tilled'; }
  flashRes('food'); renderField();
  const box=document.getElementById('plots').getBoundingClientRect();
  floatText(box.left+box.width/2, box.top+30, `+${food}🌾`, '#2EA66A');
  if(depleted){ toast('🚜 땅 기운이 다했어요 — 칸을 눌러 다시 일궈요 (두더지 피하기)'); }
  else if(food<raw){ toast(`📦 창고가 가득 찼어요(${cap})! 식량을 팔아 자리를 비워요`); }
  else { const extra = hm>1 ? ' (건강해서 +20%!)' : (hm<1 ? ' (마을이 아파 수확 ↓)' : ''); toast(`🌾 식량 +${food}${extra} · 또 씨를 뿌려요`); }
  afterAction();
}

/* 땅 손질: ① 돌 빼내기(기존 게임) → ② 땅 일구기(%) */
function setLandTitle(t){ const el=document.getElementById('landTitle'); if(el) el.textContent=t; }
function openRock(i){            // 기존 돌빼내기 게임 (그대로)
  state.tillingPlot=i;
  const lvl=Math.min(i,10);
  const html=document.getElementById('landGame').innerHTML.replace('__PLOT_INDEX__', lvl);
  setLandTitle('🪨 돌 빼내기 — 돌을 밀어내 밭을 만들어요');
  document.getElementById('landFrame').srcdoc=html;
  document.getElementById('landModal').classList.remove('hide');
}
function openTillGame(i){        // 새 땅 일구기(%) 게임 — 두더지를 피해 땅 차지
  state.tillingPlot=i;
  const html=document.getElementById('tillGame').innerHTML;
  setLandTitle('🚜 땅 일구기 — 두더지를 피해 땅을 차지해요');
  document.getElementById('landFrame').srcdoc=html;
  document.getElementById('landModal').classList.remove('hide');
}
function closeLandGame(){ state.festPlay=null; document.getElementById('landModal').classList.add('hide'); document.getElementById('landFrame').srcdoc=''; if(state.plots) renderField(); }

document.getElementById('plots').addEventListener('click',e=>{
  const c=e.target.closest('.plot'); if(!c||state.over) return;
  const i=+c.dataset.i, p=state.plots[i];
  if(i>=usablePlots()){ toast(`👥 일손이 부족해요. 집을 지어 인구를 ${plotNeed(i)}명까지 늘리면 이 밭을 쓸 수 있어요`); return; }
  if(p.st==='empty') openRock(i);
  else if(p.st==='cleared') openTillGame(i);
  else if(p.st==='tilled') sow(i);
  else if(p.st==='grown') harvest(i);
  else if(p.st==='withered'){ p.st='tilled'; p.cycle=(p.cycle||0)+1; renderField(); toast('시든 작물을 치웠어요. 다시 씨를 뿌려요 🌱'); }
  else toast('작물이 자라는 중이에요… 잠깐만요 🌱');
});
document.getElementById('landClose').addEventListener('click',closeLandGame);
function closePanel(){ if(state._apTimer){clearInterval(state._apTimer); state._apTimer=null;} hidePanel(); }
document.getElementById('farmPanelClose').addEventListener('click',closePanel);
window.addEventListener('message',e=>{
  const d=e.data||{}; const i=state.tillingPlot;
  if(d.type==='tilled'){            // 돌 빼내기 완료 → 흙(cleared)
    if(i==null||!state.plots[i]) return;
    state.plots[i].st='cleared'; state.plots[i].rockQ=d.quality||1; state.tillingPlot=null;
    closeLandGame(); renderField();
    toast('돌을 다 치웠어요! 이제 땅을 일궈요 🚜');
    afterAction();
  } else if(d.type==='claimed'){    // 땅 일구기 완료 → 일군 밭(tilled)
    if(i==null||!state.plots[i]) return;
    state.plots[i].st='tilled'; state.plots[i].claimed=Math.max(1,Math.round((d.pct||0)/100*25)); state.tillingPlot=null;
    closeLandGame(); renderField();
    toast(`밭을 ${d.pct}% 일궜어요! 씨를 뿌려요 🌱`);
    afterAction();
  } else if(d.type==='festpass'){   // 축제 입장 게임 통과
    const reg=state.festPlay; state.festPlay=null; closeLandGame();
    if(!festOpenFor(reg)){ toast('아쉽게도 축제가 끝났어요…'); afterAction(); return; }
    const fc=FEST[reg];
    state.festJoins[reg]=(state.festJoins[reg]||0)+1;
    state.festBoost=Math.min(30,(state.festBoost||0)+18);   // 😊 축제로 마을이 즐거워져요(서서히 식어요)
    state.happy=Math.min(100,(state.happy??70)+8);
    state.festPass={region:reg, qty:fc.limit};
    const n=state.festJoins[reg];
    toast(`🎟️ ${fc.name} 입장 성공! 😊마을이 즐거워졌어요 · ${R[fc.good].e}${R[fc.good].n}을(를) 특가로 ${fc.limit}개까지 살 수 있어요`);
    if(ui.tab==='trade'){ ui.region=reg; renderTrade(); }
    renderQuest();
    afterAction();
  } else if(d.type==='festfail'){
    state.festPlay=null; closeLandGame(); toast('이번엔 못 잡았어요. 다시 도전해 보세요!');
  }
});

/* ================= 저장 / 이어하기 ================= */
const SAVE_KEY='osodoson_village_save_v2';
let storageOK=true, _saveThrottle=0, _saveTagTimer=null;
function flashSaved(){
  const el=document.getElementById('saveTag'); if(!el) return;
  el.style.opacity='1';
  clearTimeout(_saveTagTimer);
  _saveTagTimer=setTimeout(()=>{ el.style.opacity='0'; }, 1100);
}
function saveGame(force){
  if(!storageOK || !state) return;
  const now=Date.now();
  if(!force && now-_saveThrottle<500) return;   // 너무 잦은 저장 방지
  _saveThrottle=now;
  try{
    localStorage.setItem(SAVE_KEY, JSON.stringify({v:2, ts:now, state, qi, lastLevel, ui}));
    flashSaved();
  }catch(e){ storageOK=false; }
}
function loadSnap(){
  try{ const raw=localStorage.getItem(SAVE_KEY); if(!raw) return null;
    const s=JSON.parse(raw); return (s&&s.state)?s:null;
  }catch(e){ storageOK=false; return null; }
}
function clearSave(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }
function applySnap(s){
  state=s.state; qi=s.qi||0; lastLevel=s.lastLevel||1; ui=s.ui||{tab:'trade',region:'sea'};
  // 진행 중이던 미니게임/모달 상태는 초기화 (돌아오면 깨끗하게)
  state.tillingPlot=null; state.festPlay=null;
  if(state.farmMs==null) state.farmMs=0;
  // 빠진 값 보정 (안전)
  if(state.happy==null) state.happy=85;
  if(state.festBoost==null) state.festBoost=0;
  if(state.gotStone==null) state.gotStone=0;
  if(!state.count) state.count={};
  if(!state.prod) state.prod={food:0,coin:0,fish:0};
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on', t.dataset.tab===ui.tab));
  renderAll();
  if(state.over) win();   // 이미 완성한 마을이면 축하 화면을 다시 보여줘요
}

/* 새로 시작 버튼 */
document.getElementById('restart').addEventListener('click',()=>{
  showOverlay(`<div style="font-size:42px">🔁</div>
    <h2>새로 시작할까요?</h2>
    <p>지금 마을의 <b>저장된 진행이 모두 사라지고</b> 처음부터 시작해요.</p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px">
      <button class="bigbtn" id="rsYes">처음부터 시작</button>
      <button class="bigbtn" id="rsNo" style="background:#bdbdbd;box-shadow:0 5px 0 #8f8f8f">취소</button>
    </div>`);
  document.getElementById('rsYes').onclick=()=>{ hideOverlay(); clearSave(); lastLevel=1; newGame(); saveGame(true); intro(); };
  document.getElementById('rsNo').onclick=hideOverlay;
});

/* 시작할 때: 저장된 마을이 있으면 이어하기 / 새로 시작 선택 */
function showResume(snap){
  const s=snap.state;
  const mins=Math.max(0,Math.round((Date.now()-(snap.ts||Date.now()))/60000));
  const ago = mins<1?'방금 전':(mins<60?`${mins}분 전`:`${Math.round(mins/60)}시간 전`);
  showOverlay(`<div style="font-size:44px">🏡💾</div>
    <h2>이어서 할까요?</h2>
    <p>저장된 마을이 있어요.<br><b>인구 ${s.pop||0}명</b> · 목표 ${(snap.qi||0)+1}단계 · 저장 ${ago}</p>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:8px">
      <button class="bigbtn" id="btnResume">▶ 이어하기</button>
      <button class="bigbtn" id="btnNew" style="background:#bdbdbd;box-shadow:0 5px 0 #8f8f8f">🔁 새로 시작</button>
    </div>`);
  document.getElementById('btnResume').onclick=()=>{ hideOverlay(); applySnap(snap); };
  document.getElementById('btnNew').onclick=()=>{ hideOverlay(); clearSave(); newGame(); saveGame(true); intro(); };
}

(function boot(){
  const snap = loadSnap();
  if(snap){ showResume(snap); }
  else { newGame(); intro(); if(!storageOK){ /* 저장 불가 환경 */ } }
})();
</script>

<script>
/* ============ verified engine ============ */
const COLORS=[
  {l:'#a39a8d',d:'#6f665a'}, {l:'#ab9f8e',d:'#766a58'}, {l:'#9aa0a4',d:'#666c70'},
  {l:'#b0a288',d:'#7a6e54'}, {l:'#9ea3a6',d:'#6a6f72'}, {l:'#a99e8e',d:'#736857'},
  {l:'#979d93',d:'#646a60'}, {l:'#aea493',d:'#796f5d'},
];
function dims(cells){let a=1e9,b=-1e9,c=1e9,d=-1e9;for(const[r,cc]of cells){a=Math.min(a,r);b=Math.max(b,r);c=Math.min(c,cc);d=Math.max(d,cc);}return{minr:a,maxr:b,minc:c,maxc:d,h:b-a+1,w:d-c+1};}
function orient(cells){const o=dims(cells);if(o.w>1&&o.h===1)return'h';if(o.h>1&&o.w===1)return'v';return's';}
function occOthers(pcs,idx){const s=new Set();pcs.forEach((q,i)=>{if(i===idx)return;q.cells.forEach(([r,c])=>s.add(r+','+c));});return s;}
function maxOnboard(cells,dr,dc,occ,R,C){let s=0;while(true){const ns=cells.map(([r,c])=>[r+dr*(s+1),c+dc*(s+1)]);let ok=true;for(const[r,c]of ns){if(r<0||r>=R||c<0||c>=C||occ.has(r+','+c)){ok=false;break;}}if(!ok)break;s++;}return s;}
/* distance from target's right edge to wall, free? -> can exit if maxFwd === distToWall and lane open */

/* ============ levels (all BFS-verified solvable) ============ */
const LEVELS=[
  {R:6,C:6,par:3,gate:{edge:'right',row:2},pieces:[
    {t:1,cells:[[2,0],[2,1]]},
    {cells:[[0,3],[1,3],[2,3]]},
    {cells:[[5,3],[5,4]]},
  ]},
  {R:6,C:6,par:4,gate:{edge:'right',row:2},pieces:[
    {t:1,cells:[[2,0],[2,1]]},
    {cells:[[2,2],[3,2]]},
    {cells:[[0,4],[1,4],[2,4]]},
    {cells:[[0,2],[0,3]]},
    {cells:[[4,3],[4,4]]},
    {cells:[[3,5],[4,5]]},
  ]},
  {R:6,C:6,par:5,gate:{edge:'right',row:3},pieces:[
    {t:1,cells:[[3,0],[3,1]]},
    {cells:[[1,2],[2,2],[3,2]]},
    {cells:[[3,4],[4,4]]},
    {cells:[[3,5],[4,5]]},
    {cells:[[0,2],[0,3]]},
    {cells:[[5,3],[5,4]]},
    {cells:[[0,5],[1,5]]},
  ]},
  {R:6,C:6,par:6,gate:{edge:'right',row:2},pieces:[
    {t:1,cells:[[2,0],[2,1]]},
    {cells:[[3,2],[4,2]]},
    {cells:[[1,2],[1,3]]},
    {cells:[[0,4],[1,4],[2,4]]},
    {cells:[[2,5],[3,5]]},
    {cells:[[4,3],[4,4],[4,5]]},
  ]},
  {R:8,C:8,par:6,gate:{edge:'right',row:3},pieces:[
    {t:1,cells:[[3,0],[3,1]]},
    {cells:[[4,5],[5,5]]},
    {cells:[[3,6],[4,6]]},
    {cells:[[2,3],[3,3],[4,3]]},
    {cells:[[5,3],[6,3],[7,3]]},
    {cells:[[2,2],[3,2]]},
    {cells:[[1,7],[2,7],[3,7]]},
    {cells:[[3,4],[4,4],[5,4]]},
  ]},
  {R:6,C:6,par:7,gate:{edge:'right',row:3},pieces:[
    {t:1,cells:[[3,0],[3,1]]},
    {cells:[[1,5],[2,5],[3,5]]},
    {cells:[[1,2],[2,2],[3,2]]},
    {cells:[[0,2],[0,3],[0,4]]},
    {cells:[[4,4],[5,4]]},
    {cells:[[1,3],[2,3]]},
    {cells:[[4,0],[4,1],[4,2]]},
  ]},
  {R:6,C:6,par:8,gate:{edge:'right',row:4},pieces:[
    {t:1,cells:[[4,0],[4,1]]},
    {cells:[[2,2],[3,2],[4,2]]},
    {cells:[[1,4],[1,5]]},
    {cells:[[3,5],[4,5],[5,5]]},
    {cells:[[2,3],[2,4],[2,5]]},
    {cells:[[2,0],[2,1]]},
    {cells:[[5,2],[5,3]]},
  ]},
  {R:6,C:6,par:9,gate:{edge:'right',row:3},pieces:[
    {t:1,cells:[[3,0],[3,1]]},
    {cells:[[3,4],[4,4],[5,4]]},
    {cells:[[0,3],[1,3],[2,3]]},
    {cells:[[2,5],[3,5],[4,5]]},
    {cells:[[3,2],[4,2]]},
    {cells:[[1,4],[1,5]]},
    {cells:[[0,2],[1,2]]},
  ]},
  {R:7,C:7,par:9,gate:{edge:'right',row:3},pieces:[
    {t:1,cells:[[3,0],[3,1]]},
    {cells:[[2,6],[3,6],[4,6]]},
    {cells:[[3,2],[4,2]]},
    {cells:[[5,2],[6,2]]},
    {cells:[[0,5],[1,5],[2,5]]},
    {cells:[[1,0],[1,1],[1,2]]},
    {cells:[[6,4],[6,5]]},
    {cells:[[1,4],[2,4],[3,4]]},
  ]},
  {R:6,C:6,par:10,gate:{edge:'right',row:3},pieces:[
    {t:1,cells:[[3,0],[3,1]]},
    {cells:[[3,5],[4,5],[5,5]]},
    {cells:[[0,1],[0,2],[0,3]]},
    {cells:[[2,3],[2,4],[2,5]]},
    {cells:[[1,2],[1,3],[1,4]]},
    {cells:[[3,2],[4,2],[5,2]]},
    {cells:[[4,3],[4,4]]},
  ]},
];

/* ============ state ============ */
let st;
const board=document.getElementById('board');
const stage=document.getElementById('stage');
let CELL=64;
const elMap=new Map();
let solvedSet=new Set();

function deep(pcs){return pcs.map(p=>({...p,cells:p.cells.map(c=>c.slice())}));}

function computeCell(R,C){
  const availW=Math.min(window.innerWidth-28, 560);
  const availH=window.innerHeight-300;
  let c=Math.floor(Math.min(availW/(C+1.6), availH/(R+1.2), 76));
  return Math.max(34,c);
}

function loadLevel(i){
  const L=LEVELS[i];
  CELL=computeCell(L.R,L.C);
  document.documentElement.style.setProperty('--cell',CELL+'px');
  st={i, R:L.R, C:L.C, gate:L.gate, par:L.par, pieces:deep(L.pieces), moves:0, history:[], sel:null, lastMove:null};
  st.pieces.forEach((p,idx)=>{p.id='p'+idx; p.color=p.t?null:COLORS[(idx-1+COLORS.length)%COLORS.length];});
  document.getElementById('lvNum').textContent=i+1;
  document.getElementById('par').textContent=L.par;
  buildBoard();
  render();
}

const GAP=3;
let dirEls={};
function buildBoard(){
  board.innerHTML=''; elMap.clear(); dirEls={};
  board.style.width=st.C*CELL+'px';
  board.style.height=st.R*CELL+'px';
  // clear grid tiles
  for(let r=0;r<st.R;r++)for(let c=0;c<st.C;c++){
    const t=document.createElement('div'); t.className='cellbg';
    t.style.left=(c*CELL+GAP)+'px'; t.style.top=(r*CELL+GAP)+'px';
    t.style.width=(CELL-2*GAP)+'px'; t.style.height=(CELL-2*GAP)+'px';
    board.appendChild(t);
  }
  const T=Math.round(CELL*0.30);
  const gr=st.gate.row, gapTop=gr*CELL, gapH=CELL;
  const W=st.C*CELL, H=st.R*CELL;
  mkWall(-T,-T,W+2*T,T);
  mkWall(-T,H,W+2*T,T);
  mkWall(-T,0,T,H);
  if(gapTop>0) mkWall(W,0,T,gapTop);
  if(gapTop+gapH<H) mkWall(W,gapTop+gapH,T,H-(gapTop+gapH));
  const g=document.createElement('div'); g.className='gate';
  g.style.left=(W+T+4)+'px'; g.style.top=(gapTop+CELL/2-12)+'px';
  g.innerHTML='<span>치우기</span><span class="arrow">🚜</span>';
  board.appendChild(g);
  // pieces
  st.pieces.forEach(p=>{
    const el=document.createElement('div');
    el.className='piece'+(p.t?' target':'');
    const d=dims(p.cells);
    el.style.width=(d.w*CELL-8)+'px'; el.style.height=(d.h*CELL-8)+'px';
    if(p.t){el.style.background='linear-gradient(160deg,#ffb15a,#ff7a3c 50%,#ec4f1e)';
      el.innerHTML='<span class="speck"></span><span class="star">🪨</span><span class="tlabel">빼낼 돌</span>';}
    else{el.style.background=`linear-gradient(160deg,${p.color.l},${p.color.d})`;
      el.innerHTML='<span class="speck"></span>';}
    el.dataset.id=p.id;
    board.appendChild(el);
    elMap.set(p.id,el);
    attachDrag(el,p);
  });
  // direction buttons (one per direction, repositioned on selection)
  const ARR=Math.min(Math.round(CELL*0.64),46);
  ['up','down','left','right'].forEach(d=>{
    const b=document.createElement('div'); b.className='dir'; b.dataset.dir=d;
    b.style.width=ARR+'px'; b.style.height=ARR+'px';
    b.style.fontSize=Math.round(ARR*0.6)+'px';
    b.textContent={up:'▲',down:'▼',left:'◀',right:'▶'}[d];
    board.appendChild(b); dirEls[d]=b;
  });
}
function mkWall(x,y,w,h){const d=document.createElement('div');d.className='wall';
  d.style.left=x+'px';d.style.top=y+'px';d.style.width=w+'px';d.style.height=h+'px';board.appendChild(d);}

function layout(p,animate){
  const el=elMap.get(p.id); if(!el)return;
  const d=dims(p.cells);
  el.style.transition=animate?'':'none';
  el.style.transform='translate(0,0)';
  el.style.left=(d.minc*CELL+4)+'px';
  el.style.top=(d.minr*CELL+4)+'px';
  if(!animate){ requestAnimationFrame(()=>{el.style.transition='';}); }
}
function showMoves(){
  const el=document.getElementById('mv'); if(!el||!st)return;
  el.textContent=st.moves;
  el.style.color=(st.moves>st.par)?'#e0653c':'';
  el.style.fontWeight=(st.moves>st.par)?'700':'';
}
function render(){
  st.pieces.forEach(p=>layout(p,false));
  showMoves();
  st.pieces.forEach(p=>{const el=elMap.get(p.id);el&&el.classList.toggle('sel',st.sel===p.id&&!p.t);});
}

/* ===== direction buttons ===== */
function hideDirs(){ for(const k in dirEls) dirEls[k].style.display='none'; }
function targetCanExit(p){
  if(!p.t||st.gate.edge!=='right')return false;
  const occ=occOthers(st.pieces,st.pieces.indexOf(p));
  const fwd=maxOnboard(p.cells,0,1,occ,st.R,st.C);
  const d=dims(p.cells);
  return d.minr===st.gate.row&&d.maxr===st.gate.row&&fwd===st.C-1-d.maxc;
}
function showDirs(p){
  hideDirs();
  if(!p||p.gone)return;
  const o=orient(p.cells), d=dims(p.cells);
  const occ=occOthers(st.pieces,st.pieces.indexOf(p));
  const ARR=Math.min(Math.round(CELL*0.64),46), off=8;
  const box={l:d.minc*CELL, t:d.minr*CELL, w:d.w*CELL, h:d.h*CELL};
  const cy=box.t+box.h/2-ARR/2, cx=box.l+box.w/2-ARR/2;
  const place=(dir,x,y,enabled,exit,act)=>{
    const b=dirEls[dir];
    b.style.left=x+'px'; b.style.top=y+'px'; b.style.display='flex';
    b.className='dir'+(exit?' exit':'')+(enabled||exit?'':' off');
    b.textContent = exit?'➜':{up:'▲',down:'▼',left:'◀',right:'▶'}[dir];
    b.onclick = (enabled||exit)? act : null;
  };
  const dirs = o==='v' ? ['up','down'] : ['left','right'];
  dirs.forEach(dir=>{
    if(dir==='right'){
      const exit=targetCanExit(p);
      const can=maxOnboard(p.cells,0,1,occ,st.R,st.C)>=1;
      place('right', box.l+box.w+off, cy, can, exit, exit?()=>doExit(p):()=>moveSteps(p,0,1,1));
    } else if(dir==='left'){
      const can=maxOnboard(p.cells,0,-1,occ,st.R,st.C)>=1;
      place('left', box.l-ARR-off, cy, can, false, ()=>moveSteps(p,0,-1,1));
    } else if(dir==='up'){
      const can=maxOnboard(p.cells,-1,0,occ,st.R,st.C)>=1;
      place('up', cx, box.t-ARR-off, can, false, ()=>moveSteps(p,-1,0,1));
    } else {
      const can=maxOnboard(p.cells,1,0,occ,st.R,st.C)>=1;
      place('down', cx, box.t+box.h+off, can, false, ()=>moveSteps(p,1,0,1));
    }
  });
}

/* move by whole cells with smooth animation */
function moveSteps(p,dr,dc,steps){
  if(steps<=0||p.gone)return;
  pushHistory();
  const el=elMap.get(p.id);
  const before=dims(p.cells);
  p.cells=p.cells.map(([r,c])=>[r+dr*steps,c+dc*steps]);
  const after=dims(p.cells);
  registerMove(p,dr,dc); playSlide();
  const ddx=(after.minc-before.minc)*CELL, ddy=(after.minr-before.minr)*CELL;
  el.style.transition='none';
  el.style.left=(after.minc*CELL+4)+'px'; el.style.top=(after.minr*CELL+4)+'px';
  el.style.transform=`translate(${-ddx}px,${-ddy}px)`;
  requestAnimationFrame(()=>{ el.style.transition='transform .18s cubic-bezier(.34,1.3,.5,1)'; el.style.transform='translate(0,0)'; });
  showDirs(p);
}

/* ============ drag handling ============ */
function attachDrag(el,p){
  let startX,startY,axis,fwdMax,backMax,canExit,dragging=false,offX=0,offY=0;
  el.addEventListener('pointerdown',e=>{
    if(p.gone)return;
    initSound();
    const o=orient(p.cells);
    axis = o==='v' ? 'y' : 'x';            // h & single default to x; single also y handled below
    st.sel=p.id; render(); hideDirs();
    const occ=occOthers(st.pieces, st.pieces.indexOf(p));
    if(o==='h'||o==='s'){ fwdMax=maxOnboard(p.cells,0,1,occ,st.R,st.C); backMax=maxOnboard(p.cells,0,-1,occ,st.R,st.C); axis='x'; }
    else { fwdMax=maxOnboard(p.cells,1,0,occ,st.R,st.C); backMax=maxOnboard(p.cells,-1,0,occ,st.R,st.C); axis='y'; }
    // exit check (target, horizontal, gate right, correct row)
    canExit=false;
    if(p.t && st.gate.edge==='right'){
      const d=dims(p.cells);
      const distWall=st.C-1-d.maxc;
      if(d.minr===st.gate.row && d.maxr===st.gate.row && fwdMax===distWall) canExit=true;
    }
    startX=e.clientX; startY=e.clientY; dragging=true; offX=0; offY=0;
    el.style.transition='none'; el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove',e=>{
    if(!dragging)return;
    let dx=e.clientX-startX, dy=e.clientY-startY;
    if(axis==='x'){
      let lo=-backMax*CELL, hi=fwdMax*CELL;
      if(canExit) hi += (dims(p.cells).w+1)*CELL;      // allow sliding out
      offX=Math.max(lo,Math.min(hi,dx)); offY=0;
    } else {
      offY=Math.max(-backMax*CELL,Math.min(fwdMax*CELL,dy)); offX=0;
    }
    el.style.transition='none';
    el.style.transform=`translate(${offX}px,${offY}px)`;
  });
  function end(e){
    if(!dragging)return; dragging=false;
    const raw = axis==='x'?offX:offY;
    let steps=Math.round(raw/CELL);
    // exit?
    if(canExit && axis==='x' && steps>=fwdMax){ doExit(p); return; }
    steps=Math.max(-backMax,Math.min(fwdMax,steps));
    commit(p,axis,steps,raw);
    showDirs(p);
  }
  el.addEventListener('pointerup',end);
  el.addEventListener('pointercancel',end);
}

function pushHistory(){ st.history.push({pieces:deep(st.pieces), moves:st.moves, last:st.lastMove}); if(st.history.length>200)st.history.shift(); }

/* 같은 돌을 같은 방향으로 이어서 움직이면 한 수로 칩니다 (한 칸씩 눌러도 최소 수 가능) */
function registerMove(p,udr,udc){
  const l=st.lastMove;
  const cont = l && l.id===p.id && l.dr===udr && l.dc===udc;
  if(!cont) st.moves++;
  st.lastMove={id:p.id, dr:udr, dc:udc};
  showMoves();
}

function commit(p,axis,steps,rawOff){
  const el=elMap.get(p.id);
  if(steps===0){ el.style.transition='transform .18s'; el.style.transform='translate(0,0)'; return; }
  pushHistory();
  const dr=axis==='y'?steps:0, dc=axis==='x'?steps:0;
  p.cells=p.cells.map(([r,c])=>[r+dr,c+dc]);
  registerMove(p, Math.sign(dr), Math.sign(dc));
  playSlide();
  // smooth snap from current drag offset to grid
  const d=dims(p.cells);
  const leftoverX=(axis==='x'? rawOff-steps*CELL:0);
  const leftoverY=(axis==='y'? rawOff-steps*CELL:0);
  el.style.transition='none';
  el.style.left=(d.minc*CELL+4)+'px'; el.style.top=(d.minr*CELL+4)+'px';
  el.style.transform=`translate(${leftoverX}px,${leftoverY}px)`;
  requestAnimationFrame(()=>{ el.style.transition='transform .18s cubic-bezier(.34,1.3,.5,1)'; el.style.transform='translate(0,0)'; });
}

function doExit(p){
  hideDirs();
  pushHistory();
  const el=elMap.get(p.id);
  st.moves++; showMoves();
  p.gone=true; st.sel=null;
  const off=(st.C+2)*CELL - (dims(p.cells).minc*CELL); // slide fully off to the right
  el.style.transition='transform .42s ease-in, opacity .42s ease-in';
  el.style.transform=`translate(${off}px,0)`;
  playExit();
  setTimeout(()=>{ el.classList.add('exiting'); },180);
  setTimeout(()=>{ el.remove(); checkWin(); },560);
}

function checkWin(){
  const target=st.pieces.find(p=>p.t);
  if(target && target.gone){ onWin(); }
}

/* keyboard nudge for selected piece (1 cell) */
window.addEventListener('keydown',e=>{
  if(!st||!st.sel)return;
  const p=st.pieces.find(x=>x.id===st.sel); if(!p||p.gone)return;
  const o=orient(p.cells); const occ=occOthers(st.pieces,st.pieces.indexOf(p));
  const map={ArrowRight:[0,1],ArrowLeft:[0,-1],ArrowUp:[-1,0],ArrowDown:[1,0]};
  const m=map[e.key]; if(!m)return;
  if(o==='h'&&m[0]!==0)return; if(o==='v'&&m[1]!==0)return;
  e.preventDefault();
  const [dr,dc]=m; const can=maxOnboard(p.cells,dr,dc,occ,st.R,st.C);
  // exit by keyboard
  if(p.t&&dc===1&&st.gate.edge==='right'){const d=dims(p.cells);if(d.minr===st.gate.row&&can===st.C-1-d.maxc){ doExit(p); return; }}
  if(can>0) moveSteps(p,dr,dc,1);
});
