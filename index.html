/* ============ confetti ============ */
function confetti(){
  const cols=['#ff7a5c','#7ed957','#5ab8ff','#ffc24d','#b58cff','#ff9ecb'];
  for(let i=0;i<70;i++){
    const c=document.createElement('div'); c.className='conf';
    c.style.left=Math.random()*100+'vw'; c.style.background=cols[i%cols.length];
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    const dur=1.6+Math.random()*1.4, x=(Math.random()*2-1)*120;
    c.animate([{transform:`translate(0,0) rotate(0)`,opacity:1},
      {transform:`translate(${x}px,${window.innerHeight+60}px) rotate(${720+Math.random()*360}deg)`,opacity:1}],
      {duration:dur*1000, easing:'cubic-bezier(.3,.6,.6,1)'});
    setTimeout(()=>c.remove(),dur*1000);
  }
}

/* ============ sound ============ */
let actx=null, muted=false;
function initSound(){ if(!actx){try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){}} }
function beep(freq,dur,type='sine',vol=0.18){ return; /* 소리 끔 */
  if(muted||!actx)return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type=type;o.frequency.value=freq;o.connect(g);g.connect(actx.destination);
  g.gain.setValueAtTime(vol,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001,actx.currentTime+dur);
  o.start();o.stop(actx.currentTime+dur);}
function playSlide(){beep(330,0.08,'triangle',0.14);}
function playExit(){[523,659,784].forEach((f,i)=>setTimeout(()=>beep(f,0.12,'square',0.16),i*70));}
function playWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'triangle',0.2),i*120));}
document.getElementById('muteBtn').onclick=function(){muted=!muted;this.textContent=muted?'🔇':'🔊';};

/* ============ 농사: 곱셈(씨뿌리기) · 나눗셈(거두기) ============ */
let farm={harvest:0, plots:0, cells:0};
const FARMS=[
  {rows:2,cols:3,seed:2,yield:2,baskets:6},
  {rows:3,cols:3,seed:2,yield:2,baskets:4},
  {rows:3,cols:4,seed:3,yield:2,baskets:8},
  {rows:3,cols:5,seed:3,yield:2,baskets:7},
  {rows:4,cols:5,seed:4,yield:2,baskets:6},
  {rows:5,cols:6,seed:4,yield:3,baskets:8},
];
function farmCfg(i){
  if(FARMS[i]) return FARMS[i];
  return {rows:4+(i%3), cols:5+(i%3), seed:4, yield:3, baskets:6+(i%4)};
}
function updateFarmHUD(){
  document.getElementById('hPlots').textContent=farm.plots;
  document.getElementById('hCells').textContent=farm.cells;
  document.getElementById('hHarvest').textContent=farm.harvest;
}
const farmOv=document.getElementById('farm'), farmCard=document.getElementById('farmCard');
function showFarm(){ farmOv.style.display='flex'; }
function hideFarm(){ farmOv.style.display='none'; }

/* 보기(선택지) 생성: 정답 + 그럴듯한 오답 */
function makeChoices(correct, n, spread){
  const set=new Set([correct]);
  let guard=0;
  while(set.size<n && guard++<60){
    let off=(Math.floor(Math.random()*spread)+1)*(Math.random()<0.5?-1:1);
    let v=correct+off;
    if(v>=0) set.add(v);
  }
  return [...set].sort(()=>Math.random()-0.5);
}
/* 한 문제 렌더: 보기 버튼, 정답 시 onRight */
function renderChoices(correct, choices, hintEl, onRight){
  const wrap=document.createElement('div'); wrap.className='choices';
  choices.forEach(v=>{
    const b=document.createElement('button'); b.className='choice'; b.textContent=v;
    b.onclick=()=>{
      if(v===correct){ b.classList.add('right'); initSound(); beep(720,0.12,'triangle',0.18);
        [...wrap.children].forEach(x=>x.onclick=null);
        hintEl.textContent='정답이에요! 잘했어요 🌟'; hintEl.className='fhint ok';
        setTimeout(onRight, 520);
      } else {
        b.classList.add('wrong'); beep(180,0.12,'sawtooth',0.14);
        hintEl.textContent='다시 한 번 세어 볼까요?'; hintEl.className='fhint no';
        setTimeout(()=>b.classList.remove('wrong'),360);
      }
    };
    wrap.appendChild(b);
  });
  return wrap;
}

function startFarming(i){
  const cfg=farmCfg(i);
  sowStep(cfg, i);
}

/* ===== 1단계: 씨 뿌리기 (곱셈, 배열 모형) ===== */
function sowStep(cfg, i){
  const holes=cfg.rows*cfg.cols;
  const gridHtml = `<div class="plotgrid" id="plotgrid" style="grid-template-columns:repeat(${cfg.cols},1fr)">`
    + Array.from({length:holes}).map(()=>`<div class="hole"><span class="sd">🌱</span></div>`).join('')
    + `</div>`;
  farmCard.innerHTML = `
    <span class="fstep">1단계 · 씨 뿌리기 🌱</span>
    <h2>밭을 다 골랐어요! 이제 씨를 뿌려요</h2>
    <p class="qtext">한 줄에 구멍이 <b>${cfg.cols}</b>개씩, <b>${cfg.rows}</b>줄이에요.<br>씨앗 구멍은 모두 몇 개일까요?</p>
    <div class="eqn">${cfg.cols} × ${cfg.rows} = <span class="box" id="ansbox">?</span></div>
    ${gridHtml}
    <div class="fhint" id="fhint">구멍을 줄별로 세어 보세요.</div>
    <div id="choicearea"></div>`;
  showFarm();
  const hint=document.getElementById('fhint');
  const ca=document.getElementById('choicearea');
  const choices=makeChoices(holes, 4, Math.max(3,cfg.rows));
  ca.appendChild(renderChoices(holes, choices, hint, ()=>{
    document.getElementById('ansbox').textContent=holes;
    const hs=[...document.querySelectorAll('#plotgrid .hole')];
    hs.forEach((h,idx)=>setTimeout(()=>h.classList.add('seeded'), idx*45));
    setTimeout(()=>{
      if(cfg.seed>1) sowStep2(cfg,i,holes);
      else harvestStep(cfg,i,holes*cfg.yield);
    }, hs.length*45+450);
  }));
}
/* 한 구멍에 여러 씨앗 → 두 번째 곱셈 */
function sowStep2(cfg,i,holes){
  const total=holes*cfg.seed;
  farmCard.innerHTML = `
    <span class="fstep">1단계 · 씨 뿌리기 🌱</span>
    <h2>한 구멍에 씨앗을 더 넣어요</h2>
    <p class="qtext">구멍 <b>${holes}</b>개에 씨앗을 <b>${cfg.seed}</b>개씩 심으면,<br>씨앗은 모두 몇 개일까요?</p>
    <div class="eqn">${holes} × ${cfg.seed} = <span class="box">?</span></div>
    <div class="fhint" id="fhint2">구멍 수 × 한 구멍 씨앗 수!</div>
    <div id="choicearea2"></div>`;
  const hint=document.getElementById('fhint2');
  const choices=makeChoices(total, 4, Math.max(4,cfg.seed*2));
  document.getElementById('choicearea2').appendChild(
    renderChoices(total, choices, hint, ()=>harvestStep(cfg,i,total*cfg.yield)));
}

/* ===== 2단계: 거두기 (나눗셈, 똑같이 나누기 + 나머지) ===== */
function harvestStep(cfg,i,total){
  const B=cfg.baskets, q=Math.floor(total/B), r=total%B;
  const basketsHtml = `<div class="baskets">`
    + Array.from({length:B}).map(()=>`<div class="basket"><div class="top">🧺</div><div class="cnt">?</div></div>`).join('')
    + `</div>`;
  farmCard.innerHTML = `
    <span class="fstep div">2단계 · 거두기 🧺</span>
    <h2 class="div">쑥쑥 자라 ${total}개를 거뒀어요!</h2>
    <p class="qtext">수확물 <b>${total}</b>개를 바구니 <b>${B}</b>개에 <b>똑같이</b> 나눠 담아요.<br>한 바구니에 몇 개씩 담길까요?</p>
    <div class="eqn">${total} ÷ ${B} = <span class="box" id="qbox">?</span></div>
    ${basketsHtml}
    <div class="fhint" id="dhint">바구니마다 똑같은 개수가 되도록!</div>
    <div id="choicearea3"></div>`;
  showFarm();
  const hint=document.getElementById('dhint');
  const choices=makeChoices(q,4,Math.max(2,Math.round(q*0.4)+1));
  document.getElementById('choicearea3').appendChild(
    renderChoices(q, choices, hint, ()=>{
      document.getElementById('qbox').textContent=q;
      const cnts=[...document.querySelectorAll('.basket .cnt')];
      cnts.forEach((c,idx)=>setTimeout(()=>{c.textContent=q;},idx*90));
      setTimeout(()=>{
        if(r>0) remainderStep(cfg,i,total,q,r);
        else finishFarm(cfg,i,total);
      }, cnts.length*90+400);
    }));
}
function remainderStep(cfg,i,total,q,r){
  const B=cfg.baskets;
  const hintBase=document.getElementById('dhint');
  hintBase.textContent='바구니에 똑같이 담고… 남는 게 있어요!'; hintBase.className='fhint';
  const lo=document.createElement('div'); lo.innerHTML=`
    <p class="qtext" style="margin-top:14px">바구니마다 ${q}개씩 담았어요. 그런데 <b>남는 수확물</b>은 몇 개일까요?<br>
      <span style="font-size:14px;color:#7a6a52">(${total} ÷ ${B} = ${q} … 나머지 ?)</span></p>
    <div id="choicearea4"></div>`;
  farmCard.appendChild(lo);
  const hint=document.createElement('div'); hint.className='fhint'; farmCard.appendChild(hint);
  const choices=makeChoices(r, Math.min(4,B), Math.max(2,Math.min(B-1,3)));
  document.getElementById('choicearea4').appendChild(
    renderChoices(r, choices, hint, ()=>{
      const lab=document.createElement('div'); lab.className='leftover';
      lab.textContent=`남은 ${r}개는 우리 집 몫! 🍚`;
      farmCard.appendChild(lab);
      setTimeout(()=>finishFarm(cfg,i,total), 700);
    }));
}

function finishFarm(cfg,i,total){
  farm.harvest+=total; farm.plots++; farm.cells+=cfg.rows*cfg.cols;
  updateFarmHUD();
  const last = i>=LEVELS.length-1;

      ${last?'모든 밭을 다 일궜어요! 정말 멋진 농부예요 🏆':'땅이 점점 넓어져요. 다음 밭은 더 크고 돌도 많아요!'}</p>

}

<div class="wrap">
  <div class="top">
    <div class="pct"><b id="pct">0</b>%<small>일군 땅</small></div>
    <div class="goal">🎯 목표 <b id="goal">52</b>%</div>

  <div class="hint" id="hint">땅을 <b>드래그</b>해서 차지하세요! 🐀 두더지와 부딪치면 일구기 실패, 판 구멍은 못 써요.</div>
  <div class="stage">
    <div class="grid" id="grid"></div>
    <div class="moles" id="moles"></div>
  </div>
  <div class="btns"><button class="btn done" id="done" disabled>일구기 끝 ▶</button></div>
</div>
<script>
  const COLS=10, ROWS=5, TOTAL=COLS*ROWS, TARGET=25;   // 10x5=50칸, 목표 25칸(50%)
  const MOLE_SVG='<svg viewBox="0 0 40 40" width="30" height="30"><ellipse cx="20" cy="25" rx="13" ry="11" fill="#6b4f3a"/><ellipse cx="20" cy="28" rx="8.5" ry="6.5" fill="#8a6a4f"/><circle cx="20" cy="17" r="9" fill="#6b4f3a"/><ellipse cx="20" cy="20" rx="4.6" ry="3.6" fill="#f3a6b0"/><circle cx="20" cy="20.5" r="1.5" fill="#5b3a2a"/><circle cx="16" cy="15" r="1.4" fill="#2a1a12"/><circle cx="24" cy="15" r="1.4" fill="#2a1a12"/><path d="M9 27 q-3 1 -4 4" stroke="#f3a6b0" stroke-width="2.6" fill="none" stroke-linecap="round"/><path d="M31 27 q3 1 4 4" stroke="#f3a6b0" stroke-width="2.6" fill="none" stroke-linecap="round"/></svg>';
  const grid=document.getElementById('grid'), molesEl=document.getElementById('moles');
  let cells=[];
  for(let i=0;i<TOTAL;i++){ cells.push('open'); const d=document.createElement('div'); d.className='c open'; d.dataset.i=i; grid.appendChild(d); }
  const cellEls=[...grid.children];
  document.getElementById('goal').textContent=Math.round(TARGET/TOTAL*100);
  document.getElementById('barTgt').style.left=(TARGET/TOTAL*100)+'%';
  const rc=i=>[Math.floor(i/COLS), i%COLS], idx=(r,c)=>r*COLS+c;
  const claimedCount=()=>cells.filter(s=>s==='claimed').length;
  const openCount=()=>cells.filter(s=>s==='open').length;
  function paint(){
    cells.forEach((s,i)=>{ cellEls[i].className='c '+s; });
    const cc=claimedCount(), pct=Math.round(cc/TOTAL*100);
    document.getElementById('pct').textContent=pct;
    document.getElementById('barFill').style.width=pct+'%';
    document.getElementById('done').disabled = cc<1;
  }
  // 드래그로 사각형 차지
  let dragStart=null, dragCur=null;
  function cellFromEvent(e){ const el=document.elementFromPoint(e.clientX,e.clientY); const c=el&&el.closest&&el.closest('.c'); return c?+c.dataset.i:null; }
  function moleInRect(r1,c1,r2,c2){
    const R1=Math.min(r1,r2),R2=Math.max(r1,r2),C1=Math.min(c1,c2),C2=Math.max(c1,c2);
    return moles.some(mo=>{ const mr=Math.floor(mo.y), mc=Math.floor(mo.x); return mr>=R1&&mr<=R2&&mc>=C1&&mc<=C2; });
  }
  function shakeGrid(){ grid.classList.remove('shake'); void grid.offsetWidth; grid.classList.add('shake'); }
  function showPreview(){
    cellEls.forEach(el=>el.classList.remove('prev','bad'));
    if(dragStart==null||dragCur==null) return;
    const [r1,c1]=rc(dragStart),[r2,c2]=rc(dragCur);
    const bad=moleInRect(r1,c1,r2,c2);
    for(let r=Math.min(r1,r2);r<=Math.max(r1,r2);r++) for(let c=Math.min(c1,c2);c<=Math.max(c1,c2);c++)
      if(cells[idx(r,c)]==='open'){ const el=cellEls[idx(r,c)]; el.classList.add('prev'); if(bad) el.classList.add('bad'); }
  }
  function commit(){
    if(dragStart==null||dragCur==null){ dragStart=dragCur=null; return; }
    const [r1,c1]=rc(dragStart),[r2,c2]=rc(dragCur);
    cellEls.forEach(el=>el.classList.remove('prev','bad'));
    if(moleInRect(r1,c1,r2,c2)){   // 두더지와 부딪히면 일구기 실패
      dragStart=dragCur=null; shakeGrid(); hint('🐀 두더지와 부딪혔어요! 두더지가 없는 곳을 그어요.'); return;
    }
    let got=0;
    for(let r=Math.min(r1,r2);r<=Math.max(r1,r2);r++) for(let c=Math.min(c1,c2);c<=Math.max(c1,c2);c++)
      if(cells[idx(r,c)]==='open'){ cells[idx(r,c)]='claimed'; got++; }
    dragStart=dragCur=null; paint();
    if(got) hint('+'+got+'칸 차지! 더 넓게 드래그해 보세요.');
    if(openCount()===0) finish();
  }
  grid.addEventListener('pointerdown',e=>{ e.preventDefault(); dragStart=cellFromEvent(e); dragCur=dragStart; showPreview(); });
  window.addEventListener('pointermove',e=>{ if(dragStart==null) return; const c=cellFromEvent(e); if(c!=null){ dragCur=c; showPreview(); } });
  window.addEventListener('pointerup',()=>{ if(dragStart!=null) commit(); });
  // 두더지
  const moles=[]; const MOLE_N=3, DIG_MS=1500;
  for(let m=0;m<MOLE_N;m++){
    moles.push({x:0.5+Math.random()*(COLS-1), y:0.5+Math.random()*(ROWS-1), vx:(Math.random()<.5?-1:1)*0.17, vy:(Math.random()<.5?-1:1)*0.17});
    const d=document.createElement('div'); d.className='mole'; d.innerHTML=MOLE_SVG; molesEl.appendChild(d);
  }
  const moleEls=[...molesEl.children];
  function stepMoles(){
    moles.forEach((mo,k)=>{
      let nx=mo.x+mo.vx, ny=mo.y+mo.vy;
      if(nx<0.5){nx=0.5;mo.vx=Math.abs(mo.vx);} if(nx>COLS-0.5){nx=COLS-0.5;mo.vx=-Math.abs(mo.vx);}
      if(ny<0.5){ny=0.5;mo.vy=Math.abs(mo.vy);} if(ny>ROWS-0.5){ny=ROWS-0.5;mo.vy=-Math.abs(mo.vy);}
      if(cells[idx(Math.floor(ny),Math.floor(nx))]==='claimed'){ mo.vx=-mo.vx; mo.vy=-mo.vy; nx=mo.x; ny=mo.y; }
      mo.x=nx; mo.y=ny;
      const el=moleEls[k]; el.style.left=(nx/COLS*100)+'%'; el.style.top=(ny/ROWS*100)+'%';
    });
    if(dragStart!=null) showPreview();
  }
  function dig(){
    moles.forEach(mo=>{ const i=idx(Math.floor(mo.y),Math.floor(mo.x)); if(cells[i]==='open' && openCount()>1){ cells[i]='hole'; } });
    paint();
  }
  setInterval(stepMoles,120);
  setTimeout(()=>setInterval(dig,DIG_MS),2000);   // 2초 뒤부터 두더지가 땅을 파요
  let ht=null;
  function hint(t){ const h=document.getElementById('hint'); h.innerHTML=t; clearTimeout(ht); ht=setTimeout(()=>{ h.innerHTML='땅을 <b>드래그</b>해서 차지하세요! 🐀 두더지와 부딪치면 실패해요.'; },1800); }
  let done=false;
  function finish(){ if(done) return; done=true; const cc=Math.max(1,claimedCount()), pct=Math.round(cc/TOTAL*100);
    try{ window.parent.postMessage({type:'claimed', claimed:cc, pct:pct}, '*'); }catch(e){} }
  document.getElementById('done').addEventListener('click',finish);
  paint();
</script>
</template>

</style>
<div class="wrap">

  </div>
  <div class="goal">잡아야 할 것: <b id="tgtBig">🐟</b> <span id="tgtName">물고기</span> — 움직여서 목표만 담아요!</div>
  <div class="arena" id="arena">
    <div class="player" id="player">🧺</div>
    <div class="over" id="startOver">
      <h2 id="overTitle">입장 게임</h2>
      <p style="margin:0;font-size:14px">아래 버튼이나 방향키로 바구니를 움직여<br><b id="tgtName2">물고기</b>를 <b id="need2">6</b>마리 담아요.<br>다른 건 담으면 한 마리 놓쳐요!</p>
      <button class="big" id="startBtn">시작 ▶</button>
    </div>

      <h2 id="endTitle">성공!</h2>
      <p id="endMsg" style="margin:0;font-size:15px"></p>

    <button class="pl" data-dir="left">◀</button>

    <button class="pr" data-dir="right">▶</button>
  </div>
  <div class="hint">이동: 방향키·WASD 또는 버튼 · 목표에 닿으면 자동으로 담겨요</div>
</div>
<script>
(function(){
  "use strict";
  var CFG = __FEST_CONFIG__;
  var need=CFG.need, target=CFG.catchE, decoys=CFG.decoys;
  document.getElementById('need').textContent=need;
  document.getElementById('need2').textContent=need;
  document.getElementById('tgtBig').textContent=target;
  document.getElementById('tgtName').textContent=CFG.catchN;
  document.getElementById('tgtName2').textContent=CFG.catchN;
  document.getElementById('overTitle').textContent=CFG.emoji+' '+CFG.regName+' '+CFG.name;
  var arena=document.getElementById('arena'), playerEl=document.getElementById('player');
  var W=0,H=0, PR=26, ER=20;
  function measure(){ W=arena.clientWidth; H=arena.clientHeight; }
  var state='start', caught=0, timeLeft=35, px=0, py=0, dirX=0, dirY=0, keys={}, invuln=0;
  var ents=[]; // {el,x,y,vx,vy,tgt}
  var SPEED=4.0;
  function rnd(a,b){ return a+Math.random()*(b-a); }
  function farFromPlayer(x,y){ var dx=x-px,dy=y-py; return dx*dx+dy*dy>90*90; }
  function spawn(isTgt){
    var x,y,t=0; do{ x=rnd(ER,W-ER); y=rnd(ER,H-ER); t++; }while(!farFromPlayer(x,y)&&t<20);
    var a=Math.random()*Math.PI*2, sp=isTgt?rnd(0.9,1.7):rnd(0.7,1.5);
    var el=document.createElement('div'); el.className='ent'+(isTgt?' tgt':'');
    el.textContent=isTgt?target:decoys[Math.floor(Math.random()*decoys.length)];
    arena.appendChild(el);
    ents.push({el:el,x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,tgt:isTgt});
  }
  function pop(x,y,txt,col){ var s=document.createElement('div'); s.className='pop'; s.textContent=txt;
    s.style.color=col||'#fff'; s.style.left=x+'px'; s.style.top=y+'px'; arena.appendChild(s);
    setTimeout(function(){s.remove();},700); }
  function startGame(){
    measure(); state='play'; caught=0; timeLeft=35; invuln=0;
    px=W/2; py=H*0.7; dirX=dirY=0;
    ents.forEach(function(e){e.el.remove();}); ents=[];
    for(var i=0;i<5;i++) spawn(true);
    for(var j=0;j<8;j++) spawn(false);
    document.getElementById('caught').textContent=0;
    document.getElementById('time').textContent=timeLeft;
    if(timer) clearInterval(timer);
    timer=setInterval(function(){ if(state!=='play')return; timeLeft--;
      document.getElementById('time').textContent=Math.max(0,timeLeft);
      if(timeLeft<=0) endGame(false); },1000);
    render();
  }
  var timer=null;
  function endGame(ok){
    state='end'; if(timer){clearInterval(timer);timer=null;}
    var ov=document.getElementById('endOver'); ov.classList.remove('hide');
    document.getElementById('endTitle').textContent=ok?'🎟️ 입장 성공!':'⏰ 시간 끝!';
    document.getElementById('endMsg').textContent=ok?(CFG.catchN+' '+need+'마리를 다 잡았어요!'):('조금 더 빨리! '+caught+'/'+need+' 잡았어요.');
    document.getElementById('endBtn').textContent=ok?'축제 입장 ▶':'마을로 ▶';
    document.getElementById('endBtn').onclick=function(){
      try{ window.parent.postMessage({type: ok?'festpass':'festfail'}, '*'); }catch(e){}
    };
  }
  function render(){
    playerEl.style.left=px+'px'; playerEl.style.top=py+'px';
    if(invuln>0) playerEl.classList.add('hit'); else playerEl.classList.remove('hit');
    ents.forEach(function(e){ e.el.style.left=e.x+'px'; e.el.style.top=e.y+'px'; });
  }
  function step(){
    if(state==='play'){
      var ix=0,iy=0; if(keys.left)ix--; if(keys.right)ix++; if(keys.up)iy--; if(keys.down)iy++;
      if(ix||iy){ var m=Math.hypot(ix,iy)||1; dirX=ix/m; dirY=iy/m; } else dirX=dirY=0;
      px=Math.max(PR,Math.min(W-PR,px+dirX*SPEED));
      py=Math.max(PR,Math.min(H-PR,py+dirY*SPEED));
      if(invuln>0) invuln--;
      for(var i=ents.length-1;i>=0;i--){ var e=ents[i];
        e.x+=e.vx; e.y+=e.vy;
        if(e.x<ER){e.x=ER;e.vx*=-1;} if(e.x>W-ER){e.x=W-ER;e.vx*=-1;}
        if(e.y<ER){e.y=ER;e.vy*=-1;} if(e.y>H-ER){e.y=H-ER;e.vy*=-1;}
        var dx=e.x-px, dy=e.y-py;
        if(dx*dx+dy*dy < (PR+ER)*(PR+ER)*0.55){
          if(e.tgt){ caught++; document.getElementById('caught').textContent=caught;
            pop(e.x,e.y,'+1','#b6f24a'); e.el.remove(); ents.splice(i,1);
            setTimeout(function(){ if(state==='play') spawn(true); },700);
            if(caught>=need){ endGame(true); }
          } else if(invuln<=0){ caught=Math.max(0,caught-1); document.getElementById('caught').textContent=caught;
            pop(e.x,e.y,'-1','#ff8fb0'); invuln=40;
            var nx,ny,t=0; do{ nx=rnd(ER,W-ER); ny=rnd(ER,H-ER); t++; }while(!farFromPlayer(nx,ny)&&t<20);
            e.x=nx; e.y=ny;
          }
        }
      }
      render();
    }
    requestAnimationFrame(step);
  }
  var keyMap={ArrowLeft:'left',a:'left',A:'left',ArrowRight:'right',d:'right',D:'right',
    ArrowUp:'up',w:'up',W:'up',ArrowDown:'down',s:'down',S:'down'};
  window.addEventListener('keydown',function(e){ var k=keyMap[e.key]; if(k){ keys[k]=true; e.preventDefault(); } });

    b.addEventListener('pointerleave',off); b.addEventListener('pointercancel',off);
  });
  document.getElementById('startBtn').addEventListener('click',function(){
    document.getElementById('startOver').classList.add('hide'); startGame(); });
  window.addEventListener('resize',measure);
  measure(); render(); requestAnimationFrame(step);
})();
</script>

/* ===== 문제 ===== */
function makeProblem(grade){
  switch(grade){
    case 1:
      if(rand(0,1)){const a=rand(2,9),b=rand(2,Math.min(9,18-a));return{display:`${a} + ${b}`,answer:a+b,type:'add'};}
      else{const a=rand(5,18),b=rand(1,a);return{display:`${a} − ${b}`,answer:a-b,type:'sub'};}
    case 2:{const t=rand(1,4);
      if(t===1){const a=rand(11,89),b=rand(2,9);return{display:`${a} + ${b}`,answer:a+b,type:'add1'};}
      if(t===2){const a=rand(21,99),b=rand(2,9);return{display:`${a} − ${b}`,answer:a-b,type:'sub1'};}
      if(t===3){const a=rand(2,7)*10,b=rand(2,9)*10;return{display:`${a} + ${b}`,answer:a+b,type:'tens'};}
      const a=rand(2,9),b=rand(2,9);return{display:`${a} × ${b}`,answer:a*b,type:'mult'};}
    case 3:{const t=rand(1,4);
      if(t===1){const a=rand(2,9),b=rand(2,9);return{display:`${a} × ${b}`,answer:a*b,type:'mult'};}
      if(t===2){const q=rand(2,9),d=rand(2,9);return{display:`${q*d} ÷ ${d}`,answer:q,type:'div'};}
      if(t===3){const a=rand(2,9),b=rand(2,9)*10;return{display:`${a} × ${b}`,answer:a*b,type:'multten'};}
      const a=rand(3,9)*10,b=rand(2,8)*10;
      if(rand(0,1))return{display:`${a} + ${b}`,answer:a+b,type:'tens'};
      const hi=Math.max(a,b),lo=Math.min(a,b);return{display:`${hi} − ${lo}`,answer:hi-lo,type:'tens'};}
    case 4:{const t=rand(1,4);
      if(t===1){const a=rand(12,99);return{display:`${a} × 10`,answer:a*10,type:'x10'};}
      if(t===2){const a=rand(2,20);return{display:`${a} × 100`,answer:a*100,type:'x100'};}
      if(t===3){const a=rand(2,9),b=rand(2,9)*10;return{display:`${a} × ${b}`,answer:a*b,type:'multten'};}
      const u=rand(2,9),d=rand(2,9);return{display:`${u*d*10} ÷ ${d}`,answer:u*10,type:'divbig'};}
    case 5:{const t=rand(1,3);
      if(t===1){const a=rand(10,50),b=rand(2,9),c=rand(2,9);return{display:`${a} + ${b} × ${c}`,answer:a+b*c,type:'addmult'};}
      if(t===2){const b=rand(2,6),c=rand(2,6),bc=b*c,a=rand(bc+1,bc+40);return{display:`${a} − ${b} × ${c}`,answer:a-bc,type:'submult'};}
      const q=rand(2,9),d=rand(2,9),a=rand(5,40);return{display:`${a} + ${q*d} ÷ ${d}`,answer:a+q,type:'divmix'};}
    case 6:{const t=rand(1,3);
      if(t===1){const a=rand(2,9),b=rand(2,9),c=rand(2,9),d=rand(2,9),L=a*b,R=c*d;
        if(L>=R)return{display:`${a} × ${b} − ${c} × ${d}`,answer:L-R,type:'diffmult'};
        return{display:`${c} × ${d} − ${a} × ${b}`,answer:R-L,type:'diffmult'};}
      if(t===2){const a=rand(2,9),b=rand(2,9),c=rand(2,9),d=rand(2,9);return{display:`${a} × ${b} + ${c} × ${d}`,answer:a*b+c*d,type:'summult'};}
      const q=rand(2,9),d=rand(2,9),m=rand(2,6);return{display:`${q*d} ÷ ${d} × ${m}`,answer:q*m,type:'divcancel'};}
  }
}

// 약간 난이도 높은 보너스 문제 (10문제마다, 맞히면 2칸)
function makeBonus(grade){
  switch(grade){
    case 1:{const t=rand(1,3);
      if(t===1){const a=rand(11,19),b=rand(3,9);return{display:`${a} + ${b}`,answer:a+b,type:'b1',bonus:true};}
      if(t===2){const a=rand(21,29),b=rand(3,9);return{display:`${a} − ${b}`,answer:a-b,type:'b1',bonus:true};}
      const a=rand(3,7),b=rand(3,7),c=rand(2,6);return{display:`${a} + ${b} + ${c}`,answer:a+b+c,type:'b1',bonus:true};}
    case 2:{const t=rand(1,2);
      if(t===1){const a=rand(23,69),b=rand(15,48);return{display:`${a} + ${b}`,answer:a+b,type:'b2',bonus:true};}
      const a=rand(45,89),b=rand(15,a-10);return{display:`${a} − ${b}`,answer:a-b,type:'b2',bonus:true};}
    case 3:{const a=rand(13,29),b=rand(3,7);return{display:`${a} × ${b}`,answer:a*b,type:'b3',bonus:true};}
    case 4:{const a=rand(11,49),m=[11,12,15][rand(0,2)];return{display:`${a} × ${m}`,answer:a*m,type:'b4',bonus:true};}
    case 5:{const a=rand(5,15),b=rand(4,12),c=rand(3,7);return{display:`(${a} + ${b}) × ${c}`,answer:(a+b)*c,type:'b5',bonus:true};}
    case 6:{const t=rand(1,2);
      if(t===1){const a=rand(2,9),b=rand(2,9),c=rand(2,9),d=rand(2,9),L=a*b+c*d,e=rand(2,9),ee=Math.min(e,L-1);return{display:`${a} × ${b} + ${c} × ${d} − ${ee}`,answer:L-ee,type:'b6',bonus:true};}
      const a=rand(5,15),b=rand(4,12),c=rand(3,7),L=(a+b)*c,d=rand(2,Math.min(20,L-1));return{display:`(${a} + ${b}) × ${c} − ${d}`,answer:L-d,type:'b6',bonus:true};}
  }
}

// 직전과 같은 종류가 연이어 나오지 않게 다시 뽑기 + 10문제마다 보너스
function drawProblem(grade, stream){
  const cntKey='cnt_'+stream, lastKey='last_'+stream;
  state[cntKey]=(state[cntKey]||0)+1;
  if(state[cntKey]%10===0){ const p=makeBonus(grade); state[lastKey]=p.type; return p; }
  let p, tries=0;
  do{ p=makeProblem(grade); tries++; }while(p.type===state[lastKey] && tries<14);
  state[lastKey]=p.type;
  return p;
}

function makeChoices(ans){
  const set=new Set([ans]);const mag=Math.max(1,Math.abs(ans));let g=0;
  while(set.size<4&&g++<60){let d;
    if(mag<10)d=rand(-4,4);else if(mag<100)d=rand(-9,9);else d=Math.round(ans*(Math.random()*0.2-0.1))||rand(-15,15);
    let c=ans+d;if(c<0)c=ans+Math.abs(d)+1;if(c!==ans)set.add(c);}
  let n=1;while(set.size<4){set.add(ans+n*7);n++;}
  const a=[...set];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;
}

/* ===== 사운드 ===== */
let audioCtx=null,muted=false,noiseBuf=null;
function initAudio(){
  if(!audioCtx){try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
  if(audioCtx){
    if(audioCtx.state==='suspended')audioCtx.resume();
    if(!noiseBuf){const n=Math.floor(audioCtx.sampleRate*0.2);noiseBuf=audioCtx.createBuffer(1,n,audioCtx.sampleRate);const ch=noiseBuf.getChannelData(0);for(let i=0;i<n;i++)ch[i]=Math.random()*2-1;}
  }
}
function tone(f,s,dur,type='sine',vol=0.18){if(!audioCtx||muted)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type;o.frequency.value=f;const t=audioCtx.currentTime+s;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+dur+0.02);}
const sndCorrect=()=>{tone(660,0,.1,'triangle',.2);tone(880,.07,.14,'triangle',.2);};
const sndWrong=()=>{tone(200,0,.16,'square',.16);tone(150,.1,.2,'square',.14);};
/* 북소리(둥!): 저음 + 타격 노이즈 */
function drum(at=0,freq=150,vol=0.4){
  if(!audioCtx||muted)return;
  const t=audioCtx.currentTime+at;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';o.frequency.setValueAtTime(freq,t);o.frequency.exponentialRampToValueAtTime(Math.max(40,freq*0.4),t+0.12);
  g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.2);
  o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.22);
  if(noiseBuf){const s=audioCtx.createBufferSource(),ng=audioCtx.createGain();s.buffer=noiseBuf;ng.gain.setValueAtTime(vol*0.5,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.04);s.connect(ng);ng.connect(audioCtx.destination);s.start(t);s.stop(t+0.05);}
}
/* 영-차 리듬 두 번의 북 */
function chantDrum(){ drum(0,210,0.4); drum(0.17,130,0.48); }
/* 경기 내내 잔잔한 북 장단 */
let beatTimer=null;
function startBeat(){ stopBeat(); if(!audioCtx)return; const step=()=>drum(0,108,0.15); step(); beatTimer=setInterval(step,820); }
function stopBeat(){ if(beatTimer){clearInterval(beatTimer);beatTimer=null;} }
const sndTick=()=>{tone(900,0,.05,'square',.07);};
const sndWin=()=>{[523,659,784,1047].forEach((f,i)=>tone(f,i*.11,.22,'triangle',.2));for(let i=0;i<5;i++)drum(i*0.1,150,0.28);};
const sndLose=()=>{[392,330,262].forEach((f,i)=>tone(f,i*.16,.3,'sawtooth',.16));};

/* ===== 상태 ===== */
let state={};
const $=id=>document.getElementById(id);
const arena=$('arena'),tug=$('tug'),tugsvg=()=>$('tugsvg');
function show(s){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));$(s).classList.add('active');}

function posPercent(p){return WIN_L+(p/CELLS)*(WIN_R-WIN_L);}
function setTug(){tug.style.transform=`translateX(${posPercent(state.pos)-50}%)`;}

function startGame(grade){
  initAudio();
  state={grade,mode:selMode,matchSec:selSec,matchLeft:selSec,pos:START,
         running:true,correctTotal:0,solvedBlue:0,solvedRed:0,
         matchTimer:null,aiTimer:null,lastSec:999,
         lastSolo:null,lastB:null,lastR:null};
  show('gameScreen');
  $('endModal').classList.remove('open');
  setTug();
  $('soloPanel').style.display = state.mode==='solo'?'block':'none';
  $('duoPanel').style.display  = state.mode==='duo'?'flex':'none';
  paintClock();
  startBeat();
  startMatchClock();
  if(state.mode==='solo'){ startAI(); state._soloHint=`🔵 청군(나) — 영차! · 🤖 AI는 ${state.aiInterval/1000}초마다 한 칸`; $('soloTag').textContent=state._soloHint; newSolo(); }
  else{ newSide('b'); newSide('r'); }
}

/* 경기 시계 */
function startMatchClock(){
  clearInterval(state.matchTimer);
  if(state.matchSec===0){ paintClock(); return; }   // 무제한: 카운트다운 없음
  state.matchTimer=setInterval(()=>{
    state.matchLeft-=0.1;
    if(state.matchLeft<=0){state.matchLeft=0;paintClock();return endByTime();}
    const sec=Math.ceil(state.matchLeft);
    if(state.matchLeft<=5 && sec<state.lastSec){sndTick();state.lastSec=sec;}
    paintClock();
  },100);
}
function paintClock(){
  if(state.matchSec===0){
    $('clockTime').textContent='♾️';
    $('clock').classList.remove('low');
    $('matchBar').style.width='100%';
    return;
  }
  const s=Math.max(0,Math.ceil(state.matchLeft));
  const mm=Math.floor(s/60), ss=String(s%60).padStart(2,'0');
  $('clockTime').textContent=mm+':'+ss;
  $('clock').classList.toggle('low',state.matchLeft<=10);
  $('matchBar').style.width=(state.matchLeft/state.matchSec*100)+'%';
}

/* AI 자동 당기기 (저학년 4초, 고학년 5초마다 한 칸) */
function startAI(){
  clearInterval(state.aiTimer);
  const ms = state.grade>=4 ? 5000 : 4000;
  state.aiInterval = ms;
  state.aiTimer=setInterval(()=>{ if(state.running) pull('red'); }, ms);
}

/* 한 칸(또는 보너스 2칸) 당기기 */
function pull(side, steps=1){
  if(!state.running)return;
  if(side==='blue') state.pos=Math.max(0,state.pos-steps);
  else state.pos=Math.min(CELLS,state.pos+steps);
  chantDrum(); setTug(); yank(side);
  if(state.pos<=0) return endGame('blue');
  if(state.pos>=CELLS) return endGame('red');
}
function yank(side){
  const s=tugsvg(); if(!s)return;
  s.classList.remove('yb','yr'); void s.offsetWidth;
  s.classList.add(side==='blue'?'yb':'yr');
  setTimeout(()=>s.classList.remove('yb','yr'),420);
}

/* ===== 1인 진행 ===== */
function newSolo(){
  if(!state.running)return;
  state.current=drawProblem(state.grade,'solo');
  const p=$('problem');
  p.innerHTML=state.current.display.replace(/([+\u2212×÷])/g,'<span class="eq">$1</span>');
  if(state.current.bonus){ p.classList.add('bonus'); $('soloTag').innerHTML='⭐ 보너스 문제 — 맞히면 <b>2칸</b>!'; $('soloTag').className='turn-tag bonus'; }
  else{ p.classList.remove('bonus'); $('soloTag').textContent=state._soloHint; $('soloTag').className='turn-tag'; }
  const box=$('choices'); box.innerHTML='';
  makeChoices(state.current.answer).forEach(v=>{
    const b=document.createElement('button');b.className='choice';b.textContent=v;
    b.addEventListener('click',()=>soloPick(v,b,box));
    box.appendChild(b);
  });
  $('feedback').textContent=''; $('feedback').className='feedback';
}
function soloPick(v,btn,box){
  if(!state.running)return;
  [...box.children].forEach(c=>c.disabled=true);
  const fb=$('feedback');
  if(v===state.current.answer){
    btn.classList.add('correct'); state.correctTotal++; sndCorrect();
    const steps=state.current.bonus?2:1;
    fb.className='feedback good'; fb.textContent=steps===2?'정답! 보너스 2칸 당겼어요 ⭐':'정답! 한 칸 당겼어요 💪';
    pull('blue',steps);
  }else{
    btn.classList.add('wrong');
    [...box.children].forEach(c=>{if(Number(c.textContent)===state.current.answer)c.classList.add('correct');else if(c!==btn)c.classList.add('dim');});
    sndWrong(); fb.className='feedback bad'; fb.textContent=`땡! 정답은 ${state.current.answer}`;
  }
  setTimeout(()=>{ if(state.running) newSolo(); },650);
}

/* ===== 2인 동시 진행 ===== */
function newSide(side){
  if(!state.running)return;
  const prob=drawProblem(state.grade, side==='b'?'b':'r');
  state[side+'Problem']=prob;
  const probEl=$(side==='b'?'bProb':'rProb');
  const box=$(side==='b'?'bChoices':'rChoices');
  const fb=$(side==='b'?'bFb':'rFb');
  const who=$(side==='b'?'bWho':'rWho');
  probEl.innerHTML=prob.display.replace(/([+\u2212×÷])/g,'<span class="eq">$1</span>');
  probEl.classList.toggle('bonus', !!prob.bonus);
  who.innerHTML=(side==='b'?'🔵 청군':'🔴 홍군')+(prob.bonus?' <span class="bstar">⭐2칸</span>':'');
  box.innerHTML='';
  makeChoices(prob.answer).forEach(v=>{
    const b=document.createElement('button');b.className='mc';b.textContent=v;
    b.addEventListener('click',()=>sidePick(side,v,b,box,fb));
    box.appendChild(b);
  });
  fb.textContent='';
}
function sidePick(side,v,btn,box,fb){
  if(!state.running)return;
  [...box.children].forEach(c=>c.disabled=true);
  const prob=state[side+'Problem'];
  if(v===prob.answer){
    btn.classList.add('hit'); sndCorrect();
    const steps=prob.bonus?2:1;
    if(side==='b'){state.solvedBlue++; state.correctTotal++; pull('blue',steps);}
    else{state.solvedRed++; pull('red',steps);}
    fb.textContent=steps===2?'보너스 2칸! ⭐':'한 칸! 💪';
  }else{
    btn.classList.add('miss'); sndWrong(); fb.textContent='땡!';
  }
  setTimeout(()=>{ if(state.running) newSide(side); },450);
}

/* ===== 종료 ===== */
function stopTimers(){clearInterval(state.matchTimer);clearInterval(state.aiTimer);stopBeat();try{if('speechSynthesis' in window)speechSynthesis.cancel();}catch(e){}}
function endByTime(){
  if(!state.running)return;
  if(state.pos<START) endGame('blue');
  else if(state.pos>START) endGame('red');
  else endGame('draw');
}
function endGame(winner){
  if(!state.running)return;
  state.running=false; stopTimers();
  $('endModal').classList.add('open');
  const stats=$('endStats');
  if(state.mode==='duo'){
    stats.innerHTML=`<div class="stat"><b style="color:var(--blue)">${state.solvedBlue}</b><span>🔵 청군 정답</span></div>
                     <div class="stat"><b style="color:var(--red)">${state.solvedRed}</b><span>🔴 홍군 정답</span></div>`;
  }else{
    stats.innerHTML=`<div class="stat"><b>${state.correctTotal}</b><span>맞힌 문제</span></div>
                     <div class="stat"><b>${state.matchSec===0?'♾️':Math.floor(state.matchSec/60)+'분'}</b><span>경기 시간</span></div>`;
  }
  const e=$('endEmoji'),t=$('endTitle'),p=$('endText');
  if(winner==='draw'){e.textContent='🤝';t.textContent='무승부!';t.className='draw';p.textContent='막상막하! 한 판 더 어때요?';sndLose();}
  else if(winner==='blue'){
    e.textContent='🎉';t.textContent=state.mode==='duo'?'🔵 청군 승리!':'청군 승리!';t.className='blue';
    p.textContent=state.mode==='duo'?'줄을 끝까지 끌어왔어요!':'AI를 이겼어요! 완벽한 한 판!';sndWin();
  }else{
    e.textContent=state.mode==='duo'?'🎉':'😵';t.textContent=state.mode==='duo'?'🔴 홍군 승리!':'홍군 승리…';t.className='red';
    p.textContent=state.mode==='duo'?'줄을 끝까지 끌어왔어요!':'AI가 줄을 가져갔어요. 다음엔 더 빠르게!';
    state.mode==='duo'?sndWin():sndLose();
  }
}

/* 이벤트 */
function closeModal(){$('endModal').classList.remove('open');}
$('homeBtn').addEventListener('click',()=>{state.running=false;stopTimers();closeModal();show('startScreen');});
$('muteBtn').addEventListener('click',()=>{muted=!muted;$('muteBtn').textContent=muted?'🔇':'🔊';
  if(muted){stopBeat();try{speechSynthesis.cancel();}catch(e){}}
  else{initAudio();if(state.running)startBeat();}});
$('againBtn').addEventListener('click',()=>{closeModal();startGame(state.grade);});
$('backBtn').addEventListener('click',()=>{closeModal();show('startScreen');});
</script>

<script>
(function(){
  function post(t){ try{ parent.postMessage({type:t},'*'); }catch(e){} }
  function rebtn(id){ var b=document.getElementById(id); if(!b) return null; var n=b.cloneNode(true); b.parentNode.replaceChild(n,b); return n; }
  try{ selMode='solo'; selSec=60; }catch(e){}
  var _end = endGame;
  endGame = function(winner){
    _end(winner);
    var again=rebtn('againBtn'), back=rebtn('backBtn');
    if(winner==='blue'){
      if(again){ again.textContent='\ud83c\udf9f\ufe0f \ucd95\uc81c \uc785\uc7a5 \u25b6'; again.onclick=function(){ post('festpass'); }; }
      if(back){ back.style.display='none'; }
    } else {
      if(again){ again.textContent='\u21bb \ub2e4\uc2dc \ub3c4\uc804'; again.onclick=function(){ var m=document.getElementById('endModal'); if(m) m.classList.remove('open'); startGame(2); }; }
      if(back){ back.textContent='\u2715 \uadf8\ub9cc\ub450\uae30'; back.onclick=function(){ post('festfail'); }; }
    }
  };
  setTimeout(function(){ try{ startGame(2); }catch(e){} }, 80);
})();
</script>
</template>

  "2":["a","b","g","e","d"], "3":["a","b","g","c","d"],
  "4":["f","g","b","c"], "5":["a","f","g","c","d"],
  "6":["a","f","g","c","d","e"], "7":["a","b","c"],
  "8":["a","b","c","d","e","f","g"], "9":["a","b","c","d","f","g"]
};
var SEGSET = {};
Object.keys(SEG).forEach(function(k){ SEGSET[k] = SEG[k].slice(); });

var SEGPOS = {
  a:{x:9,y:3,w:42,h:9,dir:"h"}, b:{x:51,y:9,w:9,h:42,dir:"v"},
  c:{x:51,y:57,w:9,h:42,dir:"v"}, d:{x:9,y:96,w:42,h:9,dir:"h"},
  e:{x:0,y:57,w:9,h:42,dir:"v"}, f:{x:0,y:9,w:9,h:42,dir:"v"},
  g:{x:9,y:50,w:42,h:9,dir:"h"}
};

var OP_LABEL = {"*":"곱셈","/":"나눗셈","+":"덧셈","-":"뺄셈"};
var OP_GLYPH = {"*":"×","/":"÷","+":"+","-":"−"};
var DIGIT_LABEL = {1:"한 자리",2:"두 자리"};
var ALLOWED_DIGITS = {"+":[1,2],"-":[1,2],"*":[1,2],"/":[1,2]};

/* ===== 상태 ===== */
var HINT_LIMIT = 3;          // 한 세트(14문제)당 쓸 수 있는 힌트 수
var state = {
  op:"+", digits:1, idx:0,
  grid:null, picked:null, status:"playing", moved:false,
  hint:false, hintMove:null, hintsLeft:HINT_LIMIT,
  hintUsedThisPuzzle:false, solvedCount:0,
  correctByDigit:{1:0, 2:0}
};

/* ===== 모닥불 상태 ===== */
var FIRE_MAX = 100;
var FIRE_PER_CORRECT = 10;   // 정답 1개당 불 세기 증가
var FIRE_DECAY = 0.5;        // 1초마다 줄어드는 양 (천천히)
var WOOD_PER = 5;            // 몇 문제 맞히면 장작 1개
var WOOD_FIRE_BOOST = 45;    // 장작 1개가 살리는 불 세기
var fire = {
  level: 30,        // 현재 불 세기 0~100 (시작 시 작은 불)
  wood: 0,          // 보유 장작 개수
  logs: 3,          // 모닥불에 쌓인 통나무 개수(시각용, 시작 3개)
  flicker: 0,       // 불꽃 흔들림 위상
  lastReward: ""    // 최근 알림 메시지
};

/* ===== 유틸 ===== */
function poolKey(){ return state.op + "_" + state.digits; }
function curPool(){ return PUZZLES[poolKey()] || []; }
function curPuzzle(){ var p = curPool(); return p[state.idx % p.length]; }

function sameSet(a,b){
  if (a.length !== b.length) return false;
  for (var i=0;i<a.length;i++){ if (b.indexOf(a[i])<0) return false; }
  return true;
}
function matchDigit(arr){
  var keys = Object.keys(SEGSET);
  for (var i=0;i<keys.length;i++){
    if (sameSet(SEGSET[keys[i]], arr)) return {valid:true, char:keys[i]};
  }
  return {valid:false, char:null};
}
function evalEq(L,R,S,op){
  var l=parseInt(L.join(""),10), r=parseInt(R.join(""),10), s=parseInt(S.join(""),10);
  var v;
  if (op==="*") v=l*r;
  else if (op==="+") v=l+r;
  else if (op==="-") v=l-r;
  else v=(r!==0 && l%r===0)? l/r : NaN;
  return {l:l,r:r,s:s,v:v,ok:v===s};
}

/* 원래 문제와 정답 식을 비교해 옮겨야 할 통나무 위치 계산
   반환: { from:{cell,seg}, to:{cell,seg} }  또는 null */
function computeHintMove(puzzle, sol){
  // 각 칸을 (part,index)로 나열
  function cells(left, op, right, result){
    var arr = [];
    left.split("").forEach(function(c,i){ arr.push({key:"L"+i, ch:c}); });
    right.split("").forEach(function(c,i){ arr.push({key:"R"+i, ch:c}); });
    result.split("").forEach(function(c,i){ arr.push({key:"S"+i, ch:c}); });
    return arr;
  }
  var before = cells(puzzle.left, puzzle.op, puzzle.right, puzzle.result);
  var after  = cells(sol.left, sol.op, sol.right, sol.result);
  if (before.length !== after.length) return null;

  var removed = []; // {cell,seg}
  var added = [];   // {cell,seg}
  for (var i=0;i<before.length;i++){
    var b = SEGSET[before[i].ch] || [];
    var a = SEGSET[after[i].ch] || [];
    b.forEach(function(seg){ if (a.indexOf(seg)<0) removed.push({cell:before[i].key, seg:seg}); });
    a.forEach(function(seg){ if (b.indexOf(seg)<0) added.push({cell:after[i].key, seg:seg}); });
  }
  // 통나무 1개 이동이면 제거 1, 추가 1
  if (removed.length===1 && added.length===1){
    return { from:removed[0], to:added[0] };
  }
  return null;
}

function loadPuzzle(){
  var p = curPuzzle();
  if (!p) return;
  state.grid = { L:p.left.split(""), R:p.right.split(""), S:p.result.split("") };
  state.picked = null;
  state.status = "playing";
  state.moved = false;
  state.hint = false;
  state.hintMove = null;
  state.hintUsedThisPuzzle = false;
  render();
}

/* ===== 통나무 옮기기 ===== */
function pickStick(cellKey, seg){
  if (state.status === "solved") return;
  if (state.picked){
    if (state.picked.cell===cellKey && state.picked.seg===seg) state.picked=null;
    render();
    return;
  }
  if (state.moved) return;
  state.picked = {cell:cellKey, seg:seg};
  render();
}

function placeStick(cellKey, seg){
  if (!state.picked || state.status==="solved") return;
  var part = cellKey[0], i = parseInt(cellKey.slice(1),10);
  var fromPart = state.picked.cell[0], fromI = parseInt(state.picked.cell.slice(1),10);
  var sameCell = (fromPart===part && fromI===i);

  var g = state.grid;
  var next = { L:g.L.slice(), R:g.R.slice(), S:g.S.slice() };

  var fromArr = SEGSET[next[fromPart][fromI]].slice();
  var pi = fromArr.indexOf(state.picked.seg);
  if (pi>=0) fromArr.splice(pi,1);

  if (sameCell){
    var merged = fromArr.slice();
    if (merged.indexOf(seg)<0) merged.push(seg);
    var res = matchDigit(merged);
    if (!res.valid){ state.picked=null; render(); return; }
    next[part][i] = res.char;
  } else {
    var fromRes = matchDigit(fromArr);
    var toArr = SEGSET[next[part][i]].slice();
    if (toArr.indexOf(seg)<0) toArr.push(seg);
    var toRes = matchDigit(toArr);
    if (!fromRes.valid || !toRes.valid){ state.picked=null; render(); return; }
    next[fromPart][fromI] = fromRes.char;
    next[part][i] = toRes.char;
  }

  state.grid = next;
  state.picked = null;
  state.moved = true;

  var ev = evalEq(next.L, next.R, next.S, state.op);
  if (ev.ok){
    state.status = "solved";
    state.solvedCount++;
    state.correctByDigit[state.digits]++;
    onCorrectAnswer();
  }
  render();
}

/* ===== 정답 시 모닥불 보상 ===== */
function onCorrectAnswer(){
  var twoDigit = (state.digits === 2);
  // 불 세기 증가 — 두 자리수는 2배
  var gain = twoDigit ? FIRE_PER_CORRECT * 2 : FIRE_PER_CORRECT;
  fire.level = Math.min(FIRE_MAX, fire.level + gain);

  // 5문제마다 장작 지급 — 두 자리수는 한 번에 2개
  var msg = "";
  var solvedThis = state.correctByDigit[state.digits];
  if (solvedThis % WOOD_PER === 0){
    var woodGain = twoDigit ? 2 : 1;
    fire.wood += woodGain;
    msg = twoDigit
      ? "두 자리 수 문제 5개 성공! 장작 2개를 받았어요"
      : "장작을 하나 받았어요! 불에 넣어 보세요";
  } else if (twoDigit){
    msg = "두 자리 수는 불이 더 크게 자라요!";
  }
  fire.lastReward = msg;
  drawCampfire();
}

/* ===== SVG 숫자 칸 ===== */
var SVGNS = "http://www.w3.org/2000/svg";
function buildDigit(ch, cellKey, size){
  var svg = document.createElementNS(SVGNS,"svg");
  svg.setAttribute("viewBox","-5 -5 70 120");
  svg.setAttribute("class","digit");
  svg.style.width = size+"px";
  svg.style.height = (size*1.6)+"px";
  svg.style.flex = "0 0 auto";

  var present = SEGSET[ch] || [];
  var interactive = (state.status !== "solved");
  var picked = state.picked;
  var hintMove = state.hintMove; // {from:{cell,seg}, to:{cell,seg}} 또는 null

  if (interactive){
    Object.keys(SEGPOS).forEach(function(segName){
      var pos = SEGPOS[segName];
      var filled = present.indexOf(segName)>=0;
      var isPicked = picked && picked.cell===cellKey && picked.seg===segName;
      if (filled && !isPicked) return;
      var round = pos.dir==="h" ? pos.h/2 : pos.w/2;
      var r = document.createElementNS(SVGNS,"rect");
      r.setAttribute("x",pos.x); r.setAttribute("y",pos.y);
      r.setAttribute("width",pos.w); r.setAttribute("height",pos.h);
      r.setAttribute("rx",round);
      r.setAttribute("fill", picked ? "rgba(255,205,110,0.4)" : "transparent");
      r.setAttribute("stroke","#d4be93");
      r.setAttribute("stroke-width","1.8");
      r.setAttribute("stroke-dasharray","4 3");
      r.setAttribute("class", "slot" + (picked ? " active" : ""));
      if (picked){
        r.addEventListener("click", function(){ placeStick(cellKey, segName); });
      }
      svg.appendChild(r);
    });
  }

  present.forEach(function(segName){
    var pos = SEGPOS[segName];
    var isPicked = picked && picked.cell===cellKey && picked.seg===segName;
    var isHintFrom = hintMove && hintMove.from.cell===cellKey && hintMove.from.seg===segName;
    var round = pos.dir==="h" ? pos.h/2 : pos.w/2;
    var g = document.createElementNS(SVGNS,"g");
    g.setAttribute("class","stick" + (interactive ? "" : " locked") + (isHintFrom ? " hint-from" : ""));
    if (isPicked) g.setAttribute("opacity","0");

    var rect = document.createElementNS(SVGNS,"rect");
    rect.setAttribute("x",pos.x); rect.setAttribute("y",pos.y);
    rect.setAttribute("width",pos.w); rect.setAttribute("height",pos.h);
    rect.setAttribute("rx",round);
    rect.setAttribute("fill", isHintFrom ? "#f0b24a" : "#b9854b");
    rect.setAttribute("stroke", isHintFrom ? "#b5611a" : "#6e4a23");
    rect.setAttribute("stroke-width", isHintFrom ? "2.8" : "1.6");
    g.appendChild(rect);

    // 나뭇결 하이라이트 (몸통 가운데 밝은 줄)
    var grain = document.createElementNS(SVGNS,"rect");
    if (pos.dir==="h"){
      grain.setAttribute("x", pos.x+pos.h*0.5); grain.setAttribute("y", pos.y+pos.h*0.30);
      grain.setAttribute("width", Math.max(0,pos.w-pos.h)); grain.setAttribute("height", pos.h*0.16);
      grain.setAttribute("rx", pos.h*0.08);
    } else {
      grain.setAttribute("x", pos.x+pos.w*0.30); grain.setAttribute("y", pos.y+pos.w*0.5);
      grain.setAttribute("width", pos.w*0.16); grain.setAttribute("height", Math.max(0,pos.h-pos.w));
      grain.setAttribute("rx", pos.w*0.08);
    }
    grain.setAttribute("fill", isHintFrom ? "#ffd98a" : "#d2a165");
    grain.setAttribute("opacity","0.85");
    g.appendChild(grain);

    // 잘린 단면(나이테) — 통나무 한쪽 끝에만
    var R = pos.dir==="h" ? pos.h*0.82 : pos.w*0.82;
    var ends = pos.dir==="h"
      ? [[pos.x+pos.w-pos.h/2, pos.y+pos.h/2]]
      : [[pos.x+pos.w/2, pos.y+pos.h-pos.w/2]];
    ends.forEach(function(e){
      var cap = document.createElementNS(SVGNS,"circle");
      cap.setAttribute("cx",e[0]); cap.setAttribute("cy",e[1]); cap.setAttribute("r",R);
      cap.setAttribute("fill", isHintFrom ? "#ffe9b0" : "#e3c089");
      cap.setAttribute("stroke", isHintFrom ? "#b5611a" : "#7a5126");
      cap.setAttribute("stroke-width","1.4");
      g.appendChild(cap);
      var ring = document.createElementNS(SVGNS,"circle");
      ring.setAttribute("cx",e[0]); ring.setAttribute("cy",e[1]); ring.setAttribute("r",R*0.46);
      ring.setAttribute("fill","none");
      ring.setAttribute("stroke", isHintFrom ? "#cf7a26" : "#a9763f");
      ring.setAttribute("stroke-width","1.3");
      g.appendChild(ring);
    });

    if (interactive){
      g.addEventListener("click", function(){ pickStick(cellKey, segName); });
    }
    svg.appendChild(g);
  });

  return svg;
}

/* ===== 폭죽 ===== */
function buildConfetti(){
  var box = document.getElementById("confetti");
  box.innerHTML = "";
  if (state.status !== "solved") return;
  var colors = ["#f6b73c","#e8542a","#5fae6b","#5a9bd4","#d65aa8","#f3d94e"];
  for (var i=0;i<28;i++){
    var d = document.createElement("div");
    d.className = "confetti-piece";
    var sz = 7 + Math.random()*9;
    d.style.left = (Math.random()*100)+"%";
    d.style.width = sz+"px";
    d.style.height = sz+"px";
    d.style.background = colors[i%colors.length];
    d.style.borderRadius = (i%2) ? "50%" : "2px";
    var dur = 1.6 + Math.random()*1.2;
    var delay = Math.random()*0.4;
    d.style.animation = "fall " + dur + "s " + delay + "s ease-in forwards";
    box.appendChild(d);
  }
}

/* ===== 수식 그리기 (칸 크기를 폭·세로에 맞춰 자동 계산) ===== */
function drawEquation(){
  if (!state.grid) return;
  var eqBox = document.getElementById("equation");
  eqBox.innerHTML = "";

  var digitCount = state.grid.L.length + state.grid.R.length + state.grid.S.length;
  var board = document.getElementById("board");
  var avail = board.clientWidth - 32; // 보드 좌우 패딩
  if (avail < 240) avail = 240;
  // 폭 기준: 연산자+등호 폭을 숫자칸 1.4개분으로 잡음
  var sizeByWidth = Math.floor(avail / (digitCount + 1.4));
  // 세로 기준: 수식 영역 높이의 1/1.6 (숫자칸 높이는 폭의 1.6배)
  var eqAvail = eqBox.clientHeight - 14;
  var sizeByHeight = eqAvail > 30 ? Math.floor(eqAvail / 1.6) : 999;
  var size = Math.min(sizeByWidth, sizeByHeight);
  if (size > 110) size = 110;
  if (size < 26) size = 26;
  var opFs = Math.round(size * 0.74);
  var barW = Math.round(size * 0.52);
  var barH = Math.max(6, Math.round(size * 0.12));
  var barGap = Math.max(6, Math.round(size * 0.14));

  state.grid.L.forEach(function(c,i){ eqBox.appendChild(buildDigit(c,"L"+i,size)); });
  var opEl = document.createElement("div");
  opEl.className = "op";
  opEl.style.fontSize = opFs + "px";
  opEl.textContent = OP_GLYPH[state.op];
  eqBox.appendChild(opEl);
  state.grid.R.forEach(function(c,i){ eqBox.appendChild(buildDigit(c,"R"+i,size)); });
  var eqEl = document.createElement("div");
  eqEl.className = "eq";
  eqEl.style.gap = barGap + "px";
  eqEl.innerHTML =
    '<div class="eq-bar" style="width:'+barW+'px;height:'+barH+'px"></div>' +
    '<div class="eq-bar" style="width:'+barW+'px;height:'+barH+'px"></div>';
  eqBox.appendChild(eqEl);
  state.grid.S.forEach(function(c,i){ eqBox.appendChild(buildDigit(c,"S"+i,size)); });
}

/* ===== 렌더 ===== */
function render(){
  var pool = curPool();
  var puzzle = curPuzzle();
  if (!state.grid || !puzzle) return;
  var allowed = ALLOWED_DIGITS[state.op];

  var opRow = document.getElementById("op-row");
  opRow.innerHTML = "";
  ["+","-","*","/"].forEach(function(o){
    var b = document.createElement("button");
    b.className = "chip" + (state.op===o ? " active" : "");
    b.innerHTML = '<span class="glyph">'+OP_GLYPH[o]+'</span><span>'+OP_LABEL[o]+'</span>';
    b.addEventListener("click", function(){
      if (state.op !== o) state.hintsLeft = HINT_LIMIT;
      state.op = o; state.idx = 0;
      if (ALLOWED_DIGITS[o].indexOf(state.digits)<0) state.digits = ALLOWED_DIGITS[o][0];
      loadPuzzle();
    });
    opRow.appendChild(b);
  });

  document.getElementById("digit-label").textContent =
    "숫자 크기" + (state.op==="/" ? " (나누는 수 기준)" : "");
  var digRow = document.getElementById("digit-row");
  digRow.innerHTML = "";
  [1,2].forEach(function(d){
    var ok = allowed.indexOf(d)>=0;
    var b = document.createElement("button");
    b.className = "chip" + (state.digits===d ? " active" : "") + (ok ? "" : " disabled");
    b.textContent = DIGIT_LABEL[d] + " 수";
    if (ok){
      b.addEventListener("click", function(){
        if (state.digits !== d) state.hintsLeft = HINT_LIMIT;
        state.digits = d; state.idx = 0; loadPuzzle();
      });
    }
    digRow.appendChild(b);
  });
  var noteEl = document.getElementById("digit-note");
  if (state.digits===2){
    var base = "";
    if (state.op==="*") base = "두 자리 수 × 한 자리 수 — ";
    else if (state.op==="/") base = "두 자리 수 ÷ 한 자리 수 — ";
    noteEl.textContent = base + "두 자리 수는 보상이 두 배예요!";
  } else {
    noteEl.textContent = "";
  }

  document.getElementById("prog-mode").textContent =
    OP_LABEL[state.op] + " · " + DIGIT_LABEL[state.digits] + " 수";
  document.getElementById("prog-num").textContent =
    "문제 " + ((state.idx % pool.length)+1) + " / " + pool.length;
  document.getElementById("prog-star").textContent =
    "맞춘 개수 " + state.solvedCount;

  var bubble = document.getElementById("bubble");
  bubble.className = "bubble" +
    (state.status==="solved" ? " solved" : state.picked ? " picked" : "");
  if (state.status==="solved")
    bubble.textContent = "우와! 정답이에요. 참 잘했어요";
  else if (state.picked)
    bubble.textContent = "통나무를 들었어요 — 반짝이는 빈칸에 놓아 봐요";
  else if (state.moved)
    bubble.textContent = "음, 다시 해볼까요? 아래 다시하기를 눌러요";
  else
    bubble.textContent = "옮기고 싶은 통나무를 눌러 봐요";

  // 힌트: 옮길 통나무 위치를 미리 계산
  state.hintMove = null;
  if (state.hint && state.status!=="solved"){
    for (var si=0; si<puzzle.solutions.length; si++){
      var mv = computeHintMove(puzzle, puzzle.solutions[si]);
      if (mv){ state.hintMove = mv; break; }
    }
  }

  drawEquation();

  var ev = evalEq(state.grid.L, state.grid.R, state.grid.S, state.op);
  var cur = document.getElementById("curexpr");
  cur.className = "curexpr" + (ev.ok ? " ok" : "");
  cur.textContent = state.grid.L.join("") + " " + OP_GLYPH[state.op] + " " +
    state.grid.R.join("") + " = " + state.grid.S.join("") + "  " +
    (ev.ok ? "○" : "✕");

  var hb = document.getElementById("hint-box");
  hb.innerHTML = "";
  if (state.hint && state.status!=="solved"){
    var hd = document.createElement("div");
    hd.className = "hint";
    hd.textContent = state.hintMove
      ? "반짝이는 통나무를 옮겨 보세요"
      : "통나무 하나를 옮겨 식을 바르게 고쳐 보세요";
    hb.appendChild(hd);
  }
  var hintBtn = document.getElementById("btn-hint");
  if (state.hint){
    hintBtn.textContent = "힌트 그만보기";
    hintBtn.disabled = false;
  } else if (state.hintUsedThisPuzzle){
    hintBtn.textContent = "힌트 다시 보기";
    hintBtn.disabled = false;
  } else if (state.hintsLeft > 0){
    hintBtn.textContent = "힌트 보기 (" + state.hintsLeft + ")";
    hintBtn.disabled = false;
  } else {
    hintBtn.textContent = "힌트 모두 사용";
    hintBtn.disabled = true;
  }

  buildConfetti();

  // 레이아웃이 잡힌 뒤 수식 칸을 세로 공간에 맞춰 한 번 더 그림
  if (typeof requestAnimationFrame === "function"){
    requestAnimationFrame(function(){ drawEquation(); });
  }
}

document.getElementById("btn-reset").addEventListener("click", loadPuzzle);
document.getElementById("btn-hint").addEventListener("click", function(){
  if (state.status === "solved") return;
  if (state.hint){
    // 켜진 힌트를 끄기 (차감 없음)
    state.hint = false;
    render();
    return;
  }
  // 힌트 켜기 — 이 문제에서 처음 켜는 경우에만 1개 차감
  if (!state.hintUsedThisPuzzle){
    if (state.hintsLeft <= 0) return; // 남은 힌트 없음
    state.hintsLeft--;
    state.hintUsedThisPuzzle = true;
  }
  state.hint = true;
  render();
});
document.getElementById("btn-next").addEventListener("click", function(){
  var pool = curPool();
  state.idx = (state.idx + 1) % pool.length;
  loadPuzzle();
});

var resizeTimer = null;
window.addEventListener("resize", function(){
  if (resizeTimer) clearTimeout(resizeTimer);
  resizeTimer = setTimeout(function(){
    if (state.grid) render();
  }, 120);
});

/* ===================================================
   모닥불 시스템
   =================================================== */
var CFNS = "http://www.w3.org/2000/svg";

// 불꽃 모양 path (cx 중심, baseY 바닥, h 높이, w 폭, 흔들림 ph)
function flamePath(cx, baseY, h, w, ph){
  var sway = Math.sin(ph) * w * 0.22;
  var tipX = cx + sway;
  var tipY = baseY - h;
  return "M" + (cx - w) + " " + baseY +
    " C" + (cx - w * 1.02) + " " + (baseY - h * 0.42) +
    " " + (cx - w * 0.62) + " " + (baseY - h * 0.34) +
    " " + (cx - w * 0.4 + sway * 0.3) + " " + (baseY - h * 0.62) +
    " C" + (cx - w * 0.24 + sway * 0.6) + " " + (baseY - h * 0.82) +
    " " + (tipX - w * 0.34) + " " + (tipY + h * 0.16) +
    " " + tipX + " " + tipY +
    " C" + (tipX + w * 0.34) + " " + (tipY + h * 0.16) +
    " " + (cx + w * 0.24 + sway * 0.6) + " " + (baseY - h * 0.82) +
    " " + (cx + w * 0.4 + sway * 0.3) + " " + (baseY - h * 0.62) +
    " C" + (cx + w * 0.62) + " " + (baseY - h * 0.34) +
    " " + (cx + w * 1.02) + " " + (baseY - h * 0.42) +
    " " + (cx + w) + " " + baseY + " Z";
}

function elem(tag, attrs){
  var e = document.createElementNS(CFNS, tag);
  for (var k in attrs){ if (attrs.hasOwnProperty(k)) e.setAttribute(k, attrs[k]); }
  return e;
}

function drawCampfire(){
  var svg = document.getElementById("campfire");
  if (!svg) return;
  svg.innerHTML = "";

  var W = 360, H = 280;
  var groundY = 244;
  var cx = 180;
  var lvl = fire.level / FIRE_MAX;   // 0~1
  var alive = fire.level > 0;

  // 배경 (저녁 하늘 → 땅)
  var sky = elem("rect", {x:0,y:0,width:W,height:H,fill:"transparent"});
  svg.appendChild(sky);

  // 불빛 후광 (불이 클수록 크고 밝게)
  if (alive){
    var glowR = 60 + lvl * 110;
    var glow = elem("circle", {
      cx:cx, cy:groundY-30, r:glowR,
      fill:"#ffb733", opacity: (0.12 + lvl*0.32).toFixed(2)
    });
    svg.appendChild(glow);
  }

  // 아이들 실루엣 (왼쪽 빨강, 오른쪽 초록) - 불빛에 따라 밝아짐
  var childBright = 0.45 + lvl * 0.55;
  function child(baseX, dir, bodyColor, hatColor){
    var g = elem("g", {opacity: childBright.toFixed(2)});
    // 몸통
    g.appendChild(elem("ellipse", {cx:baseX, cy:groundY-18, rx:30, ry:26, fill:bodyColor}));
    // 다리(책상다리)
    g.appendChild(elem("ellipse", {cx:baseX, cy:groundY-2, rx:34, ry:13, fill:"#3a4452"}));
    // 머리
    g.appendChild(elem("circle", {cx:baseX + dir*4, cy:groundY-52, r:21, fill:"#f3c79b"}));
    // 머리카락/모자
    if (hatColor){
      g.appendChild(elem("path", {
        d:"M"+(baseX+dir*4-22)+" "+(groundY-56)+
          " Q"+(baseX+dir*4)+" "+(groundY-88)+" "+(baseX+dir*4+22)+" "+(groundY-56)+" Z",
        fill:hatColor
      }));
      g.appendChild(elem("circle", {cx:baseX+dir*4, cy:groundY-86, r:6, fill:"#fff"}));
    } else {
      g.appendChild(elem("path", {
        d:"M"+(baseX+dir*4-22)+" "+(groundY-52)+
          " Q"+(baseX+dir*4)+" "+(groundY-82)+" "+(baseX+dir*4+22)+" "+(groundY-52)+
          " Q"+(baseX+dir*4)+" "+(groundY-66)+" "+(baseX+dir*4-22)+" "+(groundY-52)+" Z",
        fill:"#caa54e"
      }));
    }
    return g;
  }
  svg.appendChild(child(58, 1, "#d4493a", "#d4493a"));     // 산타모자 아이
  svg.appendChild(child(302, -1, "#4f9b62", null));        // 노란머리 아이

  // 통나무 더미 (모닥불에 쌓인 장작 수만큼) - 불꽃 뒤에 그리기 위해 함수로
  function drawLogs(){
    var logColors = ["#7a4a26","#8a5530","#6e4322"];
    var logN = Math.max(2, fire.logs);
    for (var i = 0; i < logN; i++){
      var spread = (i - (logN-1)/2);
      var lx = cx + spread * 24;
      var ly = groundY - 4 - (i%2)*3;
      var rot = spread * 13;
      var log = elem("g", {transform:"rotate("+rot+" "+lx+" "+ly+")"});
      log.appendChild(elem("rect", {
        x:lx-30, y:ly-9, width:60, height:18, rx:9,
        fill:logColors[i%3], stroke:"#5a3418", "stroke-width":2
      }));
      log.appendChild(elem("ellipse", {cx:lx+28, cy:ly, rx:7, ry:9, fill:"#c98f5a"}));
      log.appendChild(elem("ellipse", {cx:lx+28, cy:ly, rx:3.5, ry:5, fill:"#9a6536"}));
      svg.appendChild(log);
    }
  }

  // 불꽃 (불이 살아있을 때만)
  if (alive){
    var baseY = groundY - 6;
    var ph = fire.flicker;
    var maxH = 34 + lvl * 150;
    var maxW = 18 + lvl * 42;
    // 바깥 주황
    svg.appendChild(elem("path", {
      d: flamePath(cx, baseY, maxH, maxW, ph),
      fill:"#e8541f", opacity:"0.92"
    }));
    // 중간 주황
    svg.appendChild(elem("path", {
      d: flamePath(cx, baseY, maxH*0.74, maxW*0.7, ph+1.1),
      fill:"#ff9a1f", opacity:"0.95"
    }));
    // 안쪽 노랑
    svg.appendChild(elem("path", {
      d: flamePath(cx, baseY, maxH*0.46, maxW*0.44, ph+2.2),
      fill:"#ffd83a", opacity:"1"
    }));
    // 심지 흰빛
    svg.appendChild(elem("path", {
      d: flamePath(cx, baseY, maxH*0.24, maxW*0.26, ph+3.0),
      fill:"#fff3c4", opacity:"0.95"
    }));
    // 통나무를 불꽃 바닥 위에 덮어 그리기
    drawLogs();
    // 불씨 (불이 클수록 많이)
    var sparks = Math.round(lvl * 7);
    for (var s = 0; s < sparks; s++){
      var sa = ph*1.3 + s*1.7;
      var sx = cx + Math.sin(sa)* (maxW*0.8);
      var sy = baseY - maxH*0.7 - ((Math.sin(sa*0.7)+1)/2)*maxH*0.6;
      svg.appendChild(elem("circle", {
        cx:sx, cy:sy, r:1.6 + (s%2)*1.2,
        fill:"#ffd86b", opacity:(0.5+0.4*Math.abs(Math.sin(sa))).toFixed(2)
      }));
    }
  } else {
    // 꺼진 불 - 통나무와 연기
    drawLogs();
    for (var k = 0; k < 3; k++){
      var smx = cx + Math.sin(fire.flicker*0.6 + k)*8;
      svg.appendChild(elem("circle", {
        cx:smx, cy:groundY-30-k*22, r:8+k*4,
        fill:"#9a9a9a", opacity:(0.28-k*0.07).toFixed(2)
      }));
    }
  }

  updateCampfireUI();
}

function fireStageName(){
  var l = fire.level;
  if (l <= 0) return "불이 꺼졌어요";
  if (l < 25) return "작은 불씨";
  if (l < 50) return "타오르는 불";
  if (l < 78) return "활활 타는 불";
  return "아주 큰 모닥불";
}

function updateCampfireUI(){
  var statusEl = document.getElementById("cf-status");
  var meterEl = document.getElementById("cf-meter-fill");
  var woodEl = document.getElementById("cf-wood-count");
  var feedBtn = document.getElementById("btn-feed");
  var hintEl = document.getElementById("cf-hint");
  if (!statusEl) return;

  statusEl.textContent = fireStageName();
  meterEl.style.width = Math.max(0, Math.min(100, fire.level)) + "%";
  woodEl.textContent = "모아둔 장작 " + fire.wood + "개";

  feedBtn.disabled = (fire.wood <= 0);

  if (fire.lastReward){
    hintEl.textContent = fire.lastReward;
  } else if (fire.level <= 0){
    hintEl.textContent = fire.wood > 0
      ? "장작을 넣어 불을 다시 피워요!"
      : "문제를 5개 맞히면 장작을 받아요";
  } else if (fire.level < 25){
    hintEl.textContent = "불이 약해지고 있어요 — 문제를 맞히거나 장작을 넣어요";
  } else {
    hintEl.textContent = "문제를 맞히면 불이 더 커져요";
  }
}

// 장작 넣기 (모닥불 패널 제거됨 — 버튼 있으면만 연결)
var _feedBtn = document.getElementById("btn-feed");
if (_feedBtn) _feedBtn.addEventListener("click", function(){
  if (fire.wood <= 0) return;
  fire.wood--;
  fire.logs = Math.min(7, fire.logs + 1);
  fire.level = Math.min(FIRE_MAX, fire.level + WOOD_FIRE_BOOST);
  fire.lastReward = "장작을 넣었어요! 불이 커졌어요";
  drawCampfire();
});

// 불 약해짐 타이머 (1초마다)
setInterval(function(){
  if (fire.level > 0){
    fire.level = Math.max(0, fire.level - FIRE_DECAY);
    if (fire.level === 0) fire.lastReward = "";
    updateCampfireUI();
  }
}, 1000);

// 불꽃 흔들림 애니메이션 (계속)
setInterval(function(){
  fire.flicker += 0.5;
  drawCampfire();
}, 220);

loadPuzzle();
drawCampfire();
</script>

<script>
(function(){
  function post(t){ try{ parent.postMessage({type:t},'*'); }catch(e){} }
  var NEED=3, solved=0, won=false;
  var OPS=['+','-'];   // \uc26c\uc6b4 \ub367\uc148\u00b7\ubfac\uc148, \ud55c \uc790\ub9ac
  function hideControls(){
    try{
      var o=document.getElementById('op-row'); if(o){ var p=o.closest('.panel'); if(p) p.style.display='none'; }
      var d=document.getElementById('digit-row'); if(d){ var q=d.closest('.panel'); if(q) q.style.display='none'; }
      var nx=document.getElementById('btn-next'); if(nx) nx.style.display='none';
      var ht=document.getElementById('btn-hint'); if(ht) ht.style.display='none';
    }catch(e){}
  }
  function badge(){ var b=document.getElementById('festProg');
    if(!b){ b=document.createElement('div'); b.id='festProg';
      b.style.cssText='position:fixed;left:50%;top:6px;transform:translateX(-50%);z-index:99998;background:#fff3d6;color:#8a5a10;font-family:Gaegu,sans-serif;font-weight:700;font-size:15px;padding:6px 16px;border-radius:99px;box-shadow:0 3px 10px rgba(0,0,0,.2)';
      document.body.appendChild(b); }
    b.textContent='\ud83c\udfaa \uc785\uc7a5 \ubb38\uc81c  '+Math.min(solved+1,NEED)+' / '+NEED+' \u2014 \ud1b5\ub098\ubb34 1\uac1c\ub9cc \uc62e\uae30\uae30';
  }
  function pickNext(){
    try{
      state.op=OPS[Math.floor(Math.random()*OPS.length)]; state.digits=1;
      var pool=(typeof PUZZLES!=='undefined' && PUZZLES[state.op+'_'+state.digits])||[];
      state.idx= pool.length? Math.floor(Math.random()*pool.length):0;
      loadPuzzle();
    }catch(e){}
    hideControls(); badge();
  }
  function winAll(){ if(won) return; won=true;
    var bar=document.createElement('div');
    bar.style.cssText='position:fixed;left:0;right:0;bottom:0;padding:14px;text-align:center;background:linear-gradient(180deg,#fff6df,#ffe6b0);box-shadow:0 -4px 16px rgba(0,0,0,.25);z-index:99999';
    bar.innerHTML='<div style="font-family:Gowun Dodum,sans-serif;color:#8a5a10;margin-bottom:8px;font-size:15px">\ud83c\udf9f\ufe0f 3\ubb38\uc81c \ubaa8\ub450 \uc131\uacf5! \ucd95\uc81c\uc5d0 \uc785\uc7a5\ud560 \uc218 \uc788\uc5b4\uc694</div><button id="festEnter" style="font-family:Gaegu,sans-serif;font-size:18px;border:none;border-radius:14px;padding:12px 28px;background:#2ea66a;color:#fff;box-shadow:0 4px 0 #1f8252;cursor:pointer">\ud83c\udfaa \ucd95\uc81c \uc785\uc7a5 \u25b6</button>';
    document.body.appendChild(bar);
    document.getElementById('festEnter').onclick=function(){ post('festpass'); };
  }
  function onSolve(){ if(won) return; solved++; badge(); if(solved>=NEED){ winAll(); } else { setTimeout(pickNext, 1000); } }
  try{
    if(typeof onCorrectAnswer==='function'){ var _oca=onCorrectAnswer; onCorrectAnswer=function(){ _oca.apply(this,arguments); onSolve(); }; }
    else { var armed=true; setInterval(function(){ if(document.querySelector('.bubble.solved')){ if(armed){ armed=false; onSolve(); setTimeout(function(){armed=true;},1300); } } },400); }
  }catch(e){}
  setTimeout(function(){ pickNext(); }, 80);
})();
</script>
