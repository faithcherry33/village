    top: -10px;
    left: 16px;
    background: var(--bg-2);
    padding: 2px 12px;
    border-radius: 12px;
    font-family: 'Jua', sans-serif;
    font-size: 12px;
    border: 1.5px solid;
    z-index: 5;
  }
  .vs-pane.p1 .p-label { border-color: var(--p1-color); color: var(--p1-color); }
  .vs-pane.p2 .p-label { border-color: var(--p2-color); color: var(--p2-color); }

  /* 좌측: 랭킹 / 우측: 홈 */
  .ranking-fab {
    position: absolute;
    bottom: 6px;
    left: 6px;
    z-index: 30;
    background: linear-gradient(135deg, rgba(0,229,255,0.85), rgba(8,217,214,0.7));
    border: 2px solid var(--neon-cyan);
    color: #001a1a;
    font-family: 'Jua', sans-serif;
    font-size: 16px;
    font-weight: 700;
    padding: 10px 18px;
    border-radius: 24px;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 4px 12px rgba(0,229,255,0.4);
  }
  .ranking-fab:active { transform: translateY(1px); }
  .home-fab {
    position: absolute;
    bottom: 6px;
    left: 6px;
    z-index: 30;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,46,99,0.2);
    border: 1.5px solid rgba(255,46,99,0.5);
    color: var(--neon-pink);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  /* 화면 우상단 코너 (게임판 영역 밖) */
  .corner-home {
    position: fixed;
    top: 8px;
    right: 8px;
    bottom: auto;
    left: auto;
    z-index: 100;
    background: rgba(255,46,99,0.85);
    color: white;
    border-color: var(--neon-pink);
    box-shadow: 0 3px 12px rgba(255,46,99,0.5);
  }
  .corner-home:active { transform: scale(0.95); }
  /* 화면 좌상단 소리 토글 버튼 */
  .corner-sound {
    position: fixed;
    top: 8px;
    left: 8px;
    bottom: auto;
    right: auto;
    z-index: 100;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(0,229,255,0.85);
    color: #00131a;
    border: 1.5px solid var(--neon-cyan);
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 3px 12px rgba(0,229,255,0.45);
  }
  .corner-sound.off {
    background: rgba(120,130,150,0.7);
    border-color: rgba(180,190,210,0.6);
    color: #fff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .corner-sound:active { transform: scale(0.95); }

  /* 상단 정보 바 */
  .area-display {
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
    border-radius: 10px;
    padding: 4px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    box-shadow: 0 0 12px rgba(255,46,99,0.4), inset 0 1px 0 rgba(255,255,255,0.2);
    position: relative;
    overflow: hidden;
    min-width: 100px;
    align-self: stretch;
    flex-shrink: 0;
  }
  .area-display::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.25), transparent 60%);
    pointer-events: none;
  }
  .area-display .area-lbl {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    margin-bottom: 1px;
  }
  .area-display .area-val {
    font-family: 'Jua', sans-serif;
    font-size: 28px;
    line-height: 1;
    color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .area-display.flash { animation: areaFlash 0.5s; }
  .area-display .area-unit {
    font-family: 'Jua', sans-serif;
    font-size: 11px;
    color: rgba(255,255,255,0.92);
    line-height: 1;
    margin-top: 2px;
    letter-spacing: 0.5px;
  }
  @keyframes areaFlash {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); box-shadow: 0 0 24px rgba(255,46,99,0.7); }
    100% { transform: scale(1); }
  }

  /* 보드 위 absolute 배지 (시간/줄·점수) */
  .board-badge {
    position: absolute;
    z-index: 20;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    border: 1.5px solid var(--panel-border);
    border-radius: 10px;
    padding: 5px 10px;
    font-family: 'Fredoka', sans-serif;
    pointer-events: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
  }
  .board-badge .lbl {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-right: 5px;
  }
  .board-badge .val {
    font-family: 'Jua', sans-serif;
    font-size: 16px;
    color: var(--text-light);
  }
  .time-badge {
    top: 6px;
    left: 6px;
    border-color: rgba(255,230,0,0.5);
  }
  .time-badge .val { color: var(--neon-yellow); font-size: 18px; }
  .time-badge.urgent {
    border-color: var(--neon-pink);
    animation: urgentPulse 0.6s infinite;
  }
  .time-badge.urgent .val { color: var(--neon-pink); }
  @keyframes urgentPulse {
    0%, 100% { box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
    50% { box-shadow: 0 2px 16px rgba(255,46,99,0.6); }
  }
  .score-badge {
    bottom: 6px;
    right: 6px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    align-items: flex-end;
    text-align: right;
    padding: 7px 12px;
  }
  .score-badge .badge-row {
    display: flex;
    align-items: baseline;
    gap: 6px;
    line-height: 1;
  }
  .score-badge .badge-row .lbl { font-size: 11px; }
  .score-badge .badge-row:first-child .val { color: var(--neon-green); font-size: 20px; }
  .score-badge .badge-row:last-child .val { color: var(--neon-cyan); font-size: 28px; font-weight: 700; }
  /* VS 모드: 격자판 좌우 바깥에 시간/점수 카드 배치 (1인 모드와 동일 패턴) */
  /* vs-board-row는 board-wrap을 감싸는 컨테이너. board-wrap이 패널 좌우 끝까지 펼쳐짐 */
  .vs-pane .vs-board-row {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    justify-content: center;
    width: 100%;
    flex: 1 1 auto;
    min-height: 0;
    /* 격자판 위 P 라벨이 잘리지 않도록 약간의 상단 여유 */
    margin-top: 8px;
  }
  /* vs-side는 board-inner 좌우 바깥에 absolute로 붙어 항상 격자판 가장자리에 위치 */
  .vs-pane .vs-side {
    position: absolute;
    top: 0;
    bottom: 0;
    width: var(--vs-side-w);
    display: flex;
    flex-direction: column;
    gap: 5px;
    justify-content: flex-start;
    min-width: 0;
    z-index: 5;
  }
  .vs-pane .vs-side-left {
    right: 100%;
    margin-right: var(--vs-side-gap);
  }
  .vs-pane .vs-side-right {
    left: 100%;
    margin-left: var(--vs-side-gap);
  }
  .vs-pane .vs-side-card {
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(6px);
    border: 1.5px solid var(--panel-border);
    border-radius: 8px;
    padding: 5px 6px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    min-width: 0;
  }
  .vs-pane .vs-side-lbl {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 2px;
    line-height: 1;
  }
  .vs-pane .vs-side-val {
    font-family: 'Jua', sans-serif;
    font-size: 18px;
    line-height: 1;
    color: var(--text-light);
  }
  .vs-pane .vs-time-card { border-color: rgba(255,230,0,0.45); }
  .vs-pane .vs-time-card .vs-side-val { color: var(--neon-yellow); font-size: 19px; }
  .vs-pane .vs-time-card.urgent {
    border-color: var(--neon-pink);
    animation: urgentPulse 0.6s infinite;
  }
  .vs-pane .vs-time-card.urgent .vs-side-val { color: var(--neon-pink); }
  /* 선택 카운트다운(가로×세로 정하는 15초) - 시간 카드 바로 아래 */
  .vs-pane .vs-pick-card { border-color: rgba(255,230,0,0.45); }
  .vs-pane .vs-pick-card .vs-pick-val { color: var(--neon-yellow); font-size: 22px; font-weight: 700; }
  .vs-pane .vs-pick-card.hidden { opacity: 0; visibility: hidden; }
  .vs-pane .vs-pick-card.urgent {
    border-color: var(--neon-pink);
    animation: urgentPulse 0.5s infinite;
  }
  .vs-pane .vs-pick-card.urgent .vs-pick-val { color: var(--neon-pink); }
  .vs-pane .vs-score-card { border-color: rgba(0,229,255,0.45); }
  .vs-pane .vs-score-card .vs-score-val { color: var(--neon-cyan); font-size: 22px; font-weight: 700; }
  .vs-pane.p2 .vs-score-card { border-color: rgba(255,110,199,0.45); }
  .vs-pane.p2 .vs-score-card .vs-score-val { color: var(--p2-color); }
  .vs-pane .vs-lines-card { border-color: rgba(8,217,214,0.4); }
  .vs-pane .vs-lines-card .vs-lines-val { color: var(--neon-green); }
  /* 우상단 ✕(홈) 버튼이 P1 우측 점수 카드 위에 겹치므로 살짝 아래로 밀어 줌 (세로 배치) */
  .vs-pane.p1 .vs-side-right { padding-top: 36px; }
  @media (orientation: landscape) and (min-width: 800px) {
    /* 가로 배치에선 ✕ 버튼이 P2 위쪽이므로 P1은 정상, P2가 밀려야 함 */
    .vs-pane.p1 .vs-side-right { padding-top: 0; }
    .vs-pane.p2 .vs-side-right { padding-top: 36px; }
  }

  /* 사이드 컬럼 안의 카드 */
  .side-card {
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    border: 1.5px solid var(--panel-border);
    border-radius: 14px;
    padding: 18px 16px;
    text-align: center;
    width: 100%;
    box-sizing: border-box;
    transition: opacity 0.2s, transform 0.2s;
  }
  .side-card.hidden { opacity: 0; visibility: hidden; }
  .side-lbl {
    font-size: 14px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .side-val {
    font-family: 'Jua', sans-serif;
    font-size: 40px;
    line-height: 1;
    color: var(--text-light);
  }
  /* 시간 카드 — 더 큼 */
  .time-card { border-color: rgba(255,230,0,0.45); }
  .time-card .side-val {
    color: var(--neon-yellow);
    font-size: 54px;
  }
  .time-card.urgent {
    border-color: var(--neon-pink);
    animation: timeCardPulse 0.6s infinite;
  }
  .time-card.urgent .side-val { color: var(--neon-pink); }
  @keyframes timeCardPulse {
    0%, 100% { box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    50% { box-shadow: 0 0 20px rgba(255,46,99,0.6); }
  }
  /* 선택 카운트다운 카드 */
  .pick-card { border-color: rgba(255,230,0,0.45); }
  .pick-card .pick-val { color: var(--neon-yellow); font-size: 48px; }
  .pick-card.urgent {
    border-color: var(--neon-pink);
    animation: timeCardPulse 0.5s infinite;
  }
  .pick-card.urgent .pick-val { color: var(--neon-pink); }
  /* 점수/줄 카드 */
  .score-card { border-color: rgba(0,229,255,0.45); }
  .score-card .score-val-big {
    color: var(--neon-cyan);
    font-size: 56px;
    font-weight: 700;
  }
  .lines-card { border-color: rgba(8,217,214,0.45); }
  .lines-card .lines-val-big { color: var(--neon-green); font-size: 44px; }

  .board-wrap {
    flex: 0 1 auto;
    min-height: 0;
    min-width: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    max-height: calc(100vh - 320px);
    max-width: calc(100vh - 320px);
  }
  .board-inner {
    position: relative;
    /* 캔버스 크기에 맞춰 축소 → 정사각 컨테이너(board-wrap) 안에서 가운데 정렬되어
       입력 패널(가운데 정렬, 같은 너비)과 좌우 끝이 맞음 */
  }
  .board {
    background: linear-gradient(135deg, rgba(15,52,96,0.6), rgba(22,33,62,0.6));
    border: 2px solid rgba(0,229,255,0.3);
    border-radius: 8px;
    box-shadow: 0 0 24px rgba(0,229,255,0.12), inset 0 0 30px rgba(0,0,0,0.4);
    display: block;
    width: 100%;
    height: 100%;
  }
  .vs-pane.p2 .board {
    border-color: rgba(255,110,199,0.3);
    box-shadow: 0 0 24px rgba(255,110,199,0.12), inset 0 0 30px rgba(0,0,0,0.4);
  }

  /* 입력 패널 */
  .input-panel {
    background: var(--panel-bg);
    backdrop-filter: blur(10px);
    border: 1.5px solid var(--panel-border);
    border-radius: 12px;
    padding: 5px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    box-sizing: border-box;
  }

  .dim-inputs {
    display: flex;
    gap: 8px;
    align-items: center;
    justify-content: center;
  }
  .dim-input-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    max-width: 100px;
  }
  .dim-label {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.2px;
    font-weight: 600;
    margin-bottom: 3px;
  }
  .dim-input {
    width: 100%;
    height: 48px;
    text-align: center;
    font-family: 'Jua', sans-serif;
    font-size: 32px;
    color: var(--text-light);
    background: rgba(0,0,0,0.4);
    border: 2.5px solid var(--panel-border);
    border-radius: 10px;
    outline: none;
    transition: all 0.2s;
    cursor: pointer;
    line-height: 1;
  }
  .dim-input.active-w {
    border-color: var(--neon-cyan);
    box-shadow: 0 0 8px rgba(0,229,255,0.4);
    color: var(--neon-cyan);
  }
  .dim-input.active-h {
    border-color: var(--neon-yellow);
    box-shadow: 0 0 8px rgba(255,230,0,0.4);
    color: var(--neon-yellow);
  }
  .vs-pane.p2 .dim-input.active-w {
    border-color: var(--p2-color);
    box-shadow: 0 0 8px rgba(255,110,199,0.4);
    color: var(--p2-color);
  }
  .times-symbol {
    font-family: 'Jua', sans-serif;
    font-size: 28px;
    color: var(--text-dim);
    margin-top: 14px;
  }
  .preview-eq {
    text-align: center;
    font-family: 'Jua', sans-serif;
    font-size: 22px;
    color: var(--text-light);
    background: rgba(0,0,0,0.3);
    border: 2px solid var(--panel-border);
    border-radius: 10px;
    padding: 0 10px;
    height: 48px;
    line-height: 48px;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    align-self: flex-end;
    margin-bottom: 0;
    min-width: 50px;
    flex-shrink: 0;
  }
  .preview-eq.match {
    color: #001a1a;
    background: linear-gradient(135deg, #08D9D6, #00BFA5);
    border-color: #08D9D6;
    font-weight: 700;
    box-shadow: 0 0 12px rgba(8,217,214,0.4);
  }
  .preview-eq.mismatch {
    color: white;
    background: rgba(255,46,99,0.3);
    border-color: var(--neon-pink);
    font-weight: 700;
  }

  /* 선택 카운트다운 (블록 등장 후 15초) — 우상단 */
  .pick-countdown {
    position: absolute;
    top: 8px;
    right: 8px;
    z-index: 25;
    background: rgba(0,0,0,0.78);
    border: 2px solid var(--neon-yellow);
    color: var(--neon-yellow);
    font-family: 'Jua', sans-serif;
    font-size: 18px;
    padding: 4px 12px;
    border-radius: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .pick-countdown.hidden { opacity: 0; visibility: hidden; }
  .pick-countdown.urgent {
    border-color: var(--neon-pink);
    color: var(--neon-pink);
    animation: pickPulse 0.5s infinite;
  }
  @keyframes pickPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  .vs-pane .pick-countdown {
    font-size: 14px;
    padding: 3px 9px;
    /* 상단 stats-bar로 시간이 빠졌으므로 격자판 우상단에 배치 */
    top: 6px;
    right: 6px;
    left: auto;
  }

  .keypad { display: grid; gap: 3px; }
  .keypad.numpad { grid-template-columns: repeat(5, minmax(0, 1fr)); }
  /* 바꿈 · 지움 · ◀ · ▶ · 떨어뜨리기 — 모두 같은 크기(균등 분할) */
  .keypad.actionpad { grid-template-columns: repeat(5, minmax(0, 1fr)); }
  .key {
    aspect-ratio: 2.4 / 1;
    border: 1.5px solid var(--panel-border);
    background: rgba(255,255,255,0.06);
    color: var(--text-light);
    border-radius: 7px;
    font-family: 'Jua', sans-serif;
    font-size: 28px;
    transition: all 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    line-height: 1;
    white-space: nowrap;
    overflow: hidden;
    min-width: 0;
  }
  .keypad.actionpad .key { aspect-ratio: 2 / 1; }
  .key:active {
    transform: translateY(1px) scale(0.96);
    background: rgba(255,255,255,0.15);
  }
  .key.action {
    background: linear-gradient(135deg, rgba(255,46,99,0.25), rgba(185,103,255,0.2));
    border: 2px solid var(--neon-pink);
    color: var(--neon-pink);
    font-size: 17px;
    font-weight: 700;
    line-height: 1.05;
    text-shadow: 0 0 4px rgba(255,46,99,0.4);
  }
  .key.dir {
    background: linear-gradient(135deg, #00E5FF, #0099CC);
    border: 2px solid #00E5FF;
    color: #001a1a;
    font-size: 32px;
    font-weight: 700;
    text-shadow: 0 1px 2px rgba(255,255,255,0.3);
    box-shadow: 0 4px 10px rgba(0,229,255,0.45);
  }
  .key.drop {
    background: linear-gradient(135deg, #08D9D6, #00BFA5);
    border: 2px solid #08D9D6;
    color: #001a1a;
    font-size: clamp(11px, 2.4vw, 17px);
    font-weight: 700;
    text-shadow: 0 1px 2px rgba(255,255,255,0.3);
    box-shadow: 0 4px 12px rgba(8,217,214,0.55);
  }
  .key.drop:disabled {
    background: rgba(255,255,255,0.04);
    border-color: var(--panel-border);
    color: var(--text-dim);
    text-shadow: none;
    box-shadow: none;
    cursor: not-allowed;
  }
  .key.clear {
    background: linear-gradient(135deg, #FF9F1C, #E07B00);
    border: 2px solid #FF9F1C;
    color: #1a1100;
    font-size: 19px;
    font-weight: 700;
    text-shadow: 0 1px 2px rgba(255,255,255,0.3);
    box-shadow: 0 4px 10px rgba(255,159,28,0.45);
  }
  .vs-pane.p2 .key.dir {
    background: linear-gradient(135deg, #FF6EC7, #C73AA0);
    border: 2px solid var(--p2-color);
    color: #1a0010;
    text-shadow: 0 1px 2px rgba(255,255,255,0.3);
    box-shadow: 0 4px 10px rgba(255,110,199,0.5);
  }

  .toast {
    position: fixed;

<script>
(function() {
  'use strict';

  const COLORS = [
    '#C0532B', '#D9784A', '#E0A95C', '#9C5A33',
    '#A23E2A', '#CDA46A', '#E8B23A', '#C56B5C', '#8A9A5B'
  ];
  // 곱셈 범위: 2~6단 (넓이 4~36)
  //  - 조각이 작아 9칸 너비 보드에 잘 맞물려 줄이 자주 지워짐
  //  - 9·18·36은 9칸(가로 전체)으로도 놓을 수 있어 한 번에 줄이 사라짐
  //  - 더 어렵게(7~9단 포함) 하려면 GUGUDAN_MAX 를 9로 올리면 됨
  const GUGUDAN_MIN = 2;
  const GUGUDAN_MAX = 6;

  const $ = id => document.getElementById(id);
  const $$ = sel => document.querySelectorAll(sel);
  const sleep = ms => new Promise(r => setTimeout(r, ms));

  function pickRandomArea(cols, rows) {
    const min = GUGUDAN_MIN, max = GUGUDAN_MAX;
    // 2~9단 모든 곱 (a × b)
    const set = new Set();
    for (let a = min; a <= max; a++)
      for (let b = min; b <= max; b++) set.add(a * b);
    const candidates = Array.from(set);
    // 보드에 들어갈 수 있는 것만 (가로·세로 모두 2 이상이며 판 안에 들어가는 분해가 존재)
    const valid = candidates.filter(a => {
      for (let w = 1; w <= cols; w++) {
        if (a % w === 0) {
          const h = a / w;
          if (h >= 1 && h <= rows) return true;
        }
      }
      return false;
    });
    return valid[Math.floor(Math.random() * valid.length)];
  }

  function lightenColor(hex, percent) {
    const c = hexToRgb(hex);
    return `rgb(${Math.min(255, Math.round(c.r + (255 - c.r) * percent / 100))},${Math.min(255, Math.round(c.g + (255 - c.g) * percent / 100))},${Math.min(255, Math.round(c.b + (255 - c.b) * percent / 100))})`;
  }
  function darkenColor(hex, percent) {
    const c = hexToRgb(hex);
    return `rgb(${Math.max(0, Math.round(c.r * (1 - percent / 100)))},${Math.max(0, Math.round(c.g * (1 - percent / 100)))},${Math.max(0, Math.round(c.b * (1 - percent / 100)))})`;
  }
  function hexToRgb(hex) {
    if (hex.startsWith('rgb')) {
      const m = hex.match(/\d+/g);
      return { r: +m[0], g: +m[1], b: +m[2] };
    }
    const h = hex.replace('#', '');
    return { r: parseInt(h.substring(0, 2), 16), g: parseInt(h.substring(2, 4), 16), b: parseInt(h.substring(4, 6), 16) };
  }
  function escapeHtml(s) {
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ── 접근성/피드백 전역 설정 ──
  let soundOn = true;        // 소리·진동

  // ── 효과음 (Web Audio, 외부 파일 없음) ──
  const Sound = (function () {
    let ctx = null;
    function ac() {
      if (!soundOn) return null;
      if (!ctx) {
        try { ctx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch (e) { return null; }
      }
      if (ctx.state === 'suspended') { try { ctx.resume(); } catch (e) {} }
      return ctx;
    }
    function tone(freq, dur, type = 'sine', vol = 0.2, delay = 0) {
      const c = ac(); if (!c) return;
      const t0 = c.currentTime + delay;
      const o = c.createOscillator(), g = c.createGain();
      o.type = type;
      o.frequency.setValueAtTime(freq, t0);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(vol, t0 + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      o.connect(g); g.connect(c.destination);
      o.start(t0); o.stop(t0 + dur + 0.03);
    }
    return {
      resume() { ac(); },
      place() { tone(523, 0.12, 'triangle', 0.18); },
      wrong() { tone(160, 0.22, 'sawtooth', 0.16); },
      clear(n) {
        const notes = [523, 659, 784, 988, 1175, 1318];
        const k = Math.min(n, notes.length);
        for (let i = 0; i < k; i++) tone(notes[i], 0.16, 'square', 0.18, i * 0.08);
      },
      gameOver() {
        tone(330, 0.2, 'sawtooth', 0.18, 0);
        tone(247, 0.25, 'sawtooth', 0.18, 0.18);
        tone(165, 0.4, 'sawtooth', 0.2, 0.4);
      }
    };
  })();
  // 진동(햅틱) — 소리 토글과 함께 켜짐
  function vibrate(pattern) {
    if (soundOn && navigator.vibrate) { try { navigator.vibrate(pattern); } catch (e) {} }
  }

  // Player 클래스
  class Player {
    constructor(opts) {
      this.id = opts.id;
      this.cols = opts.cols;
      this.rows = opts.rows;
      // 블록 변의 길이 한계 = 보드 크기 (가로/세로 1도 허용 → 1칸 틈 메우기 가능)
      this.maxDimW = this.cols;
      this.maxDimH = this.rows;
      this.canvas = opts.canvas;
      this.ctx = this.canvas.getContext('2d');
      this.cellSize = 16;
      this.elArea = opts.elArea;
      this.elLines = opts.elLines;
      this.elScore = opts.elScore;
      this.elInputW = opts.elInputW;
      this.elInputH = opts.elInputH;
      this.elPreviewEq = opts.elPreviewEq;
      this.elBtnDrop = opts.elBtnDrop;
      this.elAreaContainer = opts.elAreaContainer;
      this.elPickCountdown = opts.elPickCountdown || null;

      this.board = [];
      this.area = 1;
      this.inputW = null;
      this.inputH = null;
      this.activeInput = 'w';
      this.pendingX = 0;
      this.score = 0;
      this.linesCleared = 0;
      this.tries = 0;
      this.nextColorIdx = 0;
      this.gameOver = false;
      this.isAnimating = false;
      this.toppedOut = false;                 // 블록이 가득 차 패배했는지
      this.onGameOver = opts.onGameOver || null;
      this.gameStartTs = 0;                    // 게임 시작 시각(속도 가속 기준)

      // 테트리스 방식 상태
      // phase: 'pick' (입력 대기) | 'fall' (자동 낙하 중) | 'idle' (게임 시작 전/정착 처리 중)
      this.phase = 'idle';
      this.activeW = null;     // 낙하 단계의 가로
      this.activeH = null;     // 낙하 단계의 세로
      this.activeY = 0;        // 활성 블록의 상단 y 좌표
      this.activeColor = null;
      this.pickTimer = null;   // setInterval — 선택 카운트다운
      this.pickTimeLeft = 15;
      this.fallTimer = null;   // setInterval — 1초마다 한 칸 낙하
      this.fallStepMs = 1000;
      this.pickSec = opts.pickSec || 15;        // 선택 제한시간(레벨별)
      this.accelRate = opts.accelRate || 0.85;  // 30초당 가속 비율(작을수록 빨라짐)
      this.minFallMs = opts.minFallMs || 200;   // 낙하 간격 하한

      this.initBoard();
    }

    // 모든 타이머 정지 (게임 종료/재시작 시)
    stopTimers() {
      if (this.pickTimer) { clearInterval(this.pickTimer); this.pickTimer = null; }
      if (this.fallTimer) { clearInterval(this.fallTimer); this.fallTimer = null; }
      this.hidePickCountdown();
    }

    hidePickCountdown() {
      if (this.elPickCountdown) {
        this.elPickCountdown.classList.add('hidden');
        this.elPickCountdown.classList.remove('urgent');
      }
    }

    showPickCountdown() {
      if (!this.elPickCountdown) return;
      this.elPickCountdown.classList.remove('hidden');
      // 자식 값 요소 찾기: 1인 모드(.pick-val) 또는 VS 모드(.vs-pick-val), 없으면 전체 텍스트로
      const valEl = this.elPickCountdown.querySelector('.pick-val, .vs-pick-val');
      if (valEl) {
        valEl.textContent = this.pickTimeLeft;
      } else {
        this.elPickCountdown.textContent = `⏳ ${this.pickTimeLeft}`;
      }
      this.elPickCountdown.classList.toggle('urgent', this.pickTimeLeft <= 5);
    }

    initBoard() {
      this.board = [];
      for (let r = 0; r < this.rows; r++) {
        const row = [];
        for (let c = 0; c < this.cols; c++) row.push(null);
        this.board.push(row);
      }
    }

    resize() {
      const pane = this.canvas.closest('.vs-pane');
      // 솔로: 정사각 컨테이너 board-wrap 기준 측정 (board-inner는 캔버스에 맞춰 축소됨)
      // VS: 기존대로 board-inner(부모) 기준
      const wrap = pane ? this.canvas.parentElement
                        : (this.canvas.closest('.board-wrap') || this.canvas.parentElement);
      const wrapW = wrap.clientWidth;
      const wrapH = wrap.clientHeight;
      const dpr = window.devicePixelRatio || 1;
      // 가로/세로 중 작은 쪽 기준으로 cellSize 결정
      this.cellSize = Math.min(wrapW / this.cols, wrapH / this.rows);
      const drawW = this.cellSize * this.cols;
      const drawH = this.cellSize * this.rows;
      this.canvas.style.width = drawW + 'px';
      this.canvas.style.height = drawH + 'px';
      this.canvas.width = Math.floor(drawW * dpr);
      this.canvas.height = Math.floor(drawH * dpr);
      this.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      // 입력 패널 너비를 격자판 너비와 맞춰 가운데 정렬 (열 맞춤)
      let panel = null;
      if (pane) {
        panel = pane.querySelector('.input-panel');
      } else if (this.id === 'solo') {
        panel = document.querySelector('#game-screen .input-panel');
      }
      if (panel) {
        panel.style.width = drawW + 'px';
        panel.style.maxWidth = drawW + 'px';
      }
      this.draw();
    }

    pickNewArea() {
      // 2~6단 곱 중, 지금 보드에 실제로 놓을 수 있는 넓이만 후보로
      const set = new Set();
      for (let a = GUGUDAN_MIN; a <= GUGUDAN_MAX; a++)
        for (let b = GUGUDAN_MIN; b <= GUGUDAN_MAX; b++) set.add(a * b);
      const fit = [...set].filter(area => this.areaCanFit(area));
      if (fit.length === 0) return false;   // 놓을 자리가 전혀 없음 → 보드 가득

      // 보드가 높이 쌓일수록 작은 넓이가 더 자주 나오도록 가중치 적용
      // (꽉 찼을 때 큰 블록이 나와 못 움직이고 쌓이는 것을 방지)
      const stack = this.boardStackRatio();      // 0(빈 보드) ~ 1(천장까지)
      const k = 0.2 + stack * 3.0;               // 작은 넓이 선호 강도
      let total = 0;
      const weights = fit.map(a => { const w = 1 / Math.pow(a, k); total += w; return w; });
      let rnd = Math.random() * total;
      let chosen = fit[fit.length - 1];
      for (let i = 0; i < fit.length; i++) {
        rnd -= weights[i];
        if (rnd <= 0) { chosen = fit[i]; break; }
      }
      this.area = chosen;
      this.elArea.textContent = this.area;
      if (this.elAreaContainer) {
        this.elAreaContainer.classList.remove('flash');
        void this.elAreaContainer.offsetWidth;
        this.elAreaContainer.classList.add('flash');
      }
      return true;
    }
    // 가장 높이 쌓인 곳 기준 적재율 (0=빈 보드, 1=천장까지)
    boardStackRatio() {
      let top = this.rows;
      for (let c = 0; c < this.cols; c++) {
        for (let r = 0; r < this.rows; r++) {
          if (this.board[r][c]) { if (r < top) top = r; break; }
        }
      }
      return (this.rows - top) / this.rows;
    }
    // (w,h) 블록을 보드 어딘가에 떨어뜨려 놓을 수 있는지
    canPlaceBlockSomewhere(w, h) {
      if (w < 1 || h < 1 || w > this.cols || h > this.rows) return false;
      for (let x = 0; x + w <= this.cols; x++) {
        if (this.computeLandingRow(x, w, h) >= 0) return true;
      }
      return false;
    }
    // 넓이를 놓을 수 있는 (보드에 실제로 들어가는) 분해가 있는지
    areaCanFit(area) {
      for (let w = 1; w <= this.cols; w++) {
        if (area % w !== 0) continue;
        const h = area / w;
        if (h > this.rows) continue;
        if (this.canPlaceBlockSomewhere(w, h)) return true;
      }
      return false;
    }

    // 새 블록 사이클 시작: 보드에 놓을 수 있는 새 넓이 선택 → 'pick' 단계
    startNewCycle() {
      if (this.gameOver) return;
      if (!this.gameStartTs) this.gameStartTs = Date.now();
      if (this.pickTimer) { clearInterval(this.pickTimer); this.pickTimer = null; }
      if (this.fallTimer) { clearInterval(this.fallTimer); this.fallTimer = null; }

      this.inputW = null;
      this.inputH = null;
      this.elInputW.textContent = '';
      this.elInputH.textContent = '';
      this.setActiveInput('w');
      this.pendingX = Math.floor(this.cols / 2);
      this.activeW = null;
      this.activeH = null;
      this.activeY = 0;
      this.activeColor = null;
      this.phase = 'pick';

      // 지금 보드에 놓을 수 있는 넓이를 출제 (없으면 보드가 가득 → 게임오버)
      if (!this.pickNewArea()) { this.triggerGameOver(); return; }

      this.updatePreview();
      this.draw();

      this.pickTimeLeft = this.pickSec;
      this.startPickTimer();
    }

    startPickTimer() {
      // 곱셈은 재촉하지 않음 — 선택 제한시간/자동 낙하 없음. 카운트다운 카드는 숨김.
      if (this.pickTimer) { clearInterval(this.pickTimer); this.pickTimer = null; }
      this.hidePickCountdown();
    }

    // 입력한 모양이 들어갈 자리가 없을 때: 게임오버 대신 다시 고르게 함
    revertToPick(msg) {
      if (this.gameOver) return;
      if (this.fallTimer) { clearInterval(this.fallTimer); this.fallTimer = null; }
      this.phase = 'pick';
      this.activeW = null; this.activeH = null; this.activeY = 0; this.activeColor = null;
      this.inputW = null; this.inputH = null;
      this.elInputW.textContent = '';
      this.elInputH.textContent = '';
      this.setActiveInput('w');
      this.pendingX = Math.floor(this.cols / 2);
      if (msg) {
        const p = this.id === 'p2' ? 'P2 ' : (this.id === 'p1' ? 'P1 ' : '');
        showToast(p + msg, 'info');
        Sound.wrong();
      }
      this.updatePreview();
      this.draw();
      this.pickTimeLeft = this.pickSec;
      this.startPickTimer();
    }

    // 15초 안에 직접 선택 안 됐을 때 랜덤으로 분해 후 낙하 시작
    autoPickAndStartFalling() {
      if (this.gameOver || this.phase !== 'pick') return;
      // 현재 area를 분해할 수 있고 보드에 실제로 놓을 수 있는 (w, h) 쌍
      const pairs = [];
      for (let w = 1; w <= this.cols; w++) {
        if (this.area % w !== 0) continue;
        const h = this.area / w;
        if (h < 1 || h > this.rows) continue;
        if (this.canPlaceBlockSomewhere(w, h)) pairs.push([w, h]);
      }
      if (pairs.length === 0) {
        // 이론상 발생하지 않지만 안전장치: 다음 사이클로
        this.startNewCycle();
        return;
      }
      const [w, h] = pairs[Math.floor(Math.random() * pairs.length)];
      this.inputW = w;
      this.inputH = h;
      this.elInputW.textContent = w;
      this.elInputH.textContent = h;
      this.pendingX = Math.max(0, Math.floor((this.cols - w) / 2));
      this.clampPendingX();
      this.updatePreview();
      const prefix = this.id === 'p2' ? 'P2 ' : (this.id === 'p1' ? 'P1 ' : '');
      showToast(`⏰ ${prefix}자동 선택: ${w} × ${h}`, 'info');
      this.startFalling();
    }

    // 낙하 단계 시작: activeW/H 확정, activeY=0, 1초 타이머
    startFalling() {
      if (this.gameOver) return;
      if (!this.isAcceptablePair(this.inputW, this.inputH)) return;

      // pick 타이머 정리
      if (this.pickTimer) { clearInterval(this.pickTimer); this.pickTimer = null; }
      this.hidePickCountdown();

      this.activeW = this.inputW;
      this.activeH = this.inputH;
      this.activeY = 0;
      this.activeColor = COLORS[this.nextColorIdx];
      this.nextColorIdx = (this.nextColorIdx + 1) % COLORS.length;
      this.clampPendingX();
      this.phase = 'fall';

      // 시작 위치가 이미 겹치면 게임오버 신호
      if (!this.canPlace(this.pendingX, this.activeY, this.activeW, this.activeH)) {
        // 가능한 자리(같은 단계에서)를 찾아 본다
        let placed = false;
        for (let x = 0; x <= this.cols - this.activeW; x++) {
          if (this.canPlace(x, 0, this.activeW, this.activeH)) {
            this.pendingX = x;
            placed = true;
            break;
          }
        }
        if (!placed) {
          // 이 모양은 들어갈 자리가 없음 → 게임오버 대신 다른 모양 고르도록 안내
          this.revertToPick('그 모양은 들어갈 자리가 없어요. 다른 가로·세로로 바꿔보세요');
          return;
        }
      }

      this.draw();
      this.updatePreview();
      this.fallTimer = setInterval(() => this.stepFall(), this.currentFallMs());
    }

    // 한 칸 자동 낙하
    stepFall() {
      if (this.gameOver) { this.stopTimers(); return; }
      if (this.phase !== 'fall' || this.activeW === null) return;

      // 사용자가 입력을 다른 일치 조합으로 바꿨다면 activeW/H를 동기화
      this.syncActiveFromInput();

      const nextY = this.activeY + 1;
      if (this.canPlace(this.pendingX, nextY, this.activeW, this.activeH)) {
        this.activeY = nextY;
        this.draw();
      } else {
        // 정착
        this.lockActiveBlock();
      }
    }

    // 입력값이 일치 조합으로 변경됐을 때 activeW/H를 반영. 위치도 유지.
    syncActiveFromInput() {
      if (!this.isAcceptablePair(this.inputW, this.inputH)) return;
      if (this.inputW === this.activeW && this.inputH === this.activeH) return;
      // 새 크기로 변경 시도: 현재 (pendingX, activeY) 기준으로 들어갈 수 있는지
      const newW = this.inputW, newH = this.inputH;
      // pendingX 클램프
      let nx = this.pendingX;
      if (nx + newW > this.cols) nx = this.cols - newW;
      if (nx < 0) nx = 0;
      // activeY가 보드 밖으로 가면 클램프
      let ny = this.activeY;
      if (ny + newH > this.rows) ny = this.rows - newH;
      if (ny < 0) ny = 0;
      if (this.canPlace(nx, ny, newW, newH)) {
        this.activeW = newW;
        this.activeH = newH;
        this.pendingX = nx;
        this.activeY = ny;
      }
      // 들어갈 수 없으면 변경 무시 (다음 stepFall 때 다시 시도)
    }

    // 현재 활성 블록을 보드에 고정하고 줄 정리 → 다음 사이클
    async lockActiveBlock() {
      if (this.fallTimer) { clearInterval(this.fallTimer); this.fallTimer = null; }
      if (this.activeW === null) { this.startNewCycle(); return; }
      this.phase = 'idle';
      this.isAnimating = true;
      this.placeBlockAt(this.pendingX, this.activeY, this.activeW, this.activeH, this.activeColor);
      this.score += this.activeW * this.activeH;
      this.elScore.textContent = this.score;
      this.draw();
      // 넓이 = 단위 정사각형(칸) 개수 강조
      const okPrefix = this.id === 'p2' ? 'P2 ' : (this.id === 'p1' ? 'P1 ' : '');
      showToast(`${okPrefix}✓ ${this.activeW} × ${this.activeH} = ${this.activeW * this.activeH}칸`, 'success');
      Sound.place();
      vibrate(20);
      const cleared = await this.clearFullLines();
      if (cleared > 0) {
        this.linesCleared += cleared;
        // 한 번에 여러 줄을 지울수록 보너스가 커짐
        const base = cleared * 100;
        const bonus = cleared >= 2 ? cleared * (cleared - 1) * 150 : 0;
        this.score += base + bonus;
        this.elLines.textContent = this.linesCleared;
        this.elScore.textContent = this.score;
        Sound.clear(cleared);
        if (cleared >= 2) {
          const NAMES = { 2: '더블', 3: '트리플', 4: '테트리스' };
          const name = NAMES[cleared] || `${cleared}줄`;
          showToast(`${okPrefix}🔥 ${cleared}줄 동시! ${name} 보너스 +${bonus}`, 'bonus');
          vibrate([0, 40, 40, 40]);
        } else {
          vibrate(30);
        }
      }
      this.tries++;
      this.activeW = null;
      this.activeH = null;
      this.activeColor = null;
      this.isAnimating = false;
      // 위에 닿았으면(맨 윗줄까지 쌓였으면) 게임 오버
      if (this.isTopReached()) { this.triggerGameOver(); return; }
      if (!this.gameOver) this.startNewCycle();
    }

    // 맨 윗줄(0행)에 블록이 닿았는지 = 더 이상 못 쌓음
    isTopReached() {
      for (let c = 0; c < this.cols; c++) if (this.board[0][c]) return true;
      return false;
    }

    setActiveInput(which) {
      this.activeInput = which;
      this.elInputW.classList.toggle('active-w', which === 'w');
      this.elInputH.classList.toggle('active-h', which === 'h');
      if (which === 'w') this.elInputH.classList.remove('active-h');
      else this.elInputW.classList.remove('active-w');
    }

    // 유효한 가로? (1 이상, 보드 안, 약수, 세로도 1 이상 보드 안)
    isValidWidth(w) {
      if (w < 1 || w > this.maxDimW) return false;
      if (this.area % w !== 0) return false;
      const h = this.area / w;
      if (h < 1 || h > this.maxDimH) return false;
      return true;
    }
    // 자릿수를 더 입력하면 유효한 가로가 될 가능성이 있는지
    canExtendW(prefix) {
      const start = prefix * 10;
      for (let x = start; x < start + 10; x++) {
        if (x > this.maxDimW) break;
        if (this.isValidWidth(x)) return true;
      }
      return false;
    }
    // 입력한 (가로, 세로)가 받아들일 수 있는 답인지 (1 이상, 보드 안, 곱=넓이)
    isAcceptablePair(w, h) {
      if (w == null || h == null) return false;
      if (w < 1 || h < 1) return false;
      if (w > this.maxDimW || h > this.maxDimH) return false;
      return w * h === this.area;
    }
    // 낙하 간격: 지운 줄 수에 따라만 단계적으로 빨라짐 (시간과 무관)
    currentFallMs() {
      const base = this.fallStepMs || 1400;
      // '시간'이 아니라 '지운 줄 수'에 따라 단계적으로 빨라짐
      // → 곱셈을 천천히 생각해도 속도가 빨라지지 않음
      const level = Math.floor((this.linesCleared || 0) / 6);
      const decay = Math.pow(0.9, level);
      return Math.max(this.minFallMs, Math.round(base * decay));
    }
    // 더 이상 블록을 놓을 수 없어 게임 오버
    triggerGameOver() {
      if (this.gameOver) return;
      this.gameOver = true;
      this.toppedOut = true;
      this.phase = 'idle';
      this.stopTimers();
      this.draw();
      Sound.gameOver();
      vibrate([100, 50, 100]);
      if (typeof this.onGameOver === 'function') this.onGameOver(this);
    }
    // 가로 입력이 정답이 될 수 없을 때 이유를 알려주는 힌트
    showWidthHint(w) {
      const prefix = this.id === 'p2' ? 'P2 ' : (this.id === 'p1' ? 'P1 ' : '');
      let msg;
      if (this.area % w !== 0) {
        msg = `💡 ${this.area}는 ${w}로 나누어떨어지지 않아요`;
      } else {
        const h = this.area / w;
        if (h > this.maxDimH) msg = `💡 ${w}로는 세로가 판을 넘어요`;
        else msg = `💡 다시 생각해 보세요`;
      }
      showToast(prefix + msg, 'info');
      Sound.wrong();
      vibrate(60);
    }

    appendDigit(d) {
      if (this.gameOver) return;
      if (this.phase !== 'pick' && this.phase !== 'fall') return;
      let autoSwitchToH = false;
      if (this.activeInput === 'w') {
        if (this.inputW === null) {
          if (d === 0) return;
          this.inputW = d;
        } else {
          const next = this.inputW * 10 + d;
          if (next > this.maxDimW) return;
          this.inputW = next;
        }
        this.elInputW.textContent = this.inputW;
        if (this.phase === 'pick') {
          this.pendingX = Math.max(0, Math.floor((this.cols - this.inputW) / 2));
        }
        // 자동 세로 전환 판정
        // - 현재 inputW가 유효하지 않고 더 늘려도 가능성이 없으면 → 즉시 세로로
        // - 현재 inputW가 유효한데 더 늘려도 가능성이 없으면 (즉 유일한 답) → 즉시 세로로
        // - 현재 inputW가 유효하든 무효하든 더 늘릴 가능성이 있으면 → 대기
        const canExtend = this.canExtendW(this.inputW);
        if (!canExtend) autoSwitchToH = true;
      } else {
        if (this.inputH === null) {
          if (d === 0) return;
          this.inputH = d;
        } else {
          const next = this.inputH * 10 + d;
          if (next > this.maxDimH) return;
          this.inputH = next;
        }
        this.elInputH.textContent = this.inputH;
      }
      this.clampPendingX();
      this.updatePreview();
      // 가로를 더 늘릴 가능성이 없으면 세로 칸으로 포커스 이동 (세로 값은 학생이 직접 입력)
      if (autoSwitchToH && this.inputH === null) {
        this.setActiveInput('h');
        // 입력한 가로로는 정답이 될 수 없으면 이유를 힌트로 안내
        if (!this.isValidWidth(this.inputW)) this.showWidthHint(this.inputW);
      }
      this.maybeStartFalling();
      this.draw();
    }

    // 입력이 완성됐을 때 자동으로 낙하 단계로 전환
    maybeStartFalling() {
      if (this.phase !== 'pick') return;
      if (!this.isAcceptablePair(this.inputW, this.inputH)) return;
      this.startFalling();
    }

    clearActiveInput() {
      if (this.gameOver) return;
      // 'fall' 단계에서는 입력 변경(낙하 중 다시 조합 시도) 가능
      if (this.phase !== 'pick' && this.phase !== 'fall') return;
      // 현재 칸에 값이 있으면 그 칸을 지우고,
      // 현재 칸이 비어 있으면 다른 칸(직전에 입력한 값)을 지움 → 잘못 친 가로도 지워짐
      if (this.activeInput === 'h') {
        if (this.inputH !== null) {
          this.inputH = null;
          this.elInputH.textContent = '';
        } else if (this.inputW !== null) {
          this.setActiveInput('w');
          this.inputW = null;
          this.elInputW.textContent = '';
        }
      } else {
        if (this.inputW !== null) {
          this.inputW = null;
          this.elInputW.textContent = '';
        } else if (this.inputH !== null) {
          this.setActiveInput('h');
          this.inputH = null;
          this.elInputH.textContent = '';
        }
      }
      this.updatePreview();
      this.draw();
    }

    toggleSwapDims() {
      if (this.gameOver) return;
      if (this.phase !== 'pick' && this.phase !== 'fall') return;
      const t = this.inputW;
      this.inputW = this.inputH;
      this.inputH = t;
      this.elInputW.textContent = this.inputW === null ? '' : this.inputW;
      this.elInputH.textContent = this.inputH === null ? '' : this.inputH;
      if (this.phase === 'pick' && this.inputW !== null) {
        this.pendingX = Math.max(0, Math.floor((this.cols - this.inputW) / 2));
      }
      this.clampPendingX();
      this.updatePreview();
      // 낙하 중이면 즉시 activeW/H 동기화 시도
      if (this.phase === 'fall') this.syncActiveFromInput();
      else this.maybeStartFalling();
      this.draw();
    }

    nextInput() {
      if (this.gameOver || this.isAnimating) return;
      this.setActiveInput(this.activeInput === 'w' ? 'h' : 'w');
    }

    clampPendingX() {
      // 낙하 중에는 activeW 기준, 그 외에는 inputW 기준
      const w = this.phase === 'fall' && this.activeW !== null ? this.activeW : this.inputW;
      if (w === null) return;
      if (this.pendingX < 0) this.pendingX = 0;
      if (this.pendingX + w > this.cols) this.pendingX = this.cols - w;
      if (this.pendingX < 0) this.pendingX = 0;
    }

    updatePreview() {
      const eq = this.elPreviewEq;
      if (this.inputW === null && this.inputH === null) {
        eq.innerHTML = '=?';
        eq.className = 'preview-eq';
        if (this.elBtnDrop) this.elBtnDrop.disabled = (this.phase !== 'fall');
        return;
      }
      if (this.inputW !== null && this.inputH !== null) {
        const product = this.inputW * this.inputH;
        if (this.isAcceptablePair(this.inputW, this.inputH)) {
          eq.innerHTML = `=${product} ✓`;
          eq.className = 'preview-eq match';
        } else {
          const dir = product > this.area ? '큼' : '작음';
          eq.innerHTML = `=${product} ${dir}`;
          eq.className = 'preview-eq mismatch';
        }
      } else {
        eq.innerHTML = '=?';
        eq.className = 'preview-eq';
      }
      // 떨어뜨리기 버튼은 낙하 단계일 때만 활성
      if (this.elBtnDrop) this.elBtnDrop.disabled = (this.phase !== 'fall');
    }

    moveLeft() {
      if (this.gameOver) return;
      if (this.phase !== 'fall' || this.activeW === null) return;
      const nx = this.pendingX - 1;
      if (nx < 0) return;
      // 같은 높이에서 갈 수 있으면 그대로 이동
      if (this.canPlace(nx, this.activeY, this.activeW, this.activeH)) {
        this.pendingX = nx;
        this.draw();
        return;
      }
      // 가운데 블록 등에 막혔으면, 옆 칸에 자리가 있을 때 위로 살짝 들어 턱을 넘어 이동
      for (let y = this.activeY - 1; y >= 0; y--) {
        if (this.canPlace(nx, y, this.activeW, this.activeH)) {
          this.pendingX = nx;
          this.activeY = y;
          this.draw();
          return;
        }
      }
    }
    moveRight() {
      if (this.gameOver) return;
      if (this.phase !== 'fall' || this.activeW === null) return;
      const nx = this.pendingX + 1;
      if (nx + this.activeW > this.cols) return;
      if (this.canPlace(nx, this.activeY, this.activeW, this.activeH)) {
        this.pendingX = nx;
        this.draw();
        return;
      }
      for (let y = this.activeY - 1; y >= 0; y--) {
        if (this.canPlace(nx, y, this.activeW, this.activeH)) {
          this.pendingX = nx;
          this.activeY = y;
          this.draw();
          return;
        }
      }
    }

    canPlace(x, y, w, h) {
      if (x < 0 || y < 0 || x + w > this.cols || y + h > this.rows) return false;
      for (let r = y; r < y + h; r++)
        for (let c = x; c < x + w; c++)
          if (this.board[r][c]) return false;
      return true;
    }

    computeLandingRow(x, w, h) {
      let best = -1;
      for (let r = 0; r <= this.rows - h; r++) {
        if (this.canPlace(x, r, w, h)) best = r;
        else break;
      }
      return best;
    }

    placeBlockAt(x, y, w, h, color) {
      for (let r = y; r < y + h; r++)
        for (let c = x; c < x + w; c++)
          this.board[r][c] = { color };
    }

    // 하드드롭: 현재 activeY 아래쪽 가능한 가장 깊은 위치까지 즉시 이동해서 정착
    async drop() {
      if (this.gameOver) return;
      if (this.phase !== 'fall' || this.activeW === null) {
        // pick 단계에서 누른 경우 안내
        if (this.phase === 'pick') {
          showToast('아직 블록이 등장 중이에요', 'info');
        }
        return;
      }
      // 낙하 타이머는 즉시 멈춤 (정착 처리에 맡김)
      if (this.fallTimer) { clearInterval(this.fallTimer); this.fallTimer = null; }

      // activeY부터 시작해서 가능한 가장 아래까지 이동
      let bestY = this.activeY;
      for (let y = this.activeY; y <= this.rows - this.activeH; y++) {
        if (this.canPlace(this.pendingX, y, this.activeW, this.activeH)) bestY = y;
        else break;
      }
      this.activeY = bestY;
      this.draw();
      await this.lockActiveBlock();
    }

    clearFullLines() {
      return new Promise(resolve => {
        const fullRows = [];
        for (let r = 0; r < this.rows; r++) {
          let full = true;
          for (let c = 0; c < this.cols; c++) {
            if (!this.board[r][c]) { full = false; break; }
          }
          if (full) fullRows.push(r);
        }
        if (fullRows.length === 0) { resolve(0); return; }
        let blinks = 0;
        const totalBlinks = 6;
        const blink = () => {
          const visible = blinks % 2 === 0;
          this.draw();
          if (!visible) {
            this.ctx.fillStyle = 'rgba(255,255,255,0.85)';
            for (const r of fullRows) {
              this.ctx.fillRect(0, r * this.cellSize, this.cols * this.cellSize, this.cellSize);
            }
          }
          blinks++;
          if (blinks < totalBlinks) setTimeout(blink, 70);
          else {
            for (const r of fullRows.slice().sort((a, b) => b - a)) {
              this.board.splice(r, 1);
              const newRow = [];
              for (let c = 0; c < this.cols; c++) newRow.push(null);
              this.board.unshift(newRow);
            }
            this.draw();
            resolve(fullRows.length);
          }
        };
        blink();
      });
    }

    drawCell(c, r, color) {
      const x = c * this.cellSize;
      const y = r * this.cellSize;
      const s = this.cellSize;
      const small = s < 14;
      const grad = this.ctx.createLinearGradient(x, y, x, y + s);
      grad.addColorStop(0, lightenColor(color, 25));
      grad.addColorStop(0.5, color);
      grad.addColorStop(1, darkenColor(color, 30));
      this.ctx.fillStyle = grad;
      const inset = small ? 0.5 : 1;
      this.ctx.fillRect(x + inset, y + inset, s - inset * 2, s - inset * 2);
      if (!small) {
        this.ctx.fillStyle = 'rgba(255,255,255,0.35)';
        this.ctx.fillRect(x + 2, y + 2, s - 4, Math.max(2, s * 0.18));
        this.ctx.fillStyle = 'rgba(255,255,255,0.18)';
        this.ctx.fillRect(x + 2, y + 2, Math.max(1.5, s * 0.12), s - 4);
        this.ctx.fillStyle = 'rgba(0,0,0,0.3)';
        this.ctx.fillRect(x + 1, y + s - Math.max(1.5, s * 0.15), s - 2, Math.max(1.5, s * 0.15));
      } else {
        this.ctx.fillStyle = 'rgba(255,255,255,0.3)';
        this.ctx.fillRect(x + 1, y + 1, s - 2, Math.max(1, s * 0.22));
      }
      this.ctx.strokeStyle = darkenColor(color, 50);
      this.ctx.lineWidth = small ? 0.6 : 1;
      this.ctx.strokeRect(x + 0.5, y + 0.5, s - 1, s - 1);
    }

    drawPreviewRect(x, y, w, h) {
      const ctx = this.ctx;
      const px = x * this.cellSize, py = y * this.cellSize;
      const pw = w * this.cellSize, ph = h * this.cellSize;
      ctx.fillStyle = 'rgba(0,229,255,0.2)';
      ctx.fillRect(px + 1, py + 1, pw - 2, ph - 2);
      ctx.strokeStyle = 'rgba(0,229,255,0.5)';
      ctx.lineWidth = 1;
      for (let i = 1; i < w; i++) {
        ctx.beginPath();
        ctx.moveTo(px + i * this.cellSize + 0.5, py);
        ctx.lineTo(px + i * this.cellSize + 0.5, py + ph);
        ctx.stroke();
      }
      for (let i = 1; i < h; i++) {
        ctx.beginPath();
        ctx.moveTo(px, py + i * this.cellSize + 0.5);
        ctx.lineTo(px + pw, py + i * this.cellSize + 0.5);
        ctx.stroke();
      }
      ctx.strokeStyle = '#00E5FF';
      ctx.lineWidth = 2.5;
      ctx.setLineDash([6, 4]);
      ctx.lineDashOffset = -(performance.now() / 100) % 10;
      ctx.strokeRect(px + 1.5, py + 1.5, pw - 3, ph - 3);
      ctx.setLineDash([]);
      const minSide = Math.min(pw, ph);
      if (minSide >= 18) {
        const label = w + '×' + h;
        const fontSize = Math.min(18, Math.max(10, minSide * 0.5));
        ctx.font = `bold ${fontSize}px Jua, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.lineWidth = 3;
        ctx.strokeStyle = 'rgba(0,0,0,0.7)';
        ctx.strokeText(label, px + pw / 2, py + ph / 2);
        ctx.fillStyle = '#00E5FF';
        ctx.fillText(label, px + pw / 2, py + ph / 2);
      }
    }

    draw() {
      const W = this.cols * this.cellSize;
      const H = this.rows * this.cellSize;
      const ctx = this.ctx;
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(255,255,255,0.02)';
      ctx.fillRect(0, 0, W, H);
      ctx.strokeStyle = 'rgba(255,255,255,0.07)';
      ctx.lineWidth = 1;
      for (let i = 0; i <= this.cols; i++) {
        ctx.beginPath();
        ctx.moveTo(i * this.cellSize + 0.5, 0);
        ctx.lineTo(i * this.cellSize + 0.5, H);
        ctx.stroke();
      }
      for (let i = 0; i <= this.rows; i++) {
        ctx.beginPath();
        ctx.moveTo(0, i * this.cellSize + 0.5);
        ctx.lineTo(W, i * this.cellSize + 0.5);
        ctx.stroke();
      }
      if (this.cols >= 20) {
        ctx.strokeStyle = 'rgba(0,229,255,0.18)';
        ctx.lineWidth = 1;
        for (let i = 0; i <= this.cols; i += 5) {
          ctx.beginPath();
          ctx.moveTo(i * this.cellSize + 0.5, 0);
          ctx.lineTo(i * this.cellSize + 0.5, H);
          ctx.stroke();
        }
        for (let i = 0; i <= this.rows; i += 5) {
          ctx.beginPath();
          ctx.moveTo(0, i * this.cellSize + 0.5);
          ctx.lineTo(W, i * this.cellSize + 0.5);
          ctx.stroke();
        }
      }
      for (let r = 0; r < this.rows; r++)
        for (let c = 0; c < this.cols; c++)
          if (this.board[r][c]) this.drawCell(c, r, this.board[r][c].color);

      if (this.gameOver) return;

      // 낙하 중: 활성 블록을 실제 색으로 그림 + 착지 예상 위치 윤곽(고스트)
      if (this.phase === 'fall' && this.activeW !== null && this.activeColor) {
        // 고스트(착지 예상) 위치 계산
        let ghostY = this.activeY;
        for (let y = this.activeY; y <= this.rows - this.activeH; y++) {
          if (this.canPlace(this.pendingX, y, this.activeW, this.activeH)) ghostY = y;
          else break;
        }
        // 고스트가 활성 블록과 다른 위치일 때만 그림
        if (ghostY > this.activeY) {
          ctx.save();
          ctx.globalAlpha = 0.28;
          ctx.fillStyle = this.activeColor;
          ctx.fillRect(
            this.pendingX * this.cellSize + 1,
            ghostY * this.cellSize + 1,
            this.activeW * this.cellSize - 2,
            this.activeH * this.cellSize - 2
          );
          ctx.restore();
          ctx.strokeStyle = this.activeColor;
          ctx.lineWidth = 1.5;
          ctx.setLineDash([4, 3]);
          ctx.strokeRect(
            this.pendingX * this.cellSize + 1,
            ghostY * this.cellSize + 1,
            this.activeW * this.cellSize - 2,
            this.activeH * this.cellSize - 2
          );
          ctx.setLineDash([]);
        }
        // 활성 블록 본체
        for (let r = this.activeY; r < this.activeY + this.activeH; r++) {
          for (let c = this.pendingX; c < this.pendingX + this.activeW; c++) {
            if (r >= 0 && r < this.rows && c >= 0 && c < this.cols) {
              this.drawCell(c, r, this.activeColor);
            }
          }
        }
      }
      // 선택 단계(pick): 입력이 area와 일치하면 보드 맨 위에 미리보기 사각형 표시
      else if (this.phase === 'pick' && this.inputW && this.inputH &&
               this.inputW * this.inputH === this.area) {
        const valid = this.pendingX >= 0 && this.pendingX + this.inputW <= this.cols && this.inputH <= this.rows;
        if (valid) this.drawPreviewRect(this.pendingX, 0, this.inputW, this.inputH);
      }
    }
  }

  /* ────────────────────────────────────────────────
     저장소 레이어
     - Artifacts 환경에서는 window.storage 사용
     - 일반 브라우저(파일로 열기)에서는 localStorage 사용
     이렇게 하면 어디서 열어도 점수 기록이 저장됩니다.
  ──────────────────────────────────────────────── */
  const Storage = {
    hasWindowStorage() {
      return typeof window !== 'undefined'
        && window.storage
        && typeof window.storage.get === 'function';
    },
    async get(key) {
      if (this.hasWindowStorage()) {
        try {
          const r = await window.storage.get(key);
          return (r && r.value) ? r.value : null;
        } catch (e) { /* 키 없음 등 */ return null; }
      }
      // localStorage 폴백
      try {
        return localStorage.getItem(key);
      } catch (e) { return null; }
    },
    async set(key, value) {
      if (this.hasWindowStorage()) {
        try {
          await window.storage.set(key, value);
          return true;
        } catch (e) { /* 실패 시 아래 폴백 시도 */ }
      }
      try {
        localStorage.setItem(key, value);
        return true;
      } catch (e) {
        console.error('저장 실패', e);
        return false;
      }
    },
    async delete(key) {
      if (this.hasWindowStorage()) {
        try { await window.storage.delete(key); } catch (e) {}
      }
      try { localStorage.removeItem(key); } catch (e) {}
    }
  };

  async function loadRankings() {
    try {
      const raw = await Storage.get(RANKING_KEY);
      if (raw) {
        const arr = JSON.parse(raw);
        if (Array.isArray(arr)) return arr;
      }
    } catch (e) {}
    return [];
  }
  async function saveRanking(entry) {
    try {
      const list = await loadRankings();
      list.push(entry);
      list.sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        if (b.lines !== a.lines) return b.lines - a.lines;
        return b.ts - a.ts;
      });
      const top = list.slice(0, MAX_RANKINGS);
      const ok = await Storage.set(RANKING_KEY, JSON.stringify(top));
      if (!ok) console.error('저장 실패');
      return top;
    } catch (e) {
      console.error('저장 실패', e);
      return [];
    }
  }
  async function clearAllRankings() {
    await Storage.delete(RANKING_KEY);
  }
  function renderRankings(list, highlightEntry) {
    const container = $('ranking-list');
    container.innerHTML = '';
    if (!list || list.length === 0) {
      container.innerHTML = '<div class="ranking-empty">아직 기록이 없어요</div>';
      return;
    }
    list.forEach((entry, idx) => {
      const row = document.createElement('div');
      const rankClass = idx === 0 ? 'gold' : idx === 1 ? 'silver' : idx === 2 ? 'bronze' : '';
      const isMine = highlightEntry && entry.ts === highlightEntry.ts &&
                     entry.name === highlightEntry.name && entry.score === highlightEntry.score;
      row.className = `ranking-row ${rankClass} ${isMine ? 'mine' : ''}`;
      const medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : (idx + 1);
      const cfg = entry.cfg || '';
      row.innerHTML = `
        <div class="rank-num">${medal}</div>
        <div class="name">${escapeHtml(entry.name)}</div>
        <div class="meta-mini">${entry.lines}줄<br><span style="opacity:0.7">${escapeHtml(cfg)}</span></div>
        <div class="score-mini">${entry.score}</div>
      `;
      container.appendChild(row);
    });
  }

  }

  function updateVsTime() {
    const m = Math.floor(vsElapsed / 60);
    const s = vsElapsed % 60;
    const txt = `${m}:${s.toString().padStart(2, '0')}`;
    const urgent = false;
    document.querySelectorAll('#vs-screen [data-key="time-val"]').forEach(el => {
      el.textContent = txt;
    });
    document.querySelectorAll('#vs-screen .vs-time-card, #vs-screen .stat-chip.time, #vs-screen .time-badge').forEach(el => {
      el.classList.toggle('urgent', urgent);
    });
  }

  function endVs(topOutLoser) {
    if (vsEnded) return;
    vsEnded = true;
    if (vsTimer) { clearInterval(vsTimer); vsTimer = null; }
    if (!p1 || !p2) return;
    p1.gameOver = true;
    p2.gameOver = true;
    p1.stopTimers();
    p2.stopTimers();
    $('vs-p1-score').textContent = p1.score;
    $('vs-p2-score').textContent = p2.score;
    $('vs-p1-lines').textContent = p1.linesCleared + '줄';
    $('vs-p2-lines').textContent = p2.linesCleared + '줄';
    $('vs-p1').classList.remove('winner');
    $('vs-p2').classList.remove('winner');
    $('vs-p1-crown').textContent = '';
    $('vs-p2-crown').textContent = '';

    // 승자 결정: 쌓임 패배가 있으면 상대가 무조건 승리, 없으면 점수 비교
    let winner = null;
    if (topOutLoser === p1) winner = 'p2';
    else if (topOutLoser === p2) winner = 'p1';
    else if (p1.score > p2.score) winner = 'p1';
    else if (p2.score > p1.score) winner = 'p2';

    if (winner === 'p1') {
      $('vs-p1').classList.add('winner');
      $('vs-p1-crown').textContent = '👑';
      $('vs-winner-text').textContent = topOutLoser
        ? '🧱 플레이어 2 가득 참 — 플레이어 1 승리!'
        : '🎉 플레이어 1 승리!';
    } else if (winner === 'p2') {
      $('vs-p2').classList.add('winner');
      $('vs-p2-crown').textContent = '👑';
      $('vs-winner-text').textContent = topOutLoser
        ? '🧱 플레이어 1 가득 참 — 플레이어 2 승리!'
        : '🎉 플레이어 2 승리!';
    } else {
      $('vs-winner-text').textContent = '🤝 무승부!';
    }
    $('vs-modal').classList.add('show');
  }

  $('vs-btn-home').addEventListener('click', () => {
    if (!confirm('홈으로 돌아갈까요?')) return;
    if (vsTimer) clearInterval(vsTimer);
    if (p1) { p1.gameOver = true; p1.stopTimers(); }
    if (p2) { p2.gameOver = true; p2.stopTimers(); }
    showScreen('start');
  });
  $('vs-restart').addEventListener('click', () => {
    $('vs-modal').classList.remove('show');
    startVs();
  });
  $('vs-home').addEventListener('click', () => {
    $('vs-modal').classList.remove('show');
    showScreen('start');
  });

  $$('#vs-screen .key.num').forEach(btn => {
    btn.addEventListener('click', () => {
      const player = btn.dataset.p === 'p1' ? p1 : p2;
      if (player) player.appendDigit(+btn.dataset.num);
    });
  });
  $$('#vs-screen .key[data-act]').forEach(btn => {
    btn.addEventListener('click', () => {
      const player = btn.dataset.p === 'p1' ? p1 : p2;
      if (!player) return;
      const act = btn.dataset.act;
      if (act === 'toggle') player.toggleSwapDims();
      else if (act === 'clear') player.clearActiveInput();
      else if (act === 'left') player.moveLeft();
      else if (act === 'right') player.moveRight();
      else if (act === 'drop') player.drop();
    });
  });
  $$('#vs-screen .dim-input').forEach(el => {
    el.addEventListener('click', () => {
      const player = el.dataset.p === 'p1' ? p1 : p2;
      if (player) player.setActiveInput(el.dataset.key);
    });
  });

  // input-spacer 높이를 가운데 input-panel 높이로 동기화
  // → 우측 컬럼의 점수 카드가 게임판 밑면 라인에 맞춰 위치하게 됨
  function syncInputSpacer() {
    const panel = document.querySelector('#game-screen .screen-col-center .input-panel');
    const spacer = $('input-spacer');
    if (panel && spacer) {
      const h = panel.getBoundingClientRect().height;
      spacer.style.height = h + 'px';
    }
  }
  // input-panel 크기 변화도 자동 감지
  (function setupSpacerObserver(){
    const panel = document.querySelector('#game-screen .screen-col-center .input-panel');
    if (panel && window.ResizeObserver) {
      const ro = new ResizeObserver(() => syncInputSpacer());
      ro.observe(panel);
    }
  })();

  // 공통
  window.addEventListener('resize', () => {
    if (soloPlayer) soloPlayer.resize();
    if (p1) p1.resize();
    if (p2) p2.resize();
    syncInputSpacer();
  });

  document.addEventListener('keydown', e => {
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
    if (!$('game-screen').classList.contains('active') || !soloPlayer) return;
    if (soloPlayer.gameOver) return;
    if (e.key >= '0' && e.key <= '9') soloPlayer.appendDigit(+e.key);
    else if (e.key === 'ArrowLeft') soloPlayer.moveLeft();
    else if (e.key === 'ArrowRight') soloPlayer.moveRight();
    else if (e.key === 'Tab') { e.preventDefault(); soloPlayer.toggleSwapDims(); }
    else if (e.key === 'Backspace') soloPlayer.clearActiveInput();
    else if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); soloPlayer.drop(); }
  });

  function loop() {
    if (soloPlayer && !soloPlayer.isAnimating && !soloPlayer.gameOver &&
        (soloPlayer.phase === 'pick' || soloPlayer.phase === 'fall')) {
      soloPlayer.draw();
    }
    if (p1 && !p1.isAnimating && !p1.gameOver &&
        (p1.phase === 'pick' || p1.phase === 'fall')) {
      p1.draw();
    }
    if (p2 && !p2.isAnimating && !p2.gameOver &&
        (p2.phase === 'pick' || p2.phase === 'fall')) {
      p2.draw();
    }
    requestAnimationFrame(loop);
  }
  loop();

  showScreen('start');
})();
</script>

<script>

      +'<div style="font-family:Gowun Dodum,sans-serif;color:#fff3e0;font-size:15px">\ucd95\uc81c\uc5d0 \uc785\uc7a5\ud560 \uc218 \uc788\uc5b4\uc694</div>'
      +'<button id="festEnter" style="margin-top:6px;font-family:Jua,sans-serif;font-size:19px;border:none;border-radius:16px;padding:14px 34px;background:linear-gradient(180deg,#54b07a,#2ea66a);color:#fff;box-shadow:0 5px 0 #1f8252;cursor:pointer">\ud83c\udfaa \ucd95\uc81c \uc785\uc7a5 \u25b6</button>';
    document.body.appendChild(ov);
    document.getElementById('festEnter').onclick=function(){ post('festpass'); };
  }
  function check(){ if(done) return; var el=document.getElementById('lines-val'); if(el){ var n=parseInt((el.textContent||'').replace(/[^0-9]/g,''),10)||0; if(n>=GOAL) win(); } }
  // 실패(게임오버) 시 뜨는 랭킹/이름 모달 대신 간단한 다시도전 화면
  var failShown=false;
  function watchFail(){
    if(done) return;
    var m=document.getElementById('modal');
    if(!m) return;
    if(m.classList.contains('show')){
      m.style.display='none';   // 게임 자체의 랭킹 등록 모달 숨김
      if(failShown) return; failShown=true;
      var ov=document.createElement('div'); ov.id='festFail';
      ov.style.cssText='position:fixed;inset:0;z-index:100000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:24px;background:radial-gradient(circle at 50% 30%, rgba(120,70,40,.96), rgba(58,32,18,.99))';
      ov.innerHTML='<div style="font-size:50px">\ud83e\uddf1\ud83d\ude13</div>'
        +'<div style="font-family:Jua,sans-serif;color:#FFE08A;font-size:22px">\uc544\uc26c\uc6cc\uc694! \ub2e4\uc2dc \ud574\ubcfc\uae4c\uc694?</div>'
        +'<div style="display:flex;gap:10px;margin-top:6px">'
        +'<button id="festRetry" style="font-family:Jua,sans-serif;font-size:17px;border:none;border-radius:14px;padding:12px 22px;background:linear-gradient(180deg,#E8B23A,#C0532B);color:#3a1c0c;box-shadow:0 4px 0 #8a3f1c;cursor:pointer">\u21bb \ub2e4\uc2dc \ub3c4\uc804</button>'
        +'<button id="festGiveup" style="font-family:Jua,sans-serif;font-size:17px;border:none;border-radius:14px;padding:12px 22px;background:#7a4a2c;color:#fff;box-shadow:0 4px 0 #4a2c18;cursor:pointer">\u2715 \uadf8\ub9cc\ub450\uae30</button></div>';
      document.body.appendChild(ov);
      document.getElementById('festRetry').onclick=function(){
        try{ var sk=document.getElementById('modal-skip'); if(sk) sk.click(); var rs=document.getElementById('modal-restart'); if(rs) rs.click(); }catch(e){}
        ov.remove(); failShown=false;
      };
      document.getElementById('festGiveup').onclick=function(){ post('festfail'); };
    }
  }
  var iv=setInterval(function(){ check(); watchFail(); if(done) clearInterval(iv); }, 250);
  function badge(){ var d=document.createElement('div');
    d.style.cssText='position:fixed;left:50%;top:8px;transform:translateX(-50%);z-index:99998;background:rgba(255,246,223,.96);color:#8a5a10;font-family:Jua,sans-serif;font-size:13px;padding:6px 14px;border-radius:99px;box-shadow:0 3px 10px rgba(0,0,0,.25)';
    d.textContent='\ud83c\udfaa \ubcbd\ub3cc '+GOAL+'\uc904\uc744 \uc5c6\uc560\uba74 \ucd95\uc81c \uc785\uc7a5!'; document.body.appendChild(d); }
  if(document.readyState==='loading') window.addEventListener('DOMContentLoaded',badge); else badge();
})();
</script>
